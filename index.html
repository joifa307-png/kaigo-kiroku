<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title id="pageTitle">介護記録</title>
<style>
/* ===== CSS変数 ===== */
:root{
  --blue:#185FA5; --blue2:#E6F1FB;
  --orange:#E87722; --orange2:#C45F0A; --orange-bg:#FEF0E6;
  --green:#0F6E56; --green2:#E1F5EE; --green-bg:#E1F5EE;
  --red:#A32D2D; --red2:#FCEBEB;
  --text1:#1A1916; --text2:#5C5A54; --text3:#9E9C94;
  --border1:#DDDBD4; --border2:#C8C5BC;
  --bg:#F5F4F0; --white:#fff; --r1:7px; --r2:10px; --r3:16px;
  --shadow:0 2px 8px rgba(0,0,0,.10);
}

/* ===== リセット ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;
  background:var(--bg);color:var(--text1);font-size:30px;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:30px;}

/* ===== ヘッダー共通 ===== */
.hdr{
  background:linear-gradient(135deg,#fff 0%,#FEF6F0 100%);
  border-bottom:1px solid var(--border1);
  padding:8px 12px;display:flex;align-items:center;gap:8px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
}
.hdr-logo{height:70px;max-width:300px;object-fit:contain;}
.hdr-title{font-weight:700;font-size:16px;color:var(--orange2);}
.hdr-facility{font-size:12px;color:var(--text3);margin-left:4px;}
.hdr-btn{
  padding:7px 12px;border-radius:var(--r2);border:1px solid var(--border2);
  background:var(--white);color:var(--text2);font-size:28px;
  cursor:pointer;white-space:nowrap;user-select:none;
}
.hdr-btn:active{opacity:.7;}
.hdr-btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);}
.hdr-btn.nav{padding:4px 8px;font-size:20px;}
.hdr-center{display:flex;align-items:center;gap:4px;}
.hdr-date{
  font-size:20px;font-weight:700;padding:4px 8px;
  border-radius:var(--r2);border:1px solid var(--border2);
  background:var(--white);cursor:pointer;white-space:nowrap;
}
.sync-indicator{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);}
.sync-dot{font-size:16px;line-height:1;}

/* ===== 画面切替 ===== */
.screen{display:none;}
.screen.active{display:block;}

/* ===== メイン画面 ===== */
.main-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.res-table{width:100%;border-collapse:collapse;min-width:700px;}
.res-table th{
  background:var(--orange);color:#fff;padding:8px 6px;
  font-size:22px;white-space:nowrap;text-align:center;
}
.res-table td{
  padding:10px 6px;border-bottom:1px solid var(--border1);
  border-right:1px solid var(--border1);
  text-align:center;font-size:14px;vertical-align:middle;cursor:pointer;
}
.res-table tr:nth-child(odd) td{background:var(--white);}
.res-table tr:nth-child(even) td{background:#F7F6F2;}
.res-table tr:active td{background:var(--blue2)!important;}
.name-cell{text-align:left !important;padding-left:8px !important;cursor:default;}
.name-txt{font-size:22px;font-weight:500;}
.name-sub{font-size:16px;color:var(--text3);}
.cell-val{font-size:18px;line-height:1.4;}
.cell-empty{color:var(--text3);font-size:18px;}
.cell-ok{color:var(--green);font-size:22px;font-weight:700;}
.cell-warn{color:var(--red);font-size:18px;font-weight:700;}
.cell-red{color:var(--red);font-size:22px;font-weight:700;}
/* 排泄列専用 */
.cell-ex{font-size:18px;line-height:1.4;}
.badge-ok{color:var(--green);font-weight:700;}
.badge-ng{color:var(--orange2);font-weight:700;}

/* ===== 詳細画面 ===== */
.detail-hdr{
  background:linear-gradient(135deg,#fff 0%,#FEF6F0 100%);
  border-bottom:1px solid var(--border1);
  padding:8px 12px;display:flex;align-items:center;gap:8px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
}
.detail-name{font-size:18px;font-weight:600;color:var(--text1);}
.back-btn{
  padding:7px 14px;border-radius:var(--r2);border:1px solid #F5C49A;
  background:var(--orange-bg);color:var(--orange2);font-size:15px;font-weight:600;
  white-space:nowrap;flex-shrink:0;cursor:pointer;
}

/* ===== タブ ===== */
.tabs{
  display:flex;overflow-x:auto;background:var(--white);
  border-bottom:2px solid var(--border2);
  position:sticky;top:57px;z-index:99;
  -webkit-overflow-scrolling:touch;
}
.tab{
  padding:10px 16px;font-size:20px;font-weight:600;white-space:nowrap;
  color:var(--text3);border-bottom:3px solid transparent;
  cursor:pointer;flex-shrink:0;margin-bottom:-2px;
}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700;background:var(--orange-bg);}

/* ===== パネル ===== */
.panel{padding:12px;}
.panel-sec{
  background:var(--white);border-radius:var(--r2);padding:14px;
  margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.panel-sec h3{
  font-size:22px;color:var(--text2);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--border2);
}
.panel-sec h3 .sec-btn{float:right;}

/* ===== フォームグループ ===== */
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:20px;color:var(--text2);margin-bottom:4px;font-weight:600;}
.fg input,.fg select,.fg textarea{
  width:100%;padding:8px 10px;border:1px solid var(--border2);
  border-radius:var(--r1);background:var(--white);font-size:20px;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  outline:none;border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,119,34,.15);
}
.fg textarea{min-height:100px;resize:vertical;}
.fg-row{display:flex;gap:10px;}
.fg-row .fg{flex:1;}
.fg-hint{font-size:14px;color:var(--text3);margin-top:3px;}

/* ===== チップ ===== */
.chip{
  display:inline-block;padding:8px 18px;border-radius:20px;
  border:1px solid var(--border2);background:var(--white);
  font-size:20px;cursor:pointer;user-select:none;margin:3px;
}
.chip.on,.chip.pc-on{background:var(--orange);color:#fff;border-color:var(--orange);}
.chip.selected{background:var(--orange);color:#fff;border-color:var(--orange);}

/* ===== ボタン ===== */
.btn{
  display:inline-block;padding:10px 20px;border-radius:var(--r2);
  border:none;font-size:20px;font-weight:600;cursor:pointer;
  user-select:none;text-align:center;
}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:active{opacity:.8;}
.btn-danger{background:var(--red);color:#fff;}
.btn-gray{background:var(--border2);color:var(--text2);}
.btn-sm{padding:6px 12px;font-size:18px;}
.btn-block{display:block;width:100%;}

/* ===== 履歴リスト ===== */
.hist-list{margin-bottom:14px;}
.hist-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:10px 0;border-bottom:1px solid var(--border2);
}
.hist-item:last-child{border-bottom:none;}
.hist-time{color:var(--orange2);font-weight:700;white-space:nowrap;min-width:80px;font-size:20px;}
.hist-content{flex:1;color:var(--text1);font-size:20px;line-height:1.5;}
.hist-del{color:var(--red);font-size:18px;padding:4px 10px;border:1px solid var(--red);
  border-radius:var(--r1);background:none;cursor:pointer;white-space:nowrap;}
.hist-edit{color:var(--blue);font-size:18px;padding:4px 10px;border:1px solid var(--blue);
  border-radius:var(--r1);background:none;cursor:pointer;white-space:nowrap;margin-right:2px;}
.hist-day{font-size:14px;color:var(--orange2);font-weight:600;margin:6px 0 2px;}

/* ===== オーバーレイ ===== */
.ov-back{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
}
.ov-back.show{display:block;}
.ov{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-radius:var(--r3) var(--r3) 0 0;
  max-height:90vh;overflow-y:auto;z-index:201;padding:20px 16px;
  transform:translateY(100%);transition:transform .25s ease;
}
.ov-back.show .ov,.ov-back.show+.ov{transform:translateY(0);}
.ov.show{transform:translateY(0);}
.ov-title{
  font-size:17px;font-weight:700;margin-bottom:16px;
  padding-bottom:10px;border-bottom:1px solid var(--border2);
  display:flex;justify-content:space-between;align-items:center;
}
.ov-close{font-size:20px;color:var(--text3);border:none;background:none;cursor:pointer;padding:0 4px;}

/* ===== カレンダー ===== */
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:6px;
}
.cal-lbl{text-align:center;font-size:10px;color:var(--text3);padding:3px 0;font-weight:600;}
.cal-day{
  text-align:center;padding:5px 2px;font-size:12px;border-radius:var(--r1);
  cursor:pointer;position:relative;
}
.cal-day:active{background:var(--blue2);}
.cal-day.today{background:var(--orange2);color:#fff;font-weight:700;}
.cal-day.sel{background:var(--orange);color:#fff;font-weight:700;}
.cal-day.has::after{
  content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:var(--green);
}
.cal-day.today.has::after,.cal-day.sel.has::after{background:#fff;}
.cal-nav{display:flex;justify-content:space-between;align-items:center;}
.cal-nav-title{font-weight:700;font-size:13px;}

/* ===== 服薬チップ ===== */
.med-chip{
  display:inline-block;padding:8px 20px;border-radius:20px;
  border:1px solid var(--border2);background:var(--white);
  font-size:26px;cursor:pointer;margin:3px;user-select:none;
}
.med-chip.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.med-chip.none-on{background:var(--text3);color:#fff;border-color:var(--text3);}

/* ===== 設定画面 ===== */
.settings-tabs{
  display:flex;overflow-x:auto;background:var(--white);
  border-bottom:1px solid var(--border2);
  -webkit-overflow-scrolling:touch;
}
.settings-tab{
  padding:10px 16px;font-size:13px;white-space:nowrap;
  color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;
  flex-shrink:0;
}
.settings-tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700;}
.settings-panel{display:none;padding:14px;}
.settings-panel.active{display:block;}
.settings-list-item{
  display:flex;align-items:center;gap:8px;padding:10px;
  border:1px solid var(--border2);border-radius:var(--r1);margin-bottom:8px;
  background:var(--white);
}
.settings-list-item .item-name{flex:1;font-size:14px;}
.settings-list-item .item-del{
  color:var(--red);font-size:12px;padding:3px 8px;
  border:1px solid var(--red);border-radius:var(--r1);background:none;cursor:pointer;
}

/* ===== 印刷 ===== */
@media print{
  .no-print{display:none !important;}
  .screen{display:block !important;}
  body{background:#fff;}
}

/* ===== ユーティリティ ===== */
.text-blue{color:var(--blue);}
.text-green{color:var(--green);}
.text-orange{color:var(--orange2);}
.text-red{color:var(--red);}
.text-gray{color:var(--text3);}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.flex{display:flex;}
.flex-1{flex:1;}
.gap8{gap:8px;}
.gap6{gap:6px;}
.items-center{align-items:center;}
.justify-between{justify-content:space-between;}
.w100{width:100%;}
</style>
</head>
<body>

<!-- ========== 施設選択画面 ========== -->
<div id="selectScreen" class="screen active">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:var(--bg);">
    <div style="font-size:28px;font-weight:700;color:var(--orange2);margin-bottom:8px;">介護記録</div>
    <div style="font-size:14px;color:var(--text3);margin-bottom:40px;">ユニットを選択してください</div>
    <div style="display:flex;flex-direction:column;gap:16px;width:100%;max-width:320px;">
      <button onclick="selectFacility('nishi')" style="padding:24px;border-radius:var(--r3);border:2px solid var(--orange);background:var(--orange-bg);color:var(--orange2);font-size:22px;font-weight:700;cursor:pointer;">
        🏠 西ユニット
      </button>
      <button onclick="selectFacility('minami')" style="padding:24px;border-radius:var(--r3);border:2px solid var(--blue);background:var(--blue2);color:var(--blue);font-size:22px;font-weight:700;cursor:pointer;">
        🏠 南ユニット
      </button>
    </div>
  </div>
</div>

<!-- ========== メイン画面 ========== -->
<div id="mainScreen" class="screen">
  <div class="hdr no-print">
    <img id="mainLogo" class="hdr-logo" src="" alt="" style="display:none;">
    <div style="flex:1;"></div>
    <div class="hdr-center">
      <button class="hdr-btn nav" onclick="moveDay(-1)">◀</button>
      <div class="hdr-date" id="mainDate" onclick="openCal()"></div>
      <button class="hdr-btn nav" onclick="moveDay(1)">▶</button>
    </div>
    <div class="sync-indicator">
      <span class="sync-dot" id="syncDot">●</span>
      <span id="syncLabel">--</span>
    </div>
    <button class="hdr-btn no-print" onclick="syncNow()">🔄</button>
    <button class="hdr-btn no-print" onclick="openSettings()">⚙️</button>
  </div>
  <div class="main-scroll">
    <table class="res-table" id="resTable">
      <thead>
        <tr>
          <th style="width:32px;min-width:32px;">申送</th>
          <th style="text-align:left;padding-left:8px;min-width:80px;">氏名</th>
          <th>体温</th>
          <th>血圧</th>
          <th>脈拍</th>
          <th>SpO2</th>
          <th>排泄</th>
          <th style="white-space:nowrap;">最終排便</th>
          <th>入浴</th>
          <th>食事</th>
          <th>レク</th>
          <th onclick="openBulkMed()" style="cursor:pointer;white-space:nowrap;">服薬 ▼</th>
        </tr>
      </thead>
      <tbody id="resBody"></tbody>
    </table>
  </div>
</div>

<!-- ========== 詳細画面 ========== -->
<div id="detailScreen" class="screen">
  <div class="detail-hdr no-print">
    <button class="back-btn" onclick="goBack()">◀ メイン</button>
    <div style="flex:1;">
      <div class="detail-name" id="detName"></div>
      <div class="hdr-center" style="margin-top:4px;">
        <button class="hdr-btn nav" onclick="moveDayDet(-1)">◀</button>
        <div class="hdr-date" id="detDate" onclick="openCal()"></div>
        <button class="hdr-btn nav" onclick="moveDayDet(1)">▶</button>
      </div>
    </div>
    <button class="hdr-btn no-print" onclick="openCareSummary()" style="font-size:13px;padding:6px 10px;">📋 サマリー</button>
    <button class="hdr-btn no-print" onclick="openVitalPrint()" style="font-size:13px;padding:6px 10px;">📅 期間印刷</button>
  </div>
  <div class="tabs no-print" id="detTabs"></div>
  <div id="detPanel"></div>
</div>

<!-- ========== 設定画面 ========== -->
<div id="settingsScreen" class="screen">
  <div class="hdr no-print">
    <button class="back-btn" onclick="closeSettings()">◀ 戻る</button>
    <div class="hdr-title" style="flex:1;">設定</div>
  </div>
  <div class="settings-tabs no-print" id="settingsTabs"></div>
  <div id="settingsBody"></div>
</div>

<!-- ========== カレンダーオーバーレイ ========== -->
<div class="ov-back" id="ovCal">
  <div class="ov show">
    <div class="ov-title">
      <span>日付を選ぶ</span>
      <button class="ov-close" onclick="closeOv('ovCal')">✕</button>
    </div>
    <div class="cal-nav">
      <button class="hdr-btn nav" onclick="calMove(-1)">◀</button>
      <div class="cal-nav-title" id="calTitle"></div>
      <button class="hdr-btn nav" onclick="calMove(1)">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div style="margin-top:12px;text-align:center;">
      <button class="btn btn-primary btn-sm" onclick="goToday()">今日</button>
    </div>
  </div>
</div>

<!-- ========== 汎用オーバーレイ ========== -->
<div class="ov-back" id="ovMain">
  <div class="ov show" id="ovMainBody"></div>
</div>

<!-- ========== 8日集計オーバーレイ ========== -->
<div class="ov-back" id="ovSummary" onclick="if(event.target===this)closeOv('ovSummary')">
  <div class="ov show" style="height:100vh;max-height:100vh;border-radius:0;display:flex;flex-direction:column;padding:0;bottom:0;top:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--white);">
      <div id="sumResName" style="font-size:18px;font-weight:700;color:var(--text1);"></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span style="font-size:12px;color:var(--text3);">8日間集計</span>
        <button onclick="closeOv('ovSummary')" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--text3);line-height:1;padding:0 4px;">✕</button>
      </div>
    </div>
    <div style="overflow:auto;-webkit-overflow-scrolling:touch;flex:1;background:#f5f5f5;padding:8px;">
      <table id="sumTable" style="border-collapse:collapse;min-width:600px;"></table>
    </div>
    <div style="padding:10px 16px;background:var(--white);border-top:1px solid var(--border2);flex-shrink:0;">
      <button class="btn btn-primary btn-block btn-sm" onclick="closeOv('ovSummary');openDetail(document.getElementById('sumResName').textContent,'vital')">詳細入力画面へ ▶</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ========== 施設設定 ==========
const FACILITIES = {
  nishi: {
    name: '西ユニット',
    storageKey: 'kaigo_nishi',
    jkey: '$2a$10$io4g10aMQgAiZnfT2gQOg.e1PBmvQZ5OFZo3ia3qB/PDfkv2j77w.',
    jbin: '69c8da1b6860e0745bff1652',
  },
  minami: {
    name: '南ユニット',
    storageKey: 'kaigo_minami',
    jkey: '$2a$10$io4g10aMQgAiZnfT2gQOg.e1PBmvQZ5OFZo3ia3qB/PDfkv2j77w.',
    jbin: '69cdcd32856a682189efeb07',
  }
};

// 施設情報（動的に設定）
let FACILITY_ID = null;
let FAC = null;
let JURL = null;

function initFacility(facId){
  if(!FACILITIES[facId]) return false;
  FACILITY_ID = facId;
  FAC = FACILITIES[facId];
  JURL = `https://api.jsonbin.io/v3/b/${FAC.jbin}`;
  return true;
}

function selectFacility(facId){
  localStorage.setItem('kaigo_last_facility', facId);
  if(initFacility(facId)){
    startApp();
  }
}

function startApp(){
  showScreen('mainScreen');
  loadDB();
  setSyncStatus('--','var(--text3)');
  renderDate();
  renderMain();
  syncFrom();
  startAutoSync();
}

// ========== DB操作 ==========
function loadDB(){
  if(!FAC){ showScreen('selectScreen'); return; }
  try{
    const s = localStorage.getItem(FAC.storageKey);
    if(s){ db = JSON.parse(s); }
  }catch(e){ console.error('loadDB error',e); }
  // 初期値補完
  if(!db.residents||db.residents.length===0){
    db.residents = FACILITY_ID==='nishi'
      ? JSON.parse(JSON.stringify(DEFAULT_RESIDENTS_NISHI))
      : [];
  }
  if(!db.records) db.records={};
  if(!db.supplies) db.supplies=[];
  if(!db.settings) db.settings={};
  // settingsのデフォルト補完（未定義 or 空配列の場合にデフォルトを適用）
  Object.keys(DEFAULT_SETTINGS).forEach(k=>{
    const cur = db.settings[k];
    const def = DEFAULT_SETTINGS[k];
    if(cur === undefined || cur === null){
      db.settings[k] = JSON.parse(JSON.stringify(def));
    } else if(Array.isArray(def) && def.length > 0 && Array.isArray(cur) && cur.length === 0){
      // 配列項目が空の場合もデフォルトで補完（staffList・supplyProductsは除外）
      if(!['staffList','supplyProducts'].includes(k)){
        db.settings[k] = JSON.parse(JSON.stringify(def));
      }
    }
  });
  if(db.settings.facilityName) document.title = db.settings.facilityName;
}

// ========== 同期 ==========
function setSyncStatus(label, color){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  if(dot) dot.style.color=color;
  if(lbl) lbl.textContent=label;
}

function syncTo(){
  if(!FAC||!JURL) return;
  setSyncStatus('送信中...','#185FA5');
  // 送信前にクラウドから取得→マージ→アップロード
  fetch(JURL+'/latest',{headers:{'X-Master-Key':FAC.jkey}})
    .then(r=>r.json()).then(res=>{
      let uploadDb = JSON.parse(JSON.stringify(db));
      if(res.record && res.record.data){
        try{
          const cloudDb = JSON.parse(res.record.data);
          uploadDb = mergeDb(db, cloudDb); // local=base(settings優先) + cloud → merged
        }catch(e){}
      }
      return fetch(JURL,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':FAC.jkey},
        body: JSON.stringify({data:JSON.stringify(uploadDb), timestamp:Date.now()})
      });
    })
    .then(r=>r.json()).then(res=>{
      syncTs = (res.record&&res.record.timestamp)||Date.now();
      syncDirty = false;
      const n=new Date();
      setSyncStatus(`送信済 ${n.getHours()}:${pad(n.getMinutes())}`,'green');
    })
    .catch(()=>setSyncStatus('送信失敗','orange'));
}

function syncFrom(){
  if(!FAC||!JURL) return;
  setSyncStatus('受信中...','#185FA5');
  fetch(JURL+'/latest',{headers:{'X-Master-Key':FAC.jkey}})
    .then(r=>r.json()).then(res=>{
      if(res.record && res.record.timestamp > syncTs){
        const cloudDb = JSON.parse(res.record.data);
        db = mergeDb(db, cloudDb); // local + cloud → merged
        localStorage.setItem(FAC.storageKey, JSON.stringify(db));
        syncTs = res.record.timestamp;
        syncDirty = false;
        renderMain();
        setSyncStatus('受信済','green');
      } else {
        setSyncStatus('最新です','green');
        setTimeout(()=>setSyncStatus('同期済','green'),2000);
      }
    }).catch(()=>setSyncStatus('受信失敗','orange'));
}

// 統一マージ関数（base に target をユニオンマージ）
function mergeDb(base, target){
  const result = JSON.parse(JSON.stringify(target)); // targetをベースにコピー

  // ── settings：ローカル（base）を優先して保護 ──
  // 旧クラウドデータには settings がないため、常にローカルの settings を使う
  if(base.settings && Object.keys(base.settings).length){
    result.settings = JSON.parse(JSON.stringify(base.settings));
  }
  if(!result.settings) result.settings = {};
  // DEFAULT_SETTINGS のキーで抜けているものを補完
  Object.keys(DEFAULT_SETTINGS).forEach(k=>{
    const cur = result.settings[k];
    const def = DEFAULT_SETTINGS[k];
    if(cur === undefined || cur === null){
      result.settings[k] = JSON.parse(JSON.stringify(def));
    } else if(Array.isArray(def) && def.length > 0 && Array.isArray(cur) && cur.length === 0){
      if(!['staffList','supplyProducts'].includes(k)){
        result.settings[k] = JSON.parse(JSON.stringify(def));
      }
    }
  });

  // ── supplies：ユニオンマージ ──
  if(!result.supplies) result.supplies = [];
  if(base.supplies&&base.supplies.length){
    const ids = new Set(result.supplies.map(s=>s.id));
    base.supplies.forEach(s=>{ if(s.id&&!ids.has(s.id)) result.supplies.push(s); });
    result.supplies.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  }

  // ── records：ユニオンマージ ──
  if(!base.records) return result;
  if(!result.records) result.records={};
  Object.entries(base.records).forEach(([dateK, dayData])=>{
    if(!result.records[dateK]){ result.records[dateK]=dayData; return; }
    Object.entries(dayData).forEach(([name, baseRec])=>{
      if(!result.records[dateK][name]){ result.records[dateK][name]=baseRec; return; }
      const tr = result.records[dateK][name];
      // 配列フィールド：IDまたは時刻をキーにユニオンマージ
      ['vital','excretion','bath','care','notes'].forEach(field=>{
        if(!baseRec[field]||!baseRec[field].length) return;
        if(!tr[field]||!tr[field].length){ tr[field]=baseRec[field]; return; }
        const targetIds = new Set(tr[field].map(e=>e.id||e.time||JSON.stringify(e)));
        baseRec[field].forEach(e=>{
          const key = e.id||e.time||JSON.stringify(e);
          if(!targetIds.has(key)) tr[field].push(e);
        });
        tr[field].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      });
      // med：タイミング別にbaseを保護
      if(baseRec.med){
        if(!tr.med) tr.med=baseRec.med;
        else ['morning','lunch','dinner','bedtime'].forEach(t=>{
          if(baseRec.med[t]&&baseRec.med[t].items&&baseRec.med[t].items.length&&
             (!tr.med[t]||!tr.med[t].items||!tr.med[t].items.length))
            tr.med[t]=baseRec.med[t];
        });
      }
    });
  });
  return result;
}

function syncNow(){

}

function openCal(){

function calMove(d){
  calM+=d;
  if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;}
  renderCal();
}
function renderCal(){
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('calTitle').textContent=`${calY}年 ${mn[calM]}`;
  const today=new Date(); today.setHours(0,0,0,0);
  const first=new Date(calY,calM,1).getDay();
  const days=new Date(calY,calM+1,0).getDate();
  let html=['日','月','火','水','木','金','土'].map(d=>`<div class="cal-lbl">${d}</div>`).join('');
  for(let i=0;i<first;i++) html+='<div></div>';
  for(let d=1;d<=days;d++){
    const td=new Date(calY,calM,d); td.setHours(0,0,0,0);
    const dkStr=`${calY}-${pad(calM+1)}-${pad(d)}`;
    const isToday=td.getTime()===today.getTime();
    const isSel=td.getTime()===curDate.getTime();
    const hasRec=db.records[dkStr]&&Object.keys(db.records[dkStr]).length>0;
    let cls='cal-day';
    if(isToday) cls+=' today'; else if(isSel) cls+=' sel';
    if(hasRec) cls+=' has';
    html+=`<div class="${cls}" onclick="pickDay(${calY},${calM},${d})">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
function pickDay(y,m,d){
  curDate=new Date(y,m,d); curDate.setHours(0,0,0,0);

    {label:'SpO2',fn:(r)=>{const lv=r.vital&&r.vital.length?r.vital[r.vital.length-1]:null;return lv&&lv.spo2?lv.spo2+'%':'—';}},
    {label:'排便',fn:(r)=>{if(!r.excretion)return '—';const ex=r.excretion.filter(e=>e.stool&&e.stool!=='なし');return ex.length?`<span style="color:#8B4513;">${ex[ex.length-1].stool}</span>`:'—';}},

    {label:'入浴',fn:(r)=>{return r.bath&&r.bath.length?`<span style="color:var(--green);font-weight:700;">${r.bath[r.bath.length-1].type||'○'}</span>`:'—';}},

function getLastStool(name){
  // 過去14日間を遡って最終排便を探す
  for(let d=0;d<=13;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const dayData=db.records[dk(dt)]&&db.records[dk(dt)][name];
    if(dayData&&dayData.excretion){
      const found=dayData.excretion.filter(e=>e.stool&&e.stool!=='なし');
      if(found.length){
        const e=found[found.length-1];
        return {dt:new Date(dk(dt)+'T'+(e.time||'00:00')+':00').getTime(), dayStr:['日','月','火','水','木','金','土'][dt.getDay()], time:e.time||''};
      }
    }
  }
  return null;
}

function renderMain(){
  if(!FAC) return;
  renderDate();
  renderFacilityHeader();
  const day=curDate.getDate()-1;
  const todayRes=db.residents.filter(r=>r.sched&&r.sched[day]===1);
  const tbody=document.getElementById('resBody');
  if(!tbody) return;
  if(todayRes.length===0){
    tbody.innerHTML=`<tr><td colspan="12" style="padding:32px;color:var(--text3);text-align:center;">本日の利用者はいません</td></tr>`;
    return;
  }
  tbody.innerHTML=todayRes.map(r=>{
    const rec=db.records[dk()]&&db.records[dk()][r.name]||{};
    // 申送（48時間以内のメモ：複数日チェック）
    const now=Date.now();
    const _h48chk=()=>{
      for(let d=0;d<=2;d++){
        const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
        const k=dk(dt);
        const rr=db.records[k]&&db.records[k][r.name]||{};
        if((rr.notes||[]).some(n=>(now-new Date(n.ts||0).getTime())<48*3600000)) return true;
      }
      return false;
    };
    const h48=_h48chk();
    const nc=h48?'<span class="cell-red">●</span>':'<span class="cell-empty">—</span>';
    // バイタル（体温/血圧/脈拍/SpO2）
    const lv=(rec.vital||[]).length?(rec.vital[rec.vital.length-1]):null;
    const tc=lv?`<span class="${parseFloat(lv.temp)>=37.0?'cell-warn':'cell-val'}">${lv.temp}℃</span>`:'<span class="cell-empty">—</span>';
    const bc=lv?`<span class="${parseInt(lv.sbp)>=160?'cell-warn':'cell-val'}">${lv.sbp}/${lv.dbp}</span>`:'<span class="cell-empty">—</span>';
    const pc=lv?`<span class="${parseInt(lv.pulse)>=90?'cell-warn':'cell-val'}">${lv.pulse}</span>`:'<span class="cell-empty">—</span>';
    const sc=lv?`<span class="cell-val">${lv.spo2||'—'}%</span>`:'<span class="cell-empty">—</span>';
    // 排泄
    const le=(rec.excretion||[]).length?(rec.excretion[rec.excretion.length-1]):null;
    let ec;
    if(!le){ec='<span class="cell-empty">—</span>';}
    else{
      const lines=[];
      const _leWater=le.stool&&le.stool.startsWith('水様便');
      if(le.urine&&le.urine!=='なし') lines.push(`<span style="color:#0F6E56;font-weight:600;">尿 ${le.urine}</span>`);
      if(le.pad&&le.pad!=='なし') lines.push(`パット ${le.pad}`);
      if(le.padChange) lines.push('<span style="color:var(--blue);font-weight:600;">パ交換</span>');
      if(le.rehaChange) lines.push('<span style="color:var(--blue);font-weight:600;">リハパン交換</span>');
      if(le.diaperChange) lines.push('<span style="color:var(--blue);font-weight:600;">オムツ交換</span>');
      if(le.stool&&le.stool!=='なし') lines.push(_leWater?`<span style="color:var(--red);font-weight:600;">${le.stool}</span>`:`<span style="color:#8B4513;">${le.stool}</span>`);
      if(lines.length===0) lines.push('空振り');
      ec=`<span class="cell-ex">${le.time}<br>${lines.join('<br>')}</span>`;
    }
    // 最終排便
    const _ls=getLastStool(r.name);
    let lsc;
    if(!_ls){lsc='<span class="cell-empty">—</span>';}
    else{
      const _ha=(Date.now()-_ls.dt)/3600000;
      if(_ha<48) lsc=`<span class="cell-val" style="font-size:14px;">${_ls.dayStr}曜 ${_ls.time}</span>`;
      else if(_ha<60) lsc='<span class="cell-warn">－2日</span>';
      else if(_ha<72) lsc='<span class="cell-warn">－3日</span>';
      else lsc='<span class="cell-warn">－4日</span>';
    }
    // 入浴
    const bac=(rec.bath||[]).length?'<span class="cell-ok">○</span>':'<span class="cell-empty">—</span>';
    // 食事
    const mc=(rec.meal&&rec.meal.menu)?'<span class="cell-ok">○</span>':'<span class="cell-empty">—</span>';
    // レク（申し送り）
    const rc=(rec.rec&&(rec.rec.content||(rec.rec.chips&&rec.rec.chips.length)))?'<span class="cell-ok">○</span>':'<span class="cell-empty">—</span>';
    // 服薬
    const med=rec.med||{};
    const _mReal=t=>med[t]&&med[t].items&&med[t].items.some(i=>i!=='服薬なし');
    const _mAny=t=>med[t]&&med[t].items&&med[t].items.length>0;
    const _isToday=dk()===dk(new Date());
    const _nowH=new Date().getHours()+new Date().getMinutes()/60;
    const _mParts=[];
    [{t:'morning',th:8.5},{t:'lunch',th:12},{t:'dinner',th:18},{t:'bedtime',th:21}].forEach(({t,th})=>{
      if(_mReal(t)) _mParts.push('<span style="color:var(--blue);font-weight:700;">✔</span>');
      else if(_mAny(t)){}
      else if(_isToday&&_nowH>=th) _mParts.push('<span style="color:var(--orange2);font-weight:700;">？</span>');
    });
    const mdc=_mParts.length?`<span class="cell-val" style="font-size:18px;letter-spacing:1px;">${_mParts.join('')}</span>`:'<span class="cell-empty">—</span>';

    return `<tr>
      <td style="width:32px;min-width:32px;padding:4px;" onclick="openDetail('${r.name}','notes')">${nc}</td>
      <td class="name-cell">
        <div class="name-txt" onclick="openSummary('${r.name}')">${r.name}</div>
        <div class="name-sub">${r.care||''}</div>
      </td>
      <td onclick="openDetail('${r.name}','vital')">${tc}</td>
      <td onclick="openDetail('${r.name}','vital')">${bc}</td>
      <td onclick="openDetail('${r.name}','vital')">${pc}</td>
      <td onclick="openDetail('${r.name}','vital')">${sc}</td>
      <td onclick="openDetail('${r.name}','excretion')">${ec}</td>
      <td onclick="openDetail('${r.name}','excretion')">${lsc}</td>
      <td onclick="openDetail('${r.name}','bath')">${bac}</td>
      <td onclick="openDetail('${r.name}','meal')">${mc}</td>
      <td onclick="openDetail('${r.name}','rec')">${rc}</td>
      <td onclick="openDetail('${r.name}','med')">${mdc}</td>
    </tr>`;
  }).join('');
}

// ========== 48時間履歴取得 ==========
function get48h(name, field){
  const now=Date.now(), limit=72*3600000, all=[];
  for(let d=0;d<=2;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const k=dk(dt);
    const dayData=db.records[k]&&db.records[k][name];
    if(!dayData||!dayData[field]) continue;
    dayData[field].forEach((item,i)=>{
      const ts=new Date(k+'T'+(item.time||'00:00')+':00').getTime();
      if(now-ts<=limit) all.push({...item,_dk:k,_i:i,_ts:ts});
    });
  }
  return all.sort((a,b)=>b._ts-a._ts);
}
function get48hMed(name){
  const now=Date.now(),limit=72*3600000,all=[];
  const ORDER=['morning','lunch','dinner','bedtime'];
  for(let d=0;d<=2;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const k=dk(dt);
    const dayData=db.records[k]&&db.records[k][name];
    if(!dayData||!dayData.med) continue;
    ORDER.forEach(t=>{
      const m=dayData.med[t];
      if(!m||!m.items||!m.items.length) return;
      const ts=new Date(k+'T'+(m.time||'00:00')+':00').getTime();
      if(now-ts<=limit) all.push({...m,_dk:k,_timing:t,_ts:ts});
    });
  }
  return all.sort((a,b)=>b._ts-a._ts);
}
function recDayLabel(dkStr){
  const dt=new Date(dkStr+'T00:00:00');
  const today=dk(); const yesterday=dk(new Date(Date.now()-86400000));
  if(dkStr===today) return '今日';
  if(dkStr===yesterday) return '昨日';
  return `${pad(dt.getMonth()+1)}/${pad(dt.getDate())}`;
}

          ).join('')}

function toggleMedChip(el,item,timing){
  if(item==='服薬なし'){

    el.classList.toggle('none-on');

    document.querySelectorAll(`#medChips_${timing} .med-chip.none-on`).forEach(e=>e.classList.remove('none-on'));
    el.classList.toggle('on');
  }

  const other=(document.getElementById(`medOther_${timing}`)?.value||'').trim();
  const items=[...chipped,...(other?other.split('、').map(s=>s.trim()).filter(Boolean):[])];

  }
  const dayHistHtml=dayHist.length?dayHist.map(h=>`<div class="hist-item">
    <div class="hist-time">${recDayLabel(h._dk)}</div>
    <div class="hist-content">${h.text}</div>
  </div>`).join(''):'<div class="text-gray" style="font-size:14px;padding:8px 0;">記録なし</div>';
  return `<div class="panel">
    <div class="panel-sec"><h3>直近の記録（3回分）</h3><div class="hist-list">${dayHistHtml}</div></div>
    <div class="panel-sec">
      <h3>1日の様子</h3>
      <div class="fg"><label>選択（複数可）</label><div id="dayChips" style="display:flex;flex-wrap:wrap;gap:4px;">${dayChips}</div></div>
      <div class="fg"><label>自由記入</label><textarea id="dayText" rows="3" placeholder="その他の様子">${rec.day||''}</textarea></div>
      <button class="btn btn-primary btn-block" onclick="saveDay()">記録</button>
    </div>
  </div>`;
}
function toggleDayChip(el,item){
  el.classList.toggle('selected');
  const sel=[...document.querySelectorAll('#dayChips .chip.selected')].map(e=>e.textContent);
  const ta=document.getElementById('dayText');
  if(ta){
    const free=ta.value.replace(/^[^。！？\n]*/, '').trim();
    ta.value=sel.join('、')+(free?`\n${free}`:'');
  }
}
function saveDay(){
  const r=getRec(curRes);
  r.day=document.getElementById('dayText').value.trim();
  saveDB(); showSavedToast(); goBack();
}

// ========== 設定画面 ==========
const SETTINGS_TABS=[
  {id:'facility', label:'施設・ロゴ'},
  {id:'residents',label:'利用者管理'},
  {id:'staff',    label:'スタッフ'},
  {id:'supply',   label:'消耗品マスタ'},
  {id:'ex_opts',   label:'排泄項目'},
  {id:'rec_opts',  label:'レク項目'},
  {id:'care_opts', label:'ケア記録項目'},
  {id:'day_opts',  label:'1日の様子'},
];
let curSettingsTab='facility';

function openSettings(){
  renderSettingsTabs();
  renderSettingsPanel(curSettingsTab);
  showScreen('settingsScreen');
}
function closeSettings(){
  showScreen('mainScreen');
  renderMain();
}
function renderSettingsTabs(){
  document.getElementById('settingsTabs').innerHTML=SETTINGS_TABS.map(t=>
    `<div class="settings-tab${curSettingsTab===t.id?' active':''}" onclick="switchSettingsTab('${t.id}')">${t.label}</div>`
  ).join('');
}
function switchSettingsTab(id){
  curSettingsTab=id;
  renderSettingsTabs();
  renderSettingsPanel(id);
}
function renderSettingsPanel(id){
  const el=document.getElementById('settingsBody');
  switch(id){
    case 'facility':  el.innerHTML=buildFacilitySettings(); break;
    case 'residents': el.innerHTML=buildResidentSettings(); break;
    case 'staff':     el.innerHTML=buildStaffSettings(); break;
    case 'supply':    el.innerHTML=buildSupplySettings(); break;
    case 'ex_opts':   el.innerHTML=buildListSettings('排泄項目','exUrineOptions','尿量オプション','exPadOptions','パッド汚染オプション','exStoolOptions','排便オプション'); break;
    case 'rec_opts':  el.innerHTML=buildSingleListSettings('レク項目','recItems'); break;
    case 'care_opts': el.innerHTML=buildSingleListSettings('ケア記録項目','careItems'); break;
    case 'day_opts':  el.innerHTML=buildSingleListSettings('1日の様子項目','dayItems'); break;
  }
}

function buildFacilitySettings(){
  const S=db.settings||{};
  return `<div class="settings-panel active">
    <div class="panel-sec">
      <h3>施設名</h3>
      <div class="fg"><input type="text" id="stFacName" value="${S.facilityName||FAC.name}" placeholder="施設名"></div>
      <button class="btn btn-primary btn-sm" onclick="saveFacilityName()">保存</button>
    </div>
    <div class="panel-sec">
      <h3>ロゴ画像</h3>
      ${S.logoB64?`<img src="data:image/png;base64,${S.logoB64}" style="max-height:60px;margin-bottom:10px;display:block;">`:'' }
      <div class="fg"><label>画像ファイル（PNG/JPG）</label>
        <input type="file" id="logoFile" accept="image/*" onchange="loadLogo(this)">
      </div>
      ${S.logoB64?`<button class="btn btn-danger btn-sm" onclick="clearLogo()">ロゴを削除</button>`:''}
    </div>
  </div>`;
}
function saveFacilityName(){
  db.settings.facilityName=document.getElementById('stFacName').value.trim();
  saveDB();
  renderSettingsPanel('facility');
  alert('施設名を保存しました');
}
function loadLogo(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result.split(',')[1];
    db.settings.logoB64=b64; saveDB();
    renderSettingsPanel('facility');
  };
  reader.readAsDataURL(file);
}
function clearLogo(){
  if(!confirm('ロゴを削除しますか？')) return;
  db.settings.logoB64=''; saveDB(); renderSettingsPanel('facility');
}

function buildResidentSettings(){
  const list=db.residents;
  const items=list.map((r,i)=>`<div class="settings-list-item">
    <div class="item-name">${r.name} <span class="text-gray" style="font-size:12px;">${r.care||''}</span></div>
    <button class="item-del" onclick="delResident(${i})">削除</button>
  </div>`).join('');
  return `<div class="settings-panel active">
    <div class="panel-sec">
      <h3>利用者一覧</h3>
      ${items||'<div class="text-gray" style="font-size:13px;">登録なし</div>'}
    </div>
    <div class="panel-sec">
      <h3>利用者追加</h3>
      <div class="fg"><label>氏名</label><input type="text" id="newResName" placeholder="山田 花子"></div>
      <div class="fg"><label>介護度</label>
        <select id="newResCare">
          <option>要支援１</option><option>要支援２</option>
          <option>要介護１</option><option>要介護２</option><option>要介護３</option>
          <option>要介護４</option><option selected>要介護５</option>
        </select>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addResident()">追加</button>
    </div>
  </div>`;
}
function addResident(){
  const name=document.getElementById('newResName').value.trim();
  const care=document.getElementById('newResCare').value;
  if(!name){ alert('氏名を入力してください'); return; }
  db.residents.push({id:genId('r'),name,care,sched:Array(31).fill(0)});
  saveDB(); renderSettingsPanel('residents');
}
function delResident(idx){
  if(!confirm(`「${db.residents[idx].name}」を削除しますか？\n記録データは残ります`)) return;
  db.residents.splice(idx,1);
  saveDB(); renderSettingsPanel('residents');
}

function buildStaffSettings(){
  const list=db.settings.staffList||[];
  const items=list.map((s,i)=>`<div class="settings-list-item">
    <div class="item-name">${s}</div>
    <button class="item-del" onclick="delStaff(${i})">削除</button>
  </div>`).join('');
  return `<div class="settings-panel active">
    <div class="panel-sec">
      <h3>スタッフ一覧</h3>
      ${items||'<div class="text-gray" style="font-size:13px;">登録なし</div>'}
    </div>
    <div class="panel-sec">
      <h3>スタッフ追加</h3>
      <div class="fg"><input type="text" id="newStaff" placeholder="氏名"></div>
      <button class="btn btn-primary btn-sm" onclick="addStaff()">追加</button>
    </div>
  </div>`;
}
function addStaff(){
  const name=document.getElementById('newStaff').value.trim();
  if(!name) return;
  if(!db.settings.staffList) db.settings.staffList=[];
  db.settings.staffList.push(name);
  saveDB(); renderSettingsPanel('staff');
}
function delStaff(idx){
  if(!confirm('削除しますか？')) return;
  db.settings.staffList.splice(idx,1);
  saveDB(); renderSettingsPanel('staff');
}

function buildSupplySettings(){
  const list=db.settings.supplyProducts||[];
  const items=list.map((s,i)=>`<div class="settings-list-item">
    <div class="item-name">${s}</div>
    <button class="item-del" onclick="delSupplyProduct(${i})">削除</button>
  </div>`).join('');
  return `<div class="settings-panel active">
    <div class="panel-sec">
      <h3>消耗品リスト</h3>
      ${items||'<div class="text-gray" style="font-size:13px;">登録なし</div>'}
    </div>
    <div class="panel-sec">
      <h3>商品追加</h3>
      <div class="fg"><input type="text" id="newProduct" placeholder="リハビリパンツM 等"></div>
      <button class="btn btn-primary btn-sm" onclick="addSupplyProduct()">追加</button>
    </div>
  </div>`;
}
function addSupplyProduct(){
  const name=document.getElementById('newProduct').value.trim();
  if(!name) return;
  if(!db.settings.supplyProducts) db.settings.supplyProducts=[];
  db.settings.supplyProducts.push(name);
  saveDB(); renderSettingsPanel('supply');
}
function delSupplyProduct(idx){
  if(!confirm('削除しますか？')) return;
  db.settings.supplyProducts.splice(idx,1);
  saveDB(); renderSettingsPanel('supply');
}

function buildSingleListSettings(title, key){
  const list=db.settings[key]||[];
  const items=list.map((s,i)=>`<div class="settings-list-item">
    <div class="item-name">${s}</div>
    <button class="item-del" onclick="delListItem('${key}',${i})">削除</button>
  </div>`).join('');
  return `<div class="settings-panel active">
    <div class="panel-sec">
      <h3>${title}</h3>
      <div style="max-height:300px;overflow-y:auto;">${items||'<div class="text-gray" style="font-size:13px;">登録なし</div>'}</div>
    </div>
    <div class="panel-sec">
      <h3>項目追加</h3>
      <div class="fg"><input type="text" id="newItem_${key}" placeholder="新しい項目名"></div>
      <button class="btn btn-primary btn-sm" onclick="addListItem('${key}')">追加</button>
    </div>
  </div>`;
}
function buildListSettings(title, ...pairs){
  // 複数リスト（排泄用）
  let html=`<div class="settings-panel active">`;
  for(let i=0;i<pairs.length;i+=2){
    const key=pairs[i], label=pairs[i+1];
    const list=db.settings[key]||[];
    const items=list.map((s,j)=>`<div class="settings-list-item">
      <div class="item-name">${s}</div>
      <button class="item-del" onclick="delListItem('${key}',${j})">削除</button>
    </div>`).join('');
    html+=`<div class="panel-sec">
      <h3>${label}</h3>
      <div style="max-height:200px;overflow-y:auto;">${items||'<div class="text-gray" style="font-size:13px;">登録なし</div>'}</div>
      <div class="fg mt8"><input type="text" id="newItem_${key}" placeholder="追加する選択肢">
        <button class="btn btn-primary btn-sm mt8" onclick="addListItem('${key}')">追加</button>
      </div>
    </div>`;
  }
  html+=`</div>`;
  return html;
}
function addListItem(key){
  const val=document.getElementById(`newItem_${key}`).value.trim();
  if(!val) return;
  if(!db.settings[key]) db.settings[key]=[];
  db.settings[key].push(val);
  saveDB(); renderSettingsPanel(curSettingsTab);
}
function delListItem(key,idx){
  if(!confirm('削除しますか？')) return;
  db.settings[key].splice(idx,1);
  saveDB(); renderSettingsPanel(curSettingsTab);
}

// ========== トースト通知 ==========
function showSavedToast(){
  let t=document.getElementById('savedToast');
  if(!t){ t=document.createElement('div'); t.id='savedToast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 24px;border-radius:24px;font-size:15px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;';
    t.textContent='保存しました'; document.body.appendChild(t); }
  t.style.opacity='1';
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.style.opacity='0',1500);
}

// ========== 初期化 ==========
function init(){
  // URLパラメーター or localStorage から施設を復元
  const savedFac = new URLSearchParams(location.search).get('f')
    || localStorage.getItem('kaigo_last_facility');
  if(savedFac && initFacility(savedFac)){
    startApp();
  } else {
    showScreen('selectScreen');
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
