function handleXlsx(file){
  if(!file) return;
  const msg=document.getElementById('uploadMsg');
  msg.textContent='読み込み中...';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const skip=['氏名','集計項目','利用者合計','介護保険内利用者','介護保険外利用者',
                  'お泊り利用者','入浴利用者','送迎減算利用者','延長加算利用者','個別機能訓練加算利用者'];
      // 名前でグループ化（結合セル対応：直前のcurNameを引き継ぐ）
      var byName={}, cats=[], curName=null, curCare=null;
      for(var i=17;i<data.length;i++){
        var row=data[i];
        if(row[0]&&skip.indexOf(String(row[0]).trim())<0){
          curName=String(row[0]).trim();
          curCare=String(row[1]||'').trim();
        }
        if(!curName) continue;
        if(row[0]&&skip.indexOf(String(row[0]).trim())>=0){curName=null;continue;}
        var cat=String(row[2]||'').trim();
        if(!cat) continue;
        if(cats.indexOf(cat)<0) cats.push(cat);
        if(!byName[curName]) byName[curName]={care:curCare,riyou:null,otomari:null};
        if(cat==='利用') byName[curName].riyou=row;
        if(cat.indexOf('泊')>=0) byName[curName].otomari=row;
      }
      var newRes=[], dailyCount=0;
      var importUBase=Date.now();
      Object.keys(byName).forEach(function(n){
        var v=byName[n], uRow=v.riyou, oRow=v.otomari;
        // D列（col 3 = 1日目）のお泊行に入力があれば常時利用者
        var d1Val=oRow?String(oRow[3]||'').trim():'';
        var isDaily=(oRow&&d1Val.length>0);
        if(!isDaily&&!uRow) return;
        var sched=[];
        for(var c=3;c<=33;c++){
          var dayIdx=c-3;
          if(isDaily){
            sched.push(1);
          } else {
            var uv=uRow[c];
            var val=(uv&&['〇','○','◯'].indexOf(String(uv).trim())>=0)?1:0;
            // 翌日ルール：前日のお泊行に入力があれば翌日も利用扱い（ショートステイ）
            if(oRow&&dayIdx>0&&String(oRow[c-1]||'').trim().length>0) val=1;
            sched.push(val);
          }
        }
        if(isDaily) dailyCount++;
        // 既存利用者のIDを引き継ぐ（同期時に重複しないよう）
        const existing=db.residents.find(r=>r.name===n);
        const id=existing?existing.id:genId('r');
        const serviceType=isDaily?'resident':'day';
        const _u=importUBase+newRes.length;
        newRes.push({id,name:n,care:v.care,sched:sched,serviceType,_u});
      });
      if(newRes.length>0){
        db.residents=newRes;
        saveDB();
        const dailyMsg=dailyCount>0?'（常時利用者'+dailyCount+'名含む）':'';
        msg.innerHTML='<span style="color:var(--green);font-weight:700;">✔ '+newRes.length+'名の予定を読み込みました'+dailyMsg+'</span>'
          +'<br><span style="font-size:13px;color:#888;">区分: '+cats.join(' / ')+' | 常時: '+dailyCount+'名</span>';
        renderMain();
        setTimeout(function(){closeOv('ovUpload');},2000);
      } else {
        msg.innerHTML='<span style="color:var(--red);">利用者データが見つかりませんでした</span>'
          +'<br><span style="font-size:13px;color:#888;">検出された区分: '+cats.join(' / ')+'</span>';
      }
    }catch(err){
      msg.innerHTML='<span style="color:var(--red);">エラー: '+err.message+'</span>';
    }
  };
  reader.readAsArrayBuffer(file);
}

// ========== データ管理 ==========
/** このユニットの localStorage 主要キーの概算バイト数（文字列長×2 近似） */
function estimateFacilityLocalStorageBytes(){
  if(!FAC) return 0;
  let sum=0;
  const keys=[FAC.storageKey,FAC.storageKey+'_dirty',FAC.storageKey+'_logo_b64_v1',FAC.storageKey+'_settings_snap_v1'];
  keys.forEach(k=>{
    try{
      const v=localStorage.getItem(k);
      if(v) sum+=v.length;
    }catch(_){}
  });
  return sum*2;
}
function formatStorageSize(bytes){
  if(bytes<=0) return '0 B';
  if(bytes<1024) return `${bytes} B`;
  if(bytes<1048576) return `${(bytes/1024).toFixed(1)} KB`;
  return `${(bytes/1048576).toFixed(2)} MB`;
}
/** 記録の日キーを cutKey 未満で削除（YYYY-MM-DD 文字列比較） */
function runStorageCleanupRecordsBeforeCutKey(cutKey){
  if(!FAC||!cutKey) return 0;
  const recs=db.records||{};
  const keys=Object.keys(recs).filter(k=>{
    const nk=normalizeDateKey(k);
    return nk&&nk<cutKey;
  });
  keys.forEach(k=>{ delete recs[k]; });
  return keys.length;
}
function runStorageCleanupSuppliesBeforeCutKey(cutKey){
  if(!cutKey) return 0;
  const arr=db.supplies||[];
  const before=arr.length;
  db.supplies=arr.filter(s=>{
    const d=String(s&&s.date||'').trim();
    if(!d) return true;
    const nk=normalizeDateKey(d.slice(0,10));
    return !nk||nk>=cutKey;
  });
  return before-(db.supplies||[]).length;
}
/** _recordItemDel の古いエントリ削除（値が ms タイムスタンプ） */
function runStorageCleanupOldTombstones(maxAgeDays){
  const days=Math.max(30,Number(maxAgeDays)||180);
  const lim=Date.now()-days*86400000;
  const m=db.settings&&db.settings._recordItemDel;
  if(!m||typeof m!=='object'||Array.isArray(m)) return 0;
  let n=0;
  Object.keys(m).forEach(k=>{
    if(_numU(m[k])<lim){ delete m[k]; n++; }
  });
  return n;
}
function runStorageCleanupByMonths(){
  if(!FAC){ alert('施設が未選択です'); return; }
  const sel=document.getElementById('stCleanupMonths');
  const months=parseInt(sel&&sel.value||'0',10)||0;
  if(!months){ alert('「〇ヶ月より前」を選んでください'); return; }
  const cut=new Date();
  cut.setHours(0,0,0,0);
  cut.setMonth(cut.getMonth()-months);
  const cutKey=dk(cut);
  const alsoSup=document.getElementById('stCleanupAlsoSupplies')?.checked;
  const nRec=Object.keys(db.records||{}).filter(k=>{
    const nk=normalizeDateKey(k);
    return nk&&nk<cutKey;
  }).length;
  const nSup=alsoSup?(db.supplies||[]).filter(s=>{
    const d=String(s&&s.date||'').trim();
    if(!d) return false;
    const nk=normalizeDateKey(d.slice(0,10));
    return nk&&nk<cutKey;
  }).length:0;
  if(!nRec&&(!alsoSup||!nSup)){ alert(`${cutKey} より前のデータは見つかりませんでした`); return; }
  const gasWarn=gasConfigured()
    ? '\n\n【重要】GAS 同期を次に実行すると、スプレッドシートは「端末の内容で全面書き換え」されます。削除した日の行はシートからも消えます。必ずバックアップ（月次保存・JSON）を取ってから続行してください。'
    : '';
  const msg=`次の基準より前のデータを端末から削除します。\n基準日（未満）: ${cutKey}\n\n対象: 記録の日付 ${nRec} 日分${alsoSup?` + 消耗品記録 ${nSup} 件`:''}${gasWarn}\n\n実行しますか？`;
  if(!confirm(msg)) return;
  const delDays=runStorageCleanupRecordsBeforeCutKey(cutKey);
  let delSup=0;
  if(alsoSup) delSup=runStorageCleanupSuppliesBeforeCutKey(cutKey);
  coalesceAllRecordArrays(db.records||{});
  saveDB();
  alert(`削除しました。\n記録: ${delDays} 日分${alsoSup?` / 消耗品: ${delSup} 件`:''}\n必要に応じて「🔄同期」を実行してください。`);
  renderSettingsPanel('data');
}
function runStorageTombstoneCleanup(){
  if(!FAC){ alert('施設が未選択です'); return; }
  const inp=document.getElementById('stTombstoneDays');
  const days=Math.max(30,parseInt(inp&&inp.value||'180',10)||180);
  if(!confirm(`削除墓石（同期で消した行の内部管理）のうち、${days}日より古いエントリを消します。\n通常は容量削減に有効で、記録内容には影響しません。続行しますか？`)) return;
  const n=runStorageCleanupOldTombstones(days);
  if(n) touchSetU('_recordItemDel');
  saveDB();
  alert(n?`${n} 件の墓石を削除しました`:'削除対象の墓石はありませんでした`);
  renderSettingsPanel('data');
}

function stampImportedDbForMerge(imported, baseTs){
  let ts=Math.max(_numU(baseTs), Date.now());
  const nextTs=()=>++ts;
  (imported.residents||[]).forEach(r=>{
    if(_numU(r&&r._u)<=0) r._u=nextTs();
  });
  (imported.supplies||[]).forEach(s=>{
    if(_numU(s&&s._u)<=0) s._u=nextTs();
  });
  Object.keys(imported.records||{}).forEach(dk=>{
    Object.keys((imported.records||{})[dk]||{}).forEach(name=>{
      const rec=(imported.records||{})[dk][name];
      if(!rec) return;
      ['vital','excretion','bath','care','notes'].forEach(field=>{
        (rec[field]||[]).forEach(item=>{
          if(!item) return;
          if(_numU(item.sheetU||item.u)<=0) item.sheetU=nextTs();
        });
      });
      rec.meal=rec.meal||{};
      if(_numU(rec.meal._u)<=0) rec.meal._u=nextTs();
      rec.rec=rec.rec||{};
      if(_numU(rec.rec._u)<=0 && (rec.rec.content||rec.rec.time||(rec.rec.chips||[]).length)) rec.rec._u=nextTs();
      rec.med=rec.med||{};
      ['morning','lunch','dinner','bedtime'].forEach(timing=>{
        const m=rec.med[timing];
        if(!m) return;
        if(_numU(m._u)<=0 && ((m.items||[]).length||m.time||m.staff)) m._u=nextTs();
      });
      if(_numU(rec._dayU)<=0 && (rec.day||rec.dayWriter)) rec._dayU=nextTs();
    });
  });
}
function importDB(input){
  const file=input.files[0]; if(!file) return;
  if(!confirm('バックアップJSONを読み込みます。\n\n【安全モード】タイムスタンプが新しいデータを優先してマージします。\n（古いデータで新しい記録を上書きしません）\n\n実行しますか？')){ input.value=''; return; }
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(!imported||typeof imported!=='object') throw new Error('JSON形式が不正です');
      if(!imported.residents) imported.residents=[];
      if(!imported.records) imported.records={};
      if(!imported.supplies) imported.supplies=[];
      if(!imported.settings) imported.settings={};
      imported.records=normalizeRecordsMap(imported.records||{});
      normalizeVitalTempsInRecords(imported.records);
      imported.settings=Object.assign(cloneDeep(DEFAULT_SETTINGS), imported.settings||{});
      imported._setU=imported._setU||{};
      const baseTs=Date.now()-1000;
      Object.keys(imported.settings).forEach(k=>{
        if(k==='logoB64') return;
        if(_numU(imported._setU[k])>0) return;
        if(settingHasValue(imported.settings[k])) imported._setU[k]=baseTs;
      });
      // 旧アプリJSONは更新時刻が無いことがあり、同時刻(0)比較でローカルが勝って取り込めないため補完する
      stampImportedDbForMerge(imported, Date.now()+1000);
      db=mergePulledDb(db, imported);
      saveDB(); alert('インポート完了しました（新しいデータ優先でマージ）'); startApp();
    }catch(err){ alert('読み込みエラー: '+err.message); }
  };
  reader.readAsText(file);
}

// ========== 旧アプリからのデータ移行 ==========
function migrateFromOldApp(){
  const oldRaw = localStorage.getItem('kaigo3');
  if(!oldRaw){
    alert('旧アプリのデータが見つかりません。\n旧アプリと同じURLで開いている場合のみ移行できます。');
    return;
  }
  if(!confirm('旧アプリ（介護記録）のデータを移行します。\n\n・利用者・記録データを追加（重複除外）\n・スタッフ名・施設名を引き継ぎ\n・現在のデータは保持されます\n\n実行しますか？')) return;

  try{
    const old = JSON.parse(oldRaw);
    let addedRes=0, addedDays=0, addedStaff=0;

    // ── 利用者をマージ ──
    if(old.residents && old.residents.length){
      const existIds = new Set(db.residents.map(r=>r.id));
      old.residents.forEach(r=>{
        if(!existIds.has(r.id)){ db.residents.push(r); addedRes++; }
        else{
          // 既存利用者のスケジュールを旧データで上書き
          const idx=db.residents.findIndex(x=>x.id===r.id);
          if(idx>=0) db.residents[idx]=Object.assign({},r,{id:r.id});
        }
      });
    }

    // ── 記録をマージ ──
    if(old.records){
      Object.entries(old.records).forEach(([dateK, dayData])=>{
        if(!db.records[dateK]){ db.records[dateK]=dayData; addedDays++; return; }
        Object.entries(dayData).forEach(([name, rec])=>{
          if(!db.records[dateK][name]){ db.records[dateK][name]=rec; return; }
          const tr=db.records[dateK][name];
          ['vital','excretion','bath','care','notes'].forEach(field=>{
            if(!rec[field]||!rec[field].length) return;
            if(!tr[field]||!tr[field].length){ tr[field]=rec[field]; return; }
            const keys=new Set(tr[field].map(e=>e.id||e.time||JSON.stringify(e)));
            rec[field].forEach(e=>{
              const k=e.id||e.time||JSON.stringify(e);
              if(!keys.has(k)) tr[field].push(e);
            });
            tr[field].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
          });
          // meal: 旧データが初期値100のままでなければ上書き
          if(rec.meal && (rec.meal.bMain!==100||rec.meal.main!==100||rec.meal.dMain!==100||rec.meal.menu)){
            if(tr.meal.bMain===100&&tr.meal.main===100&&tr.meal.dMain===100&&!tr.meal.menu){
              tr.meal=rec.meal;
            }
          }
          if(rec.day && !tr.day) tr.day=rec.day;
          if(rec.rec && rec.rec.content && !tr.rec.content) tr.rec=rec.rec;
        });
      });
    }

    // ── スタッフリストをマージ ──
    try{
      const oldStaff=JSON.parse(localStorage.getItem('staffList')||'[]');
      if(Array.isArray(oldStaff) && oldStaff.length){
        if(!db.settings.staffList) db.settings.staffList=[];
        const existing=new Set(db.settings.staffList);
        oldStaff.forEach(s=>{ if(s&&!existing.has(s)){ db.settings.staffList.push(s); addedStaff++; }});
      }
    }catch(e){}

    // ── 施設名（未設定の場合のみ）──
    try{
      const oldFac=localStorage.getItem('facilityName');
      if(oldFac && !db.settings.facilityName) db.settings.facilityName=oldFac;
    }catch(e){}

    // ── 1日の様子フレーズをdayItemsにマージ ──
    try{
      const oldDay=JSON.parse(localStorage.getItem('dayPhrases')||'[]');
      if(oldDay.length){
        const ex=new Set(db.settings.dayItems||[]);
        oldDay.forEach(p=>{ if(p&&!ex.has(p)) db.settings.dayItems.push(p); });
      }
    }catch(e){}

    // ── ケアフレーズをcareItemsにマージ ──
    try{
      const oldCare=JSON.parse(localStorage.getItem('carePhrases')||'[]');
      if(oldCare.length){
        const ex=new Set(db.settings.careItems||[]);
        oldCare.forEach(p=>{ if(p&&!ex.has(p)) db.settings.careItems.push(p); });
      }
    }catch(e){}

    saveDB();
    const msg=[
      '✅ 移行が完了しました！',
      '',
      '利用者: '+(addedRes>0?addedRes+'人を追加':'変更なし（既存データ優先）'),
      '記録日数: '+Object.keys(db.records).length+'日分',
      'スタッフ: '+(addedStaff>0?addedStaff+'名を追加':'変更なし'),
    ].join('\n');
    alert(msg);
    renderSettingsPanel('data');
    renderMain();
  }catch(err){
    console.error('Migration error:',err);
    alert('移行中にエラーが発生しました:\n'+err.message);
  }
}

function getDatesInRange(from,to){
  const dates=[];
  const d=new Date(from+'T00:00:00');
  const end=new Date(to+'T00:00:00');
  while(d<=end){ dates.push(dk(d)); d.setDate(d.getDate()+1); }
  return dates;
}

function splitCareContentToParts(content){
  const s=String(content||'').trim();
  if(!s) return {items:'', memo:''};
  const opts=new Set((db.settings&&db.settings.careItems)||[]);
  const tokens=s.split(/[、,\n]/).map(t=>t.trim()).filter(Boolean);
  const items=[], memo=[];
  tokens.forEach(t=>{ (opts.has(t)?items:memo).push(t); });
  if(!items.length && !memo.length) return {items:'', memo:s};
  return {items:items.join('、'), memo:memo.join('、')||(!items.length?s:'')};
}
function dedupePrintRows(list, makeKey){
  const seen=new Set();
  return list.filter(row=>{
    const key=makeKey(row);
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}
function getCareContentText(c){
  return String(c&&(
    c.content ??
    c.ca0 ??
    c.memo ??
    c.note ??
    c.text ??
    ''
  )).trim();
}

    <table class="print-table">
      <thead><tr><th>日付</th><th>氏名</th><th>時刻</th><th>体温(℃)</th><th>血圧</th><th>脈拍</th><th>SpO2(%)</th><th>体重(kg)</th><th>担当</th></tr></thead>

function printCareRange(){
  const from=document.getElementById('printCareFrom').value;
  const to=document.getElementById('printCareTo').value;
  const resName=document.getElementById('printCareRes')?.value||'__all__';
  if(!from||!to){ alert('期間を入力してください'); return; }
  const dates=getDatesInRange(from,to);
  let html=`<div class="print-title">${FAC.name} ケア記録サマリー ${from} ～ ${to}</div>`;
  const targets=resName==='__all__'?[...db.residents].sort(compareResidentsStable):db.residents.filter(r=>r.name===resName);
  targets.forEach((res,ri)=>{
    const rawRows=[];
    dates.forEach(dateKey=>{
      const rec=db.records[dateKey]&&db.records[dateKey][res.name];
      if(!rec) return;

      // バイタル
      (rec.vital||[]).forEach(v=>{
        const parts=[];
        const tv=normalizeTempValue(v.temp);
        if(tv!=='' && tv!=null) parts.push('体温:'+tv+'℃');
        if((v.sbp&&String(v.sbp).trim()) || (v.dbp&&String(v.dbp).trim())) parts.push('血圧:'+(v.sbp||'')+'/'+(v.dbp||''));
        if(v.pulse&&String(v.pulse).trim()) parts.push('脈拍:'+v.pulse);
        if(v.spo2&&String(v.spo2).trim()&&v.spo2!=='—') parts.push('SpO2:'+v.spo2+'%');
        if(v.weight&&String(v.weight).trim()) parts.push('体重:'+v.weight+'kg');
        if(!parts.length) return;
        rawRows.push({
          dk:dateKey,
          t:normalizeTimeText(v.time)||'',
          cat:'バイタル',
          body:parts.join('、'),
          staff:v.staff||'',
          _key:'v:'+(v.id||(v.time+'|'+parts.join('')))
        });
      });

      // 排泄
      (rec.excretion||[]).forEach(e=>{
        const parts=[];
        if(e.urine&&e.urine!=='なし') parts.push('排尿:'+e.urine);
        else if(e.urine==='なし') parts.push('排尿:なし');
        if(e.pad&&e.pad!=='なし') parts.push('パット:'+e.pad);
        if(e.stool&&e.stool!=='なし') parts.push('排便:'+e.stool);
        else if(e.stool==='なし') parts.push('排便:なし');
        // 交換系フラグ
        const flags=[];
        if(e.padChange) flags.push('パット交換');
        if(e.rehaChange) flags.push('リハパン交換');
        if(e.diaperChange) flags.push('おむつ交換');
        if(flags.length) parts.push(flags.join('・'));
        if(!parts.length) return;
        rawRows.push({
          dk:dateKey,
          t:normalizeTimeText(e.time)||'',
          cat:'排泄',
          body:parts.join('、'),
          staff:e.writer||e.staff||'',
          _key:'e:'+(e.id||(e.time+'|'+parts.join('')))
        });
      });

      // 入浴
      (rec.bath||[]).forEach(b=>{
        const type=b.type||'';
        if(!type) return;
        rawRows.push({
          dk:dateKey,
          t:normalizeTimeText(b.time)||'',
          cat:'入浴',
          body:type,
          staff:b.staff||'',
          _key:'b:'+(b.id||(b.time+'|'+type))
        });
      });

      // 食事（入力があるときだけ行を出す）
      const ml=rec.meal||{};
      const hasMeal = (k)=>ml[k]!=null && String(ml[k]).trim()!=='';
      // 朝食
      if(hasMeal('bMain')||hasMeal('bSide')||hasMeal('bWater')){
        const parts=[];
        if(hasMeal('bMain')) parts.push('主食:'+ml.bMain+'%');
        if(hasMeal('bSide')) parts.push('副食:'+ml.bSide+'%');
        if(hasMeal('bWater')) parts.push('水分:'+ml.bWater+'ml');
        rawRows.push({
          dk:dateKey,
          t:normalizeTimeText(ml.bTime)||'07:30',
          cat:'朝食',
          body:parts.join('、'),
          staff:'',
          _key:'mb:'+dateKey
        });
      }
      // 昼食
      if(hasMeal('main')||hasMeal('side')||hasMeal('water')||hasMeal('menu')||hasMeal('snack')){
        const parts=[];
        if(hasMeal('main')) parts.push('主食:'+ml.main+'%');
        if(hasMeal('side')) parts.push('副食:'+ml.side+'%');
        if(hasMeal('water')) parts.push('水分:'+ml.water+'ml');
        if(hasMeal('menu')) parts.push('メニュー:'+ml.menu);
        if(hasMeal('snack')) parts.push('おやつ:'+ml.snack);
        rawRows.push({
          dk:dateKey,
          t:normalizeTimeText(ml.time)||'11:50',
          cat:'昼食',
          body:parts.join('、'),
          staff:'',
          _key:'ml:'+dateKey
        });
      }
      // 夕食
      if(hasMeal('dMain')||hasMeal('dSide')||hasMeal('dWater')){
        const parts=[];
        if(hasMeal('dMain')) parts.push('主食:'+ml.dMain+'%');
        if(hasMeal('dSide')) parts.push('副食:'+ml.dSide+'%');
        if(hasMeal('dWater')) parts.push('水分:'+ml.dWater+'ml');
        rawRows.push({
          dk:dateKey,
          t:normalizeTimeText(ml.dTime)||'17:30',
          cat:'夕食',
          body:parts.join('、'),
          staff:'',
          _key:'md:'+dateKey
        });
      }

      // 服薬
      MED_TIMINGS.forEach(mt=>{
        const mm=(rec.med&&rec.med[mt.id])||{};
        const items=(mm.items||[]).filter(Boolean);
        const hasData=items.length||String(mm.time||'').trim()||String(mm.staff||'').trim();
        if(!hasData) return;
        rawRows.push({
          dk:dateKey,
          t:normalizeTimeText(mm.time)||'',
          cat:'服薬',
          body:`${mt.label}：${items.join('、')||'（内容未入力）'}`,
          staff:mm.staff||'',
          _key:'m:'+mt.id+':'+(mm._u||'')+':'+(mm.time||'')+':'+(items.join('|'))
        });
      });

      // ケア記録
      (rec.care||[]).forEach(c=>{
        const content=getCareContentText(c);
        if(!content) return;
        rawRows.push({
          dk:dateKey,
          t:normalizeTimeText(c.time)||'',
          cat:'ケア記録',
          body:content,
          staff:c.staff||'',
          _key:'c:'+(c.id||(c.time+'|'+content))
        });
      });
    });

    // 重複除去（id / 内容キーで）
    const deduped=dedupePrintRows(rawRows, row=>[res.name,row.dk,row._key,row.cat,row.t,row.body,row.staff].join('|'));

    // 日付→時刻→項目順にソート
    const catOrder={'バイタル':1,'排泄':2,'入浴':3,'朝食':4,'昼食':5,'夕食':6,'服薬':7,'ケア記録':8};
    deduped.sort((a,b)=>{
      if(a.dk!==b.dk) return a.dk<b.dk?-1:1;
      const at=a.t||'99:99', bt=b.t||'99:99';
      if(at!==bt) return at<bt?-1:1;
      return (catOrder[a.cat]||99)-(catOrder[b.cat]||99);
    });

    // 行HTML
    const rows=deduped.map(row=>{
      return `<tr><td>${row.dk}</td><td>${row.t||''}</td><td>${row.cat}</td><td>${row.body||''}</td><td>${row.staff||''}</td></tr>`;
    });

    if(rows.length>0){
      const pageBreak=ri>0?'style="page-break-before:always;"':'';
      html+=`<div class="print-subtitle" ${pageBreak}>${res.name}（${res.care||''}）</div>
      <table class="print-table">
        <thead><tr><th>日付</th><th>時刻</th><th>項目</th><th>内容</th><th>担当</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>`;
    }
  });
  document.getElementById('printArea').innerHTML=html;
  window.print();
}

// ========== 連絡帳印刷 ==========
function openPrint(){
  document.getElementById('pDate').value=dk();
  const day=curDate.getDate()-1;
  const resList=residentsOnDaySorted(day);
  const cont=document.getElementById('pResidents');
  cont.innerHTML=resList.map(r=>`<button class="chip" style="border:2px solid var(--bdr);" onclick="this.classList.toggle('selected')">${r.name}</button>`).join('');
  openOv('ovPrint');
}

function buildPrintPages(sel, date){
  const d=new Date(date+'T00:00:00');
  const days=['日','月','火','水','木','金','土'];
  const dateLabel=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+days[d.getDay()]+'）';
  let pages='';
  sel.forEach((name,pidx)=>{
    const rec=getRec(name,date);
    const rows=[];
    // バイタル
    rec.vital.forEach(v=>rows.push({t:normalizeTimeText(v.time),cat:'バイタル',body:'体温：'+normalizeTempValue(v.temp)+'℃、血圧：'+v.sbp+'/'+v.dbp+'、脈拍：'+v.pulse+'/分'+(v.spo2&&v.spo2!=='—'?'、SpO2：'+v.spo2+'%':'')}));
    // 排泄
    rec.excretion.forEach(e=>rows.push({t:e.time,cat:'排泄',body:'排尿:'+e.urine+(e.pad&&e.pad!=='なし'?'、パット:'+e.pad:'')+'、排便:'+e.stool}));
    // 入浴
    rec.bath.forEach(b=>rows.push({t:b.time,cat:'入浴',body:b.type}));
    // 食事（常に3食表示）
    const ml=rec.meal||{};
    rows.push({t:ml.bTime||'07:30',cat:'朝食',body:'主食：'+(ml.bMain||0)+'%、副食：'+(ml.bSide||0)+'%'+(ml.bWater?'、水分：'+ml.bWater+'ml':'')});
    rows.push({t:ml.time||'11:50',cat:'昼食',body:'主食：'+(ml.main||0)+'%、副食：'+(ml.side||0)+'%'+(ml.water?'、水分：'+ml.water+'ml':'')+(ml.menu?'　メニュー：'+ml.menu:'')});
    rows.push({t:ml.dTime||'17:30',cat:'夕食',body:'主食：'+(ml.dMain||0)+'%、副食：'+(ml.dSide||0)+'%'+(ml.dWater?'、水分：'+ml.dWater+'ml':'')});
    // レク
    if(rec.rec&&rec.rec.content) rows.push({t:'',cat:'レク',body:rec.rec.content});
    rows.sort((a,b)=>a.t&&b.t?a.t.localeCompare(b.t):a.t?-1:1);
    const trs=rows.map(rr=>'<tr><td>'+rr.t+'</td><td>'+rr.cat+'</td><td>'+rr.body+'</td></tr>').join('')
      ||'<tr><td colspan="3" style="text-align:center;color:#999;">記録なし</td></tr>';
    const dayText=rec.day||'';
    let nxt='—';
    const rr=db.residents.find(x=>x.name===name);
    if(rr){const dNum=d.getDate();for(let dd=dNum;dd<(rr.sched||[]).length;dd++){if(rr.sched[dd]===1){const nd=new Date(d.getFullYear(),d.getMonth(),dd+1);nxt=(nd.getMonth()+1)+'月'+nd.getDate()+'日（'+days[nd.getDay()]+'）';break;}}}
    const isLast=pidx===sel.length-1;
    pages+='<div class="page'+(isLast?' last':'')+'">'
      +'<h1>介護記録（連絡帳）</h1>'
      +'<div class="meta"><span class="meta-name">利用者名　<strong>'+name+'</strong>　様</span><span class="meta-date">'+dateLabel+'</span></div>'
      +'<table><thead><tr><th class="col-time">時間</th><th class="col-cat">項目</th><th class="col-body">内容</th></tr></thead><tbody>'+trs+'</tbody></table>'
      +'<div class="biko"><div class="biko-label">1日の様子</div><div class="biko-body">'+dayText+'</div></div>'
      +'<div class="next">次回利用予定日　'+nxt+'</div>'
      +'</div>';
  });
  return pages;
}

  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<title>介護記録（連絡帳）</title>'
    +'<style>'
    +'*{box-sizing:border-box;margin:0;padding:0;}'
    +'body{font-family:\'Hiragino Sans\',\'Yu Gothic\',\'Meiryo\',sans-serif;font-size:10.5pt;line-height:1.4;}'
    +'h1{font-size:13pt;font-weight:bold;text-align:center;margin-bottom:6pt;letter-spacing:1pt;}'
    +'.meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6pt;font-size:9.5pt;}'
    +'.meta span{white-space:nowrap;}'
    +'.meta-name strong{font-size:11pt;border-bottom:1px solid #000;padding-right:20pt;}'
    +'table{width:100%;border-collapse:collapse;table-layout:fixed;margin-bottom:6pt;}'
    +'.col-time{width:44pt;}.col-cat{width:60pt;}'
    +'th,td{padding:2pt 4pt;border:1px solid #bbb;word-break:break-all;overflow-wrap:break-word;white-space:pre-wrap;font-size:9.5pt;line-height:1.35;vertical-align:top;}'
    +'th{background:#f0f0f0;font-weight:bold;}'
    +'.biko{margin-bottom:6pt;}'
    +'.biko-label{font-weight:bold;font-size:9.5pt;margin-bottom:2pt;}'
    +'.biko-body{border:1px solid #bbb;padding:4pt;font-size:9.5pt;line-height:1.6;min-height:24pt;white-space:pre-wrap;}'
    +'.next{text-align:right;font-size:9pt;}'
    +'.noprint{padding:8px;background:#f5f5f5;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;}'
    +'@media screen{.page{width:148mm;min-height:210mm;margin:10px auto;padding:10mm;background:#fff;border:1px solid #ddd;}}'
    +'@media print{'
    +'@page{size:A5 portrait;margin:8mm;}'
    +'html,body{margin:0;padding:0;}'
    +'body{font-size:10.5pt;line-height:1.4;-webkit-print-color-adjust:exact;print-color-adjust:exact;}'
    +'.page{width:100%;margin:0;padding:0;page-break-after:always;break-after:page;}'
    +'.page.last{page-break-after:auto;break-after:auto;}'
    +'.noprint{display:none;}'
    +'}'
    +'</style>'
    +'</head><body>'
    +'<div class="noprint">'
    +'<button onclick="window.close()" style="padding:8px 16px;font-size:14px;background:#888;color:#fff;border:none;border-radius:6px;cursor:pointer;">✕ 閉じる</button>'
    +'<button id="sb" onclick="var a=this.dataset.m!==\'a4\';var ss=document.getElementsByTagName(\'style\')[0];ss.textContent=ss.textContent.replace(a?\'A5 portrait\':\'A4 portrait\',a?\'A4 portrait\':\'A5 portrait\').replace(a?\'width:148mm\':\'width:210mm\',a?\'width:210mm\':\'width:148mm\').replace(a?\'margin:8mm\':\'margin:10mm\',a?\'margin:10mm\':\'margin:8mm\');this.dataset.m=a?\'a4\':\'\';this.textContent=a?\'A5に切替\':\'A4に切替\';" style="padding:8px 16px;font-size:14px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;">A4に切替</button>'
    +'<button onclick="setTimeout(function(){window.print();},800)" style="padding:8px 18px;font-size:14px;background:#E87722;color:#fff;border:none;border-radius:6px;cursor:pointer;">🖨 印刷/PDF</button>'
    +'</div>'
    +pages
    +'</body></html>';
}

function doPrint(){
  const date=document.getElementById('pDate').value;
  const sel=[...document.querySelectorAll('#pResidents .chip.selected')].map(b=>b.textContent);
  if(!sel.length){alert('利用者を選択してください');return;}
  closeOv('ovPrint');
  const pages=buildPrintPages(sel,date);
  const html=buildPrintHtml(pages);
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const w=window.open(url,'_blank','width=800,height=700');
  if(!w){alert('ポップアップを許可してください');return;}
}

// ========== 月次バックアップ ==========
function saveMonthlyBackup(){
  const now=new Date();
  const ym=`${now.getFullYear()}${pad(now.getMonth()+1)}`;
  const fname=`kaigo_${FAC.name}_${ym}.json`;
  const json=JSON.stringify(db,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const file=new File([blob],fname,{type:'application/json'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:fname})
      .catch(e=>{if(e.name!=='AbortError')alert('保存エラー: '+e.message);});
  } else {
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=fname; a.click();
    URL.revokeObjectURL(url);
  }
}

// ========== トースト通知 ==========
function showSavedToast(){
  let t=document.getElementById('savedToast');
  if(!t){ t=document.createElement('div'); t.id='savedToast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 24px;border-radius:24px;font-size:15px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;';
    t.textContent='保存しました'; document.body.appendChild(t); }
  t.style.opacity='1';
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.style.opacity='0',1500);
}

function init(){
  gasCredentialsInit();
  const params=new URLSearchParams(location.search);
  const savedFac=params.get('f')||localStorage.getItem('kaigo_last_facility');
  if(savedFac && initFacility(savedFac)){
    localStorage.setItem('kaigo_last_facility', savedFac);
    syncFacilityIntoUrl(savedFac);
    startApp();
  } else {
    showScreen('selectScreen');
  }
}

});
