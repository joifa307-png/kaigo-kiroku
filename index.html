<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="介護記録">
<meta http-equiv="Cache-Control" content="max-age=0, must-revalidate">
<title id="pageTitle">介護記録</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ===== CSS変数 ===== */
:root{
  --blue:#185FA5; --blue2:#E6F1FB;
  --orange:#E87722; --orange2:#C45F0A; --orange-bg:#FEF0E6;
  --green:#0F6E56; --green2:#E1F5EE; --green-bg:#E1F5EE;
  --red:#A32D2D; --red2:#FCEBEB;
  --text1:#1A1916; --text2:#5C5A54; --text3:#9E9C94;
  --border1:#DDDBD4; --border2:#C8C5BC;
  --bg:#F5F4F0; --white:#fff;
  /* 詳細画面：パネル白との差をやや強める（背景を約1段階濃く） */
  --detail-screen-bg:#E4DFD4; --detail-screen-bg2:#D8D2C6;
  --r1:7px; --r2:10px; --r3:16px;
  --shadow:0 2px 8px rgba(0,0,0,.10);
}

/* ===== リセット ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;
  background:var(--bg);color:var(--text1);font-size:30px;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:30px;}

/* ===== ヘッダー共通 ===== */
.hdr{
  background:linear-gradient(135deg,#fff 0%,#FEF6F0 100%);
  border-bottom:1px solid var(--border1);
  padding:4px 10px;display:flex;align-items:center;gap:6px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
  /* iPad 狭幅で右端の🔄等が画面外に出たり、下の表にタッチが奪われるのを防ぐ */
  overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;
}
.hdr-logo{height:60px;width:auto;display:block;}
.hdr-title{font-weight:700;font-size:16px;color:var(--orange2);}
.hdr-facility{font-size:12px;color:var(--text3);margin-left:4px;}
.hdr-btn{
  padding:7px 12px;border-radius:var(--r2);border:1px solid var(--border2);
  background:var(--white);color:var(--text2);font-size:14px;
  cursor:pointer;white-space:nowrap;user-select:none;
  flex-shrink:0;
}
.hdr-btn:active{opacity:.7;}
.hdr-btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);}
.hdr-btn.nav{padding:6px 10px;font-size:18px;}
.hdr-center{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.hdr-date{
  font-size:17px;font-weight:600;padding:6px 10px;
  border-radius:var(--r2);border:1px solid var(--border2);
  background:var(--white);cursor:pointer;white-space:nowrap;
}
.sync-indicator{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);flex-shrink:0;max-width:42vw;}
.sync-dot{font-size:16px;line-height:1;}
/* 西/南で別シート・別ローカルDBのため、同期先が一目で分かるようにする */
.hdr-sheet-tag{font-size:11px;font-weight:700;color:var(--orange2);background:var(--orange-bg);padding:2px 6px;border-radius:4px;white-space:nowrap;border:1px solid var(--orange);}

/* ===== 画面切替 ===== */
.screen{display:none;}
.screen.active{display:block;}

/* ===== メイン画面（表示中のみ flex。ID 単体の display は .screen 非表示を壊すため禁止） ===== */
#mainScreen.screen.active{
  display:flex;flex-direction:column;
  height:100vh;max-height:100vh;
  height:100dvh;max-height:100dvh;
  min-height:0;overflow:hidden;
}
#mainScreen.screen.active .main-scroll{
  flex:1;min-height:0;
  overflow:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  touch-action:pan-x pan-y;
}
/* collapse は sticky と相性が悪く、ヘッダーが tbody のタップを奪うことがある → separate */
.res-table{width:100%;border-collapse:separate;border-spacing:0;min-width:700px;}
#mainScreen .res-table thead{
  pointer-events:none;
}
#mainScreen .res-table thead th[onclick]{
  pointer-events:auto;
}
#mainScreen .res-table thead th{
  position:sticky;top:0;z-index:30;
  background:var(--orange);color:#fff;padding:8px 6px;
  font-size:22px;white-space:nowrap;text-align:center;
  box-shadow:0 2px 4px rgba(0,0,0,.12);
  border-bottom:2px solid #c55a0f;
  border-right:1px solid rgba(255,255,255,.35);
}
#mainScreen .res-table thead th:last-child{
  border-right:none;
}
/* メイン表：列ジャンプの目印（幅は他列と同じ1px・色だけやや濃く） */
#mainScreen .res-table thead th.res-div-l{
  border-left:1px solid rgba(0,0,0,.18);
}
#mainScreen .res-table thead th.res-div-r{
  border-right:1px solid rgba(0,0,0,.18);
}
#mainScreen .res-table thead th.res-div-lr{
  border-left:1px solid rgba(0,0,0,.18);
  border-right:1px solid rgba(0,0,0,.18);
}
.res-table td{
  padding:10px 6px;border-bottom:1px solid var(--border1);
  border-right:1px solid var(--border1);
  text-align:center;font-size:14px;vertical-align:middle;cursor:pointer;
}
.res-table td:last-child{border-right:none;}
.res-table td.res-div-l{
  border-left:1px solid #cac8c0;
  border-left-color:color-mix(in srgb,var(--border1) 85%,var(--text1) 15%);
}
.res-table td.res-div-r{
  border-right:1px solid #cac8c0;
  border-right-color:color-mix(in srgb,var(--border1) 85%,var(--text1) 15%);
}
.res-table td.res-div-lr{
  border-left:1px solid #cac8c0;
  border-left-color:color-mix(in srgb,var(--border1) 85%,var(--text1) 15%);
  border-right:1px solid #cac8c0;
  border-right-color:color-mix(in srgb,var(--border1) 85%,var(--text1) 15%);
}
.res-table tbody tr:nth-child(odd) td{background:var(--white);}
.res-table tbody tr:nth-child(even) td{background:#F7F6F2;}
.res-table tbody tr:active td{background:var(--blue2)!important;}
.name-cell{text-align:left !important;padding-left:6px !important;padding-right:4px !important;cursor:default;}
.name-cell-inner{display:flex;align-items:center;gap:4px;}
.name-cell-text{flex:1;}
.name-txt{font-size:22px;font-weight:500;}
.name-sub{font-size:16px;color:var(--text3);}
.res-del-btn{border:none;background:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 6px;line-height:1;flex-shrink:0;}
.res-del-btn:active{color:var(--red);}
.res-add-row td{background:var(--white)!important;text-align:center;padding:6px!important;}
.res-add-btn{border:1px dashed var(--border2);background:none;color:var(--text2);font-size:16px;padding:6px 20px;border-radius:var(--r2);cursor:pointer;}
/* オーバーレイ中央配置（卸記録など） */
.ov-back.ov-center.show{display:flex;align-items:center;justify-content:center;}
.ov-back.ov-center .ov{position:relative;bottom:auto;left:auto;right:auto;transform:none;border-radius:var(--r3);}
/* 卸記録 */
.sup-tab-btn{padding:6px 14px;border:1px solid var(--border2);border-radius:var(--r2);background:var(--white);color:var(--text2);font-size:14px;cursor:pointer;}
.sup-tab-btn.active{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:700;}
.sup-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border1);font-size:16px;}
.sup-item-info{flex:1;line-height:1.5;}
.sup-item-date{font-size:13px;color:var(--text3);}
.sup-sum-table{width:100%;border-collapse:collapse;font-size:15px;margin-top:4px;}
.sup-sum-table th{background:var(--orange);color:#fff;padding:8px 6px;text-align:center;font-size:14px;white-space:nowrap;}
.sup-sum-table td{padding:8px 6px;border-bottom:1px solid var(--border1);vertical-align:top;}
.sup-sum-table tr:nth-child(even) td{background:#F7F6F2;}
.sup-sum-name{font-size:16px;font-weight:600;white-space:nowrap;}
.sup-sum-detail{font-size:13px;color:var(--text3);margin-top:2px;}
.cell-val{font-size:18px;line-height:1.4;}
.cell-empty{color:var(--text3);font-size:18px;}
.cell-ok{color:var(--green);font-size:22px;font-weight:700;}
.cell-warn{color:var(--red);font-size:18px;font-weight:700;}
.cell-red{color:var(--red);font-size:22px;font-weight:700;}
/* 排泄列専用 */
.cell-ex{font-size:18px;line-height:1.4;}
.badge-ok{color:var(--green);font-weight:700;}
.badge-ng{color:var(--orange2);font-weight:700;}

/* ===== 詳細画面 ===== */
.detail-hdr{
  background:linear-gradient(135deg,#fff 0%,#FEF6F0 100%);
  border-bottom:1px solid var(--border1);
  padding:6px 12px;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
}
.detail-name{font-size:18px;font-weight:600;color:var(--text1);}
.back-btn{
  padding:7px 14px;border-radius:var(--r2);border:1px solid #F5C49A;
  background:var(--orange-bg);color:var(--orange2);font-size:15px;font-weight:600;
  white-space:nowrap;flex-shrink:0;cursor:pointer;
}

/* ===== タブ ===== */
.tabs{
  display:flex;overflow-x:auto;background:var(--white);
  border-bottom:2px solid var(--border2);
  position:sticky;top:50px;z-index:99;
  -webkit-overflow-scrolling:touch;
}
.tab{
  padding:10px 16px;font-size:20px;font-weight:600;white-space:nowrap;
  color:var(--text3);border-bottom:3px solid transparent;
  cursor:pointer;flex-shrink:0;margin-bottom:-2px;
}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700;background:var(--orange-bg);}

/* ===== 詳細画面の背後（メインより一段コントラストを上げる） ===== */
#detailScreen{
  background:linear-gradient(180deg,var(--detail-screen-bg) 0%,var(--detail-screen-bg2) 100%);
  min-height:100vh;
}
/* 詳細タブ：nishi 旧版相当（appearance 無効化・fg-cols-2/3 で列固定） */
#detailScreen .fg input,
#detailScreen .fg select,
#detailScreen .fg textarea{
  -webkit-appearance:none;
  appearance:none;
}
/* nishi .row2 / .row3 相当の固定列 */
#detailScreen .fg-row.fg-cols-2{
  grid-template-columns:1fr 1fr;
}
#detailScreen .fg-row.fg-cols-3{
  grid-template-columns:1fr 1fr 1fr;
}
#detailScreen .fg-row.fg-cols-2 > .fg,
#detailScreen .fg-row.fg-cols-3 > .fg{
  min-width:0;
}

/* ===== パネル ===== */
.panel{padding:12px;}
.panel-sec{
  background:var(--white);border-radius:var(--r2);padding:14px;
  margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.panel-sec h3{
  font-size:22px;color:var(--text2);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--border2);
}
.panel-sec h3 .sec-btn{float:right;}

/* ===== フォームグループ ===== */
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:20px;color:var(--text2);margin-bottom:4px;font-weight:600;}
.fg input,.fg select,.fg textarea{
  width:100%;padding:8px 10px;border:1px solid var(--border2);
  border-radius:var(--r1);background:var(--white);font-size:20px;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  outline:none;border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,119,34,.15);
}
.fg textarea{min-height:100px;resize:vertical;}
.fg-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(0,1fr));gap:10px;}
.fg-row .fg{min-width:0;}
/* フォーム行は v2 旧版と同じ（repeat(auto-fit,minmax(0,1fr))） */
.fg-hint{font-size:14px;color:var(--text3);margin-top:3px;}
.ex-stool-compact label{margin-bottom:2px;}
.ex-stool-compact select{font-size:20px!important;padding:6px 10px!important;line-height:1.2;}

/* ===== チップ ===== */
.chip{
  display:inline-block;padding:8px 18px;border-radius:20px;
  border:1px solid var(--border2);background:var(--white);
  font-size:20px;cursor:pointer;user-select:none;margin:3px;
}
.chip.on,.chip.pc-on{background:var(--orange);color:#fff;border-color:var(--orange);}
.chip.selected{background:var(--orange);color:#fff;border-color:var(--orange);}
/* 1日の様子：長文チップは折り返し・横幅いっぱいで読みやすく */
#dayChips .chip{
  flex:1 1 100%;max-width:100%;white-space:normal;text-align:left;
  font-size:16px;line-height:1.35;padding:8px 12px;border-radius:12px;
}

/* ===== ボタン ===== */
.btn{
  display:inline-block;padding:10px 20px;border-radius:var(--r2);
  border:none;font-size:20px;font-weight:600;cursor:pointer;
  user-select:none;text-align:center;
}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:active{opacity:.8;}
.btn-danger{background:var(--red);color:#fff;}
.btn-gray{background:var(--border2);color:var(--text2);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:active{opacity:.8;}
.btn-sm{padding:6px 12px;font-size:18px;}
.btn-block{display:block;width:100%;}

/* ===== 履歴リスト ===== */
.hist-list{margin-bottom:14px;}
.hist-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:10px 0;border-bottom:1px solid var(--border2);
}
.hist-item:last-child{border-bottom:none;}
.hist-time{color:var(--orange2);font-weight:700;white-space:nowrap;min-width:80px;font-size:20px;}
.hist-content{flex:1;color:var(--text1);font-size:20px;line-height:1.5;}
.hist-del{color:var(--red);font-size:18px;padding:4px 10px;border:1px solid var(--red);
  border-radius:var(--r1);background:none;cursor:pointer;white-space:nowrap;}
.hist-edit{color:var(--blue);font-size:18px;padding:4px 10px;border:1px solid var(--blue);
  border-radius:var(--r1);background:none;cursor:pointer;white-space:nowrap;margin-right:2px;}
.hist-day{font-size:14px;color:var(--orange2);font-weight:600;margin:6px 0 2px;}

/* ===== オーバーレイ ===== */
.ov-back{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
}
.ov-back.show{display:block;}
.ov{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-radius:var(--r3) var(--r3) 0 0;
  max-height:90vh;overflow-y:auto;z-index:201;padding:20px 16px;
  transform:translateY(100%);transition:transform .25s ease;
}
.ov-back.show .ov,.ov-back.show+.ov{transform:translateY(0);}
.ov.show{transform:translateY(0);}
.ov-title{
  font-size:17px;font-weight:700;margin-bottom:16px;
  padding-bottom:10px;border-bottom:1px solid var(--border2);
  display:flex;justify-content:space-between;align-items:center;
}
.ov-close{font-size:20px;color:var(--text3);border:none;background:none;cursor:pointer;padding:0 4px;}

/* ===== カレンダー ===== */
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:6px;
}
.cal-lbl{text-align:center;font-size:10px;color:var(--text3);padding:3px 0;font-weight:600;}
.cal-day{
  text-align:center;padding:5px 2px;font-size:12px;border-radius:var(--r1);
  cursor:pointer;position:relative;
}
.cal-day:active{background:var(--blue2);}
.cal-day.today{background:var(--orange2);color:#fff;font-weight:700;}
.cal-day.sel{background:var(--orange);color:#fff;font-weight:700;}
.cal-day.has::after{
  content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:var(--green);
}
.cal-day.today.has::after,.cal-day.sel.has::after{background:#fff;}
.cal-nav{display:flex;justify-content:space-between;align-items:center;}
.cal-nav-title{font-weight:700;font-size:13px;}

/* ===== 服薬チップ ===== */
.med-chip{
  display:inline-block;padding:8px 20px;border-radius:20px;
  border:1px solid var(--border2);background:var(--white);
  font-size:26px;cursor:pointer;margin:3px;user-select:none;
}
.med-chip.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.med-chip.none-on{background:var(--text3);color:#fff;border-color:var(--text3);}

/* ===== 設定画面 ===== */
.settings-tabs{
  display:flex;overflow-x:auto;background:var(--white);
  border-bottom:1px solid var(--border2);
  -webkit-overflow-scrolling:touch;
}
.settings-tab{
  padding:10px 16px;font-size:13px;white-space:nowrap;
  color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;
  flex-shrink:0;
}
.settings-tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700;}
.settings-panel{display:none;padding:14px;}
.settings-panel.active{display:block;}
.settings-list-item{
  display:flex;align-items:center;gap:8px;padding:10px;
  border:1px solid var(--border2);border-radius:var(--r1);margin-bottom:8px;
  background:var(--white);
}
.settings-list-item .item-name{flex:1;font-size:14px;}
.settings-list-item .settings-list-actions{display:flex;gap:4px;flex-shrink:0;align-items:center;}
.settings-list-item .item-move{
  font-size:12px;padding:3px 8px;border:1px solid var(--border2);border-radius:var(--r1);
  background:var(--white);cursor:pointer;color:var(--text2);min-width:34px;
}
.settings-list-item .item-move:disabled{opacity:.45;cursor:not-allowed;}
.settings-list-item .item-del{
  color:var(--red);font-size:12px;padding:3px 8px;
  border:1px solid var(--red);border-radius:var(--r1);background:none;cursor:pointer;
}

/* ===== 印刷 ===== */
#printArea{display:none;}
@media print{
  .no-print{display:none !important;}
  .screen{display:none !important;}
  #printArea{display:block !important;}
  body{background:#fff;font-size:11px;}
  .print-title{font-size:14px;font-weight:700;margin-bottom:8px;border-bottom:2px solid #333;padding-bottom:4px;}
  .print-table{border-collapse:collapse;width:100%;margin-bottom:12px;}
  .print-table th{background:#f0f0f0;border:1px solid #555;padding:4px 6px;font-size:11px;white-space:nowrap;}
  .print-table td{border:1px solid #999;padding:3px 6px;font-size:11px;vertical-align:top;}
  .print-subtitle{font-size:12px;font-weight:600;margin:10px 0 4px;color:#333;}
}

/* ===== ユーティリティ ===== */
.text-blue{color:var(--blue);}
.text-green{color:var(--green);}
.text-orange{color:var(--orange2);}
.text-red{color:var(--red);}
.text-gray{color:var(--text3);}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.flex{display:flex;}
.flex-1{flex:1;}
.gap8{gap:8px;}
.gap6{gap:6px;}
.items-center{align-items:center;}
.justify-between{justify-content:space-between;}
.w100{width:100%;}
</style>
</head>
<body>

<!-- ========== 施設選択画面 ========== -->
<div id="selectScreen" class="screen active">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:var(--bg);">
    <div style="font-size:28px;font-weight:700;color:var(--orange2);margin-bottom:8px;">介護記録</div>
    <div style="font-size:14px;color:var(--text3);margin-bottom:40px;">ユニットを選択してください</div>
    <div style="display:flex;flex-direction:column;gap:16px;width:100%;max-width:320px;">
      <button onclick="selectFacility('nishi')" style="padding:24px;border-radius:var(--r3);border:2px solid var(--orange);background:var(--orange-bg);color:var(--orange2);font-size:22px;font-weight:700;cursor:pointer;">
        🏠 西ユニット
      </button>
      <button onclick="selectFacility('minami')" style="padding:24px;border-radius:var(--r3);border:2px solid var(--blue);background:var(--blue2);color:var(--blue);font-size:22px;font-weight:700;cursor:pointer;">
        🏠 南ユニット
      </button>
    </div>
  </div>
</div>

<!-- ========== メイン画面 ========== -->
<div id="mainScreen" class="screen">
  <div class="hdr no-print">
    <img id="mainLogo" class="hdr-logo" src="" alt="" style="display:none;">
    <div style="flex:1;"></div>
    <div class="hdr-center">
      <button class="hdr-btn nav" onclick="moveDay(-1)">◀</button>
      <div class="hdr-date" id="mainDate" onclick="openCal()"></div>
      <button class="hdr-btn nav" onclick="moveDay(1)">▶</button>
    </div>

}

/** ブックマークと実際のユニットのずれ防止（西／南は別データのため） */
function syncFacilityIntoUrl(facId){
  if(!facId || !FACILITIES[facId]) return;
  try{
    const u=new URL(window.location.href);
    if(u.searchParams.get('f')===facId) return;
    u.searchParams.set('f', facId);
    history.replaceState(history.state,'',u.pathname+u.search+(u.hash||''));
  }catch(_){}
}

  localStorage.setItem('kaigo_last_facility', facId);

  }

 * 同一オリジンでは Cookie が共有されることが多いため、GAS URL／トークン／施設IDを Cookie にもミラーし、
 * 起動時に localStorage が空なら Cookie から復元する。
 */
function gasCookieSuffix(){
  const sec=location.protocol==='https:'?';Secure':'';
  return ';path=/;max-age=34560000;SameSite=Lax'+sec;
}
function gasReadCookie(name){
  try{
    const cs=document.cookie?document.cookie.split('; '):[];
    for(let i=0;i<cs.length;i++){
      const p=cs[i].indexOf('=');
      if(p<1) continue;
      const k=cs[i].slice(0,p).trim();
      if(k!==name) continue;
      return decodeURIComponent(cs[i].slice(p+1).trim());
    }
    return '';
  }catch(_){ return ''; }
}
function gasWriteCookie(name, val){
  try{
    const v=val==null?'':String(val).trim();
    const sec=location.protocol==='https:'?';Secure':'';
    if(!v){
      document.cookie=name+'=;path=/;max-age=0;SameSite=Lax'+sec;
      return;
    }
    document.cookie=name+'='+encodeURIComponent(v)+gasCookieSuffix();
  }catch(_){}
}

function gasSnapshotRead(){
  try{

    if(!raw) return null;
    const o=JSON.parse(raw);
    if(!o||typeof o!=='object') return null;

  }catch(_){ return null; }

function gasSnapshotWrite(){
  try{
    const pu=(localStorage.getItem('kaigo_gas_webapp_url')||'').trim();
    const pt=(localStorage.getItem('kaigo_gas_token')||'').trim();
    const old=gasSnapshotRead();
    const url=pu||(old&&old.url)||'';
    const token=pt||(old&&old.token)||'';
    if(!url&&!token){ localStorage.removeItem(KAIGO_GAS_SNAP_KEY); return; }
    localStorage.setItem(KAIGO_GAS_SNAP_KEY, JSON.stringify({url, token}));
  }catch(_){}
}

    if(localStorage.getItem(KAIGO_GAS_SNAP_KEY)) return;
    const u=(localStorage.getItem('kaigo_gas_webapp_url')||'').trim();
    const t=(localStorage.getItem('kaigo_gas_token')||'').trim();
    if(u||t) localStorage.setItem(KAIGO_GAS_SNAP_KEY, JSON.stringify({url:u, token:t}));
  }catch(_){}

function residentServiceTypeFromSheet(svcRaw, sched){
  if(svcRaw!==undefined&&svcRaw!==null&&String(svcRaw).trim()!=='')
    return normalizeResidentServiceType(svcRaw);
  return inferServiceTypeFromSched(sched);
}
function residentServiceTypeOrDefault(r){
  if(!r) return 'resident';
  if(r.serviceType!=null&&String(r.serviceType).trim()!=='')
    return normalizeResidentServiceType(r.serviceType);
  return inferServiceTypeFromSched(r.sched);
}
/** 食事の対象者チップ：デイは昼のみ既定選択、入所は全区分で既定選択 */
function mealResChipSelectedByDefault(r, mealSection){
  if(residentServiceTypeOrDefault(r)!=='day') return true;
  return mealSection==='lunch';
}
/** 服薬の対象者チップ（既定は詳細の本人のみ）：デイは昼食後タイミングのときだけ本人を選択 */
function medTargetChipSelectedByDefault(r, timingId){
  if(!r||r.name!==curRes) return false;
  if(residentServiceTypeOrDefault(r)!=='day') return true;
  return timingId==='lunch';
}

function buildResidentHeaderRow(){
  const h=['id','氏名','要介護度'];
  for(let d=1;d<=31;d++) h.push('d'+d);
  h.push('updatedAt');
  h.push('serviceType');
  return h;
}
function buildRecordHeaderRow(){
  const a=Array(N_RECORD_COLS).fill('');
  a[REC.rid]='record_id'; a[REC.k]='kind'; a[REC.dk]='date'; a[REC.nm]='resident'; a[REC.uu]='updatedAt'; a[REC.seq]='seq'; a[REC.tm]='time';
  a[REC.v0]='v_temp'; a[REC.v1]='v_sbp'; a[REC.v2]='v_dbp'; a[REC.v3]='v_pulse'; a[REC.v4]='v_spo2'; a[REC.v5]='v_weight'; a[REC.v6]='v_staff';
  a[REC.ex0]='ex_urine'; a[REC.ex1]='ex_pad'; a[REC.ex2]='ex_stool'; a[REC.ex3]='ex_writer'; a[REC.ex4]='ex_padChange'; a[REC.ex5]='ex_rehaChange'; a[REC.ex6]='ex_diaperChange'; a[REC.ex7]='ex_urine_ml';
  a[REC.ba0]='ba_type'; a[REC.ba1]='ba_staff';
  a[REC.ca0]='ca_content'; a[REC.ca1]='ca_staff';
  a[REC.nt0]='nt_content'; a[REC.nt1]='nt_writer'; a[REC.nt2]='nt_ts';
  a[REC.mbt]='meal_bTime'; a[REC.mbm]='meal_bMain'; a[REC.mbs]='meal_bSide'; a[REC.mbw]='meal_bWater';
  a[REC.mlt]='meal_lTime'; a[REC.mm]='meal_menu'; a[REC.msk]='meal_snack'; a[REC.mlmi]='meal_lMain'; a[REC.mls]='meal_side'; a[REC.mlw]='meal_water';
  a[REC.mdt]='meal_dTime'; a[REC.mdm]='meal_dMain'; a[REC.mds]='meal_dSide'; a[REC.mdw]='meal_dWater';
  a[REC.mt]='med_timing'; a[REC.mtt]='med_time'; a[REC.mts]='med_staff'; a[REC.mj]='med_items_json';
  a[REC.rp]='rec_part'; a[REC.rc]='rec_content'; a[REC.rk]='rec_kanken'; a[REC.rch]='rec_chips_json';
  a[REC.dt]='day_text'; a[REC.dw]='day_writer';
  a[REC.sr]='sup_resName'; a[REC.sp]='sup_product'; a[REC.sq]='sup_qty';
  a[REC.exj]='extra_json';
  return a;
}

function padSheetRow(a, minLen){
  const m=Math.max(minLen||0, a.length, 56);
  const o=a.slice();
  while(o.length<m) o.push('');
  return o;
}

function mealRowHasData(m){
  if(!m) return false;
  if(m._u>0) return true;
  if(m.menu||m.snack) return true;
  if(Number(m.bMain)!==100||Number(m.main)!==100||Number(m.dMain)!==100) return true;
  if((m.bWater&&String(m.bWater)!=='')||(m.water&&String(m.water)!=='')||(m.dWater&&String(m.dWater)!=='')) return true;
  return false;
}

/** スプレッドシートの時刻セルが誤って meal_menu / meal_snack に ISO（1899-12-30…）で入った場合に空へ正規化 */
function normalizeMealFreeText(v){
  if(v instanceof Date && !isNaN(v)){
    const y=v.getUTCFullYear(), mo=v.getUTCMonth(), da=v.getUTCDate();
    if(y===1899&&mo===11&&(da===30||da===31)) return '';
  }
  const s=String(v==null?'':v).trim();
  if(!s) return '';
  if(/^1899-12-3[01]T/i.test(s)) return '';
  const t=Date.parse(s);
  if(!isNaN(t)){
    const d=new Date(t);
    const y=d.getUTCFullYear(), mo=d.getUTCMonth(), da=d.getUTCDate();
    if(y===1899&&mo===11&&(da===30||da===31)) return '';
  }
  return s;
}

function blankRecRow(){ return Array(N_RECORD_COLS).fill(''); }

function dbToSheet(inDb){
  const resH=buildResidentHeaderRow();
  const recH=buildRecordHeaderRow();
  const W=Math.max(resH.length, recH.length, 56);
  const rows=[];
  const PR=r=>padSheetRow(r,W);

  rows.push(PR([SYNC_MARKER]));
  rows.push(PR([SEC_RES]));
  rows.push(PR(resH));
  (inDb.residents||[]).forEach(r=>{
    const row=[r.id||'',r.name||'',r.care||''];
    const sch=r.sched||[];
    for(let di=0;di<31;di++) row.push(sch[di]===1?1:0);
    row.push(_numU(r._u));
    row.push(residentServiceTypeOrDefault(r));
    rows.push(PR(row));
  });
  rows.push(PR([]));
  rows.push(PR([SEC_REC]));
  rows.push(PR(recH));

  const pushR=a=>rows.push(PR(a));

  const recs=normalizeRecordsMap(inDb.records||{});
  Object.keys(recs).sort().forEach(dk=>{
    const day=recs[dk]||{};
    Object.keys(day).sort().forEach(name=>{
      const rec=day[name];
      if(!rec||typeof rec!=='object') return;

      (rec.vital||[]).forEach((v,idx)=>{
        if(!String(v.id||'').trim()) v.id=genId('v');
        const a=blankRecRow();
        a[REC.rid]=String(v.id);
        a[REC.k]='vital'; a[REC.dk]=dk; a[REC.nm]=name; a[REC.uu]=String(_numU(v.sheetU||v.u||0));
        a[REC.seq]=String(idx); a[REC.tm]=v.time||'';
        a[REC.v0]=normalizeTempValue(v.temp??''); a[REC.v1]=v.sbp??''; a[REC.v2]=v.dbp??''; a[REC.v3]=v.pulse??''; a[REC.v4]=v.spo2??''; a[REC.v5]=v.weight??''; a[REC.v6]=v.staff||'';
        pushR(a);
      });
      (rec.excretion||[]).forEach((v,idx)=>{
        if(!String(v.id||'').trim()) v.id=genId('e');
        const a=blankRecRow();
        a[REC.rid]=String(v.id);
        a[REC.k]='excretion'; a[REC.dk]=dk; a[REC.nm]=name; a[REC.uu]=String(_numU(v.sheetU||v.u||0));
        a[REC.seq]=String(idx); a[REC.tm]=v.time||'';
        a[REC.ex0]=v.urine||''; a[REC.ex1]=v.pad||''; a[REC.ex2]=v.stool||''; a[REC.ex3]=v.writer||'';
        a[REC.ex4]=v.padChange?1:0; a[REC.ex5]=v.rehaChange?1:0; a[REC.ex6]=v.diaperChange?1:0; a[REC.ex7]=v.urineMl||'';
        pushR(a);
      });
      (rec.bath||[]).forEach((v,idx)=>{
        if(!String(v.id||'').trim()) v.id=genId('b');
        const a=blankRecRow();
        a[REC.rid]=String(v.id);
        a[REC.k]='bath'; a[REC.dk]=dk; a[REC.nm]=name; a[REC.uu]=String(_numU(v.sheetU||v.u||0));
        a[REC.seq]=String(idx); a[REC.tm]=v.time||'';
        a[REC.ba0]=v.type||''; a[REC.ba1]=v.staff||'';
        pushR(a);
      });
      (rec.care||[]).forEach((v,idx)=>{
        if(!String(v.id||'').trim()) v.id=genId('c');
        const a=blankRecRow();
        a[REC.rid]=String(v.id);
        a[REC.k]='care'; a[REC.dk]=dk; a[REC.nm]=name; a[REC.uu]=String(_numU(v.sheetU||v.u||0));
        a[REC.seq]=String(idx); a[REC.tm]=v.time||'';
        a[REC.ca0]=v.content||''; a[REC.ca1]=v.staff||'';
        if(v.forwardToNotes||v.forwardNoteId){
          a[REC.exj]=JSON.stringify({forwardToNotes:!!v.forwardToNotes,forwardNoteId:v.forwardNoteId||''});
        }
        pushR(a);
      });
      (rec.notes||[]).forEach((v,idx)=>{
        if(!String(v.id||'').trim()) v.id=genId('n');
        const a=blankRecRow();
        a[REC.rid]=String(v.id);
        a[REC.k]='notes'; a[REC.dk]=dk; a[REC.nm]=name; a[REC.uu]=String(_numU(v.sheetU||v.u||0));
        a[REC.seq]=String(idx); a[REC.tm]=v.time||'';
        a[REC.nt0]=v.content||''; a[REC.nt1]=v.writer||''; a[REC.nt2]=v.ts||'';
        if(v._deleted) a[REC.exj]=JSON.stringify({_deleted:1});
        pushR(a);
      });

      const m=rec.meal||{};
      if(mealRowHasData(m)){
        const a=blankRecRow();
        a[REC.rid]='meal|'+dk+'|'+name; a[REC.k]='meal'; a[REC.dk]=dk; a[REC.nm]=name; a[REC.uu]=String(_numU(m._u||0));
        a[REC.seq]='0'; a[REC.tm]='';
        a[REC.mbt]=m.bTime||''; a[REC.mbm]=m.bMain??''; a[REC.mbs]=m.bSide??''; a[REC.mbw]=m.bWater??'';
        a[REC.mlt]=m.time||''; a[REC.mm]=m.menu||''; a[REC.msk]=m.snack||''; a[REC.mlmi]=m.main??''; a[REC.mls]=m.side??''; a[REC.mlw]=m.water??'';
        a[REC.mdt]=m.dTime||''; a[REC.mdm]=m.dMain??''; a[REC.mds]=m.dSide??''; a[REC.mdw]=m.dWater??'';
        pushR(a);
      }

      const med=rec.med||{};
      ['morning','lunch','dinner','bedtime'].forEach(timing=>{
        const slot=med[timing]||{};
        if(!((slot.items||[]).length||slot.time||slot.staff)) return;
        const a=blankRecRow();
        a[REC.rid]='med|'+dk+'|'+name+'|'+timing; a[REC.k]='med'; a[REC.dk]=dk; a[REC.nm]=name; a[REC.uu]=String(_numU(slot._u||0));
        a[REC.seq]='0'; a[REC.tm]='';
        a[REC.mt]=timing; a[REC.mtt]=slot.time||''; a[REC.mts]=slot.staff||''; a[REC.mj]=JSON.stringify(slot.items||[]);
        pushR(a);
      });

      const rc=rec.rec||{};
      if(rc.content||(rc.chips&&rc.chips.length)||rc.kanken||rc.time||rc.part){
        const a=blankRecRow();
        a[REC.rid]='rec|'+dk+'|'+name; a[REC.k]='rec'; a[REC.dk]=dk; a[REC.nm]=name; a[REC.uu]=String(_numU(rc._u||0));
        a[REC.seq]='0'; a[REC.tm]=rc.time||'';
        a[REC.rp]=rc.part||''; a[REC.rc]=rc.content||''; a[REC.rk]=rc.kanken?1:0; a[REC.rch]=JSON.stringify(rc.chips||[]);
        pushR(a);
      }

      if(rec.day || rec.dayWriter || (rec._dayU||0)>0){
        const a=blankRecRow();
        a[REC.rid]='day|'+dk+'|'+name; a[REC.k]='day'; a[REC.dk]=dk; a[REC.nm]=name; a[REC.uu]=String(_numU(rec._dayU||0));
        a[REC.seq]='0'; a[REC.tm]='';
        a[REC.dt]=String(rec.day||'').replace(/\r/g,' '); a[REC.dw]=rec.dayWriter||'';
        pushR(a);
      }
    });
  });

  rows.push(PR([]));
  rows.push(PR([SEC_SET]));
  rows.push(PR(['key','valueJson','updatedAt']));
  const S=inDb.settings||{};
  const skip=new Set(['logoB64']);
  if(!inDb._setU) inDb._setU={};
  Object.keys(S).forEach(k=>{
    if(skip.has(k)) return;
    const v=S[k];
    rows.push(PR([k, JSON.stringify(v), String(_numU(inDb._setU&&inDb._setU[k]))]));
  });

  rows.push(PR([]));
  rows.push(PR([SEC_SUP]));
  rows.push(PR(['id','date','resName','product','qty','updatedAt']));
  (inDb.supplies||[]).forEach(s=>{
    rows.push(PR([s.id||'', s.date||'', s.resName||'', s.product||'', s.qty??'', String(_numU(s._u||0))]));
  });

  return rows;
}

function ensureDay(dbOut, dk, name){
  if(!dbOut.records[dk]) dbOut.records[dk]={};
  if(!dbOut.records[dk][name]){
    dbOut.records[dk][name]={
      vital:[], excretion:[], bath:[], care:[], notes:[],
      meal:{bTime:'07:30',bMain:100,bSide:100,bWater:'', time:'11:50',menu:'',snack:'',main:100,side:100,water:'', dTime:'17:30',dMain:100,dSide:100,dWater:''},
      med:{morning:{time:'',staff:'',items:[]},lunch:{time:'',staff:'',items:[]},dinner:{time:'',staff:'',items:[]},bedtime:{time:'',staff:'',items:[]}},
      rec:{content:'',part:'',time:''},
      day:''
    };
  }
  const r=dbOut.records[dk][name];
  ['vital','excretion','bath','care','notes'].forEach(f=>{ if(!r[f]) r[f]=[]; });
  if(!r.med) r.med={morning:{time:'',staff:'',items:[]},lunch:{time:'',staff:'',items:[]},dinner:{time:'',staff:'',items:[]},bedtime:{time:'',staff:'',items:[]}};
  ['morning','lunch','dinner','bedtime'].forEach(t=>{
    if(!r.med[t]) r.med[t]={time:'',staff:'',items:[]};
    if(!r.med[t].items) r.med[t].items=[];
  });
  if(!r.rec) r.rec={content:'',part:'',time:''};
  return r;
}

function applyRecordRow(dbOut, row){
  const kind=String(row[REC.k]||'').trim();
  const dk=normalizeDateKey(row[REC.dk]);
  const name=String(row[REC.nm]||'').trim();
  const u=_numU(row[REC.uu]);
  const tm=normalizeTimeText(row[REC.tm]);
  if(!dk||!name||!kind) return;
  const rec=ensureDay(dbOut, dk, name);
  let exj={};
  try{ exj=JSON.parse(row[REC.exj]||'{}')||{}; }catch(_){ exj={}; }

  if(kind==='vital'){
    const o={
      id:String(row[REC.rid]||genId('v')),
      time:tm||'', temp:normalizeTempValue(row[REC.v0]), sbp:row[REC.v1], dbp:row[REC.v2], pulse:row[REC.v3], spo2:row[REC.v4], weight:row[REC.v5], staff:row[REC.v6],
      sheetU:u
    };
    rec.vital.push(o);
    return;
  }
  if(kind==='excretion'){
    rec.excretion.push({
      id:String(row[REC.rid]||genId('e')),
      time:tm||'',
      urine:row[REC.ex0], urineMl:row[REC.ex7], pad:row[REC.ex1], stool:row[REC.ex2], writer:row[REC.ex3],
      padChange:!!Number(row[REC.ex4]), rehaChange:!!Number(row[REC.ex5]), diaperChange:!!Number(row[REC.ex6]),
      sheetU:u
    });
    return;
  }
  if(kind==='bath'){
    rec.bath.push({ id:String(row[REC.rid]||genId('b')), time:tm||'', type:row[REC.ba0], staff:row[REC.ba1], sheetU:u });
    return;
  }
  if(kind==='care'){
    rec.care.push({
      id:String(row[REC.rid]||genId('c')),
      time:tm||'',
      content:row[REC.ca0],
      staff:row[REC.ca1],
      forwardToNotes:!!exj.forwardToNotes,
      forwardNoteId:exj.forwardNoteId||'',
      sheetU:u
    });
    return;
  }
  if(kind==='notes'){
    rec.notes.push({
      id:String(row[REC.rid]||genId('n')),
      time:tm||'',
      content:row[REC.nt0],
      writer:row[REC.nt1],
      ts:row[REC.nt2]||new Date().toISOString(),
      _deleted:!!Number(exj._deleted||0),
      sheetU:u
    });
    return;
  }
  if(kind==='meal'){
    rec.meal={
      bTime:normalizeTimeText(row[REC.mbt])||'07:30', bMain:_numU(row[REC.mbm])||100, bSide:_numU(row[REC.mbs])||100, bWater:row[REC.mbw]||'',
      time:normalizeTimeText(row[REC.mlt])||'11:50', menu:normalizeMealFreeText(row[REC.mm])||'', snack:normalizeMealFreeText(row[REC.msk])||'', main:_numU(row[REC.mlmi])||100, side:_numU(row[REC.mls])||100, water:row[REC.mlw]||'',
      dTime:normalizeTimeText(row[REC.mdt])||'17:30', dMain:_numU(row[REC.mdm])||100, dSide:_numU(row[REC.mds])||100, dWater:row[REC.mdw]||'',
      _u:u
    };
    return;
  }
  if(kind==='med'){
    const timing=String(row[REC.mt]||'morning');
    let items=[];
    try{ items=JSON.parse(row[REC.mj]||'[]')||[]; }catch(_){ items=[]; }
    rec.med[timing]={ time:row[REC.mtt]||'', staff:row[REC.mts]||'', items, _u:u };
    return;
  }
  if(kind==='rec'){
    let chips=[];
    try{ chips=JSON.parse(row[REC.rch]||'[]')||[]; }catch(_){ chips=[]; }
    rec.rec={ time:tm||'', part:row[REC.rp]||'', content:row[REC.rc]||'', kanken:!!Number(row[REC.rk]), chips, _u:u };
    return;
  }
  if(kind==='day'){
    rec.day=row[REC.dt]||''; rec.dayWriter=row[REC.dw]||''; rec._dayU=u;
  }
}

/** A1 がずれていると sheetToDb が空になり「取得は成功したが反映されない」になる */
function sheetTopCell(rows){
  if(!rows||!rows.length||!rows[0]||!rows[0].length) return '';
  const v=rows[0][0];
  if(v==null||v===undefined) return '';
  return String(v).trim();
}
function sheetHasValidSyncMarker(rows){
  return sheetTopCell(rows)===SYNC_MARKER;
}
/** マーカー不正だが「完全な空シート」なら false（従来どおり sheetToDb→空マージでよい） */
function sheetLooksLikeCorruptMarker(rows){
  if(!rows||!rows.length||sheetHasValidSyncMarker(rows)) return false;
  const t=sheetTopCell(rows);
  if(rows.length===1 && !t) return false;
  return true;
}

function sheetToDb(rows){
  const empty=()=>({ residents:[], records:{}, supplies:[], settings:cloneDeep(DEFAULT_SETTINGS), _setU:{} });
  if(!rows||!rows.length||sheetTopCell(rows)!==SYNC_MARKER) return empty();

  const dbOut=empty();
  let i=1;
  while(i<rows.length && String(rows[i][0])!==SEC_RES) i++;
  if(i>=rows.length) return dbOut;
  i++;
  i++;
  while(i<rows.length){
    const r=rows[i];
    if(!r||!r.length){ i++; continue; }
    if(String(r[0])===SEC_REC) break;
    const name=String(r[1]||'').trim();
    const id=String(r[0]||'').trim();
    if(!name && !id){ i++; continue; }
    const care=String(r[2]||'');
    const sched=[];
    for(let c=3;c<34;c++) sched.push(Number(r[c])===1?1:0);
    while(sched.length<31) sched.push(0);
    dbOut.residents.push({
      id:id||genId('r'), name, care, sched, _u:_numU(r[34]),
      serviceType:residentServiceTypeFromSheet(r[35], sched)
    });
    i++;
  }
  while(i<rows.length && String(rows[i][0])!==SEC_REC) i++;
  if(i>=rows.length) return dbOut;
  i+=2;
  while(i<rows.length){
    const r=rows[i];
    if(!r||!r.length){ i++; continue; }
    const c0=String(r[0]||'');
    if(c0===SEC_SET||c0===SEC_SUP) break;
    applyRecordRow(dbOut, r);
    i++;
  }

  while(i<rows.length && String(rows[i][0])!==SEC_SET) i++;
  if(i<rows.length && String(rows[i][0])===SEC_SET){
    i+=2;
    while(i<rows.length){
      const r=rows[i];
      if(!r||!r.length){ i++; continue; }
      if(String(r[0])===SEC_SUP) break;
      const k=String(r[0]||'').trim();
      if(!k){ i++; continue; }
      try{ dbOut.settings[k]=JSON.parse(r[1]); }catch(_){ dbOut.settings[k]=r[1]; }
      dbOut._setU[k]=_numU(r[2]);
      i++;
    }
  }

  while(i<rows.length && String(rows[i][0])!==SEC_SUP) i++;
  if(i<rows.length && String(rows[i][0])===SEC_SUP){
    i+=2;
    while(i<rows.length){
      const r=rows[i];
      if(!r||!r.length){ i++; continue; }
      const id=String(r[0]||'').trim();
      if(!id){ i++; continue; }
      dbOut.supplies.push({ id, date:String(r[1]||''), resName:String(r[2]||''), product:String(r[3]||''), qty:_numU(r[4]), _u:_numU(r[5]) });
      i++;
    }
  }

  Object.keys(dbOut.records||{}).forEach(dk=>{
    Object.keys(dbOut.records[dk]||{}).forEach(nm=>{
      const rr=dbOut.records[dk][nm];
      coalesceDayTimedArrays(rr);
      ['vital','excretion','bath','care','notes'].forEach(f=>{
        if(rr[f]) rr[f].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      });
    });
  });
  dbOut.supplies.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  dbOut.records=normalizeRecordsMap(dbOut.records||{});
  return dbOut;
}

function normalizeRecordsMap(records){
  const out={};
  Object.keys(records||{}).forEach(rawKey=>{
    const nk=normalizeDateKey(rawKey);
    if(!nk) return;
    const day=records[rawKey]||{};
    if(!out[nk]) out[nk]={};
    Object.keys(day).forEach(nm=>{
      if(!out[nk][nm]) out[nk][nm]=cloneDeep(day[nm]);
      else out[nk][nm]=mergeRecordDay(out[nk][nm], day[nm], nk, nm);
    });
  });
  return out;
}

function normalizeVitalTempsInRecords(records){
  Object.keys(records||{}).forEach(dk=>{
    Object.keys((records[dk]||{})).forEach(nm=>{
      const rec=records[dk][nm];
      if(!rec||!Array.isArray(rec.vital)) return;
      rec.vital.forEach(v=>{
        if(!v) return;
        v.temp=normalizeTempValue(v.temp);
      });
    });
  });
}

/** 利用者一覧の並びを端末・同期のたびに固定（氏名→id。入力・閲覧のブレ防止） */
function normalizeResidentName(name){
  return String(name||'').replace(/[\s\u3000]+/g,' ').trim();
}
function compareResidentsStable(a,b){
  const c=normalizeResidentName((a&&a.name)||'').localeCompare(normalizeResidentName((b&&b.name)||''),'ja');
  if(c!==0) return c;
  return String((a&&a.id)||'').localeCompare(String((b&&b.id)||''));
}
/** チップ data-name 等と db.residents の突き合わせ（空白差で find 失敗→誤って入所扱いになるのを防ぐ） */
function dbResidentByNameLoose(name){
  const nm=normalizeResidentName(name);
  if(!nm) return null;
  return (db.residents||[]).find(x=>normalizeResidentName(x.name)===nm)||null;
}
function normalizeResidentsOrder(){
  if(!db||!Array.isArray(db.residents)) return;
  db.residents.sort(compareResidentsStable);
}

function _recordItemU(x){
  return _numU(x.sheetU||x.u||0);
}

/** シートの揺らぎ別ID・取込重複をまとめるための内容キー（同一時刻の別測定は値が違えば別行のまま） */
function vitalFingerprint(v){
  return [
    normalizeTimeText((v&&v.time)||''),
    normalizeTempValue((v&&v.temp)??''),
    String((v&&v.sbp)??''),
    String((v&&v.dbp)??''),
    String((v&&v.pulse)??''),
    String((v&&v.spo2)??''),
    String((v&&v.weight)??''),
    String((v&&v.staff)||'').trim()
  ].join('\x1e');
}
function excretionFingerprint(e){
  return [
    normalizeTimeText((e&&e.time)||''),
    String((e&&e.urine)||''),
    String((e&&e.urineMl)||''),
    String((e&&e.pad)||''),
    String((e&&e.stool)||''),
    String((e&&e.writer)||'').trim(),
    e&&e.padChange?1:0,
    e&&e.rehaChange?1:0,
    e&&e.diaperChange?1:0
  ].join('\x1e');
}
function bathFingerprint(b){
  return [
    normalizeTimeText((b&&b.time)||''),
    String((b&&b.type)||''),
    String((b&&b.staff)||'').trim()
  ].join('\x1e');
}
function careFingerprint(c){
  return [
    normalizeTimeText((c&&c.time)||''),
    String((c&&c.content)||''),
    String((c&&c.staff)||'').trim()
  ].join('\x1e');
}
function notesFingerprint(n){
  return [
    normalizeTimeText((n&&n.time)||''),
    String((n&&n.content)||''),
    String((n&&n.writer)||'').trim(),
    String((n&&n.ts)||'')
  ].join('\x1e');
}
function isActiveNote(n){
  if(!n||n._deleted) return false;
  return String(n.content||'').trim().length>0;
}

/**
 * 同一 id は sheetU 最大の1件にし、さらに同一フィンガープリントは1件にまとめる（同期・再取込の重複根絶）。
 */
function coalesceSameKindItems(items, fpFn, idPrefix, delKind){
  const delMap=recordItemDelMapActive();
  let list=(items||[]).map(x=>cloneDeep(x));
  if(delKind) list=list.filter(x=>!shouldDropMergedRecordItem(delKind, x, delMap));
  list.forEach(x=>{
    if(!String((x&&x.id)||'').trim()) x.id=genId(idPrefix);
  });
  const byId=new Map();
  list.forEach(x=>{
    const id=String(x.id||'').trim();
    const u=_recordItemU(x);
    const old=byId.get(id);
    if(!old||u>old.u) byId.set(id,{x:cloneDeep(x),u});
  });
  const byFp=new Map();
  byId.forEach(({x,u})=>{
    const fp=fpFn(x);
    const old=byFp.get(fp);
    if(!old||u>old.u) byFp.set(fp,{x:cloneDeep(x),u});
  });
  return [...byFp.values()].map(o=>o.x).sort((a,b)=>
    normalizeTimeText((a&&a.time)||'').localeCompare(normalizeTimeText((b&&b.time)||''))
  );
}

function coalesceDayTimedArrays(rec){
  if(!rec||typeof rec!=='object') return;
  rec.vital=coalesceSameKindItems(rec.vital, vitalFingerprint, 'v', 'v');
  rec.excretion=coalesceSameKindItems(rec.excretion, excretionFingerprint, 'e', 'e');
  rec.bath=coalesceSameKindItems(rec.bath, bathFingerprint, 'b', 'b');
  rec.care=coalesceSameKindItems(rec.care, careFingerprint, 'c', 'c');
  rec.notes=coalesceSameKindItems(rec.notes, notesFingerprint, 'n', null);
}

function coalesceAllRecordArrays(records){
  Object.keys(records||{}).forEach(dk=>{
    Object.keys((records[dk]||{})).forEach(nm=>{
      coalesceDayTimedArrays((records[dk]||{})[nm]);
    });
  });
}

function mergeRecordDay(L, R, dk, nm){
  if(!L && !R) return null;
  if(!L){
    const o=cloneDeep(R);
    coalesceDayTimedArrays(o);
    return o;
  }
  if(!R){
    const o=cloneDeep(L);
    coalesceDayTimedArrays(o);
    return o;
  }
  const out=cloneDeep(L);

  out.vital=coalesceSameKindItems([...(L.vital||[]),...(R.vital||[])], vitalFingerprint, 'v', 'v');
  out.excretion=coalesceSameKindItems([...(L.excretion||[]),...(R.excretion||[])], excretionFingerprint, 'e', 'e');
  out.bath=coalesceSameKindItems([...(L.bath||[]),...(R.bath||[])], bathFingerprint, 'b', 'b');
  out.care=coalesceSameKindItems([...(L.care||[]),...(R.care||[])], careFingerprint, 'c', 'c');
  out.notes=coalesceSameKindItems([...(L.notes||[]),...(R.notes||[])], notesFingerprint, 'n', null);

  const muL=_numU((L.meal||{})._u), muR=_numU((R.meal||{})._u);
  out.meal=cloneDeep(muR>muL?(R.meal||L.meal||{}):(L.meal||R.meal||{}));

  out.med={ morning:{time:'',staff:'',items:[]}, lunch:{time:'',staff:'',items:[]}, dinner:{time:'',staff:'',items:[]}, bedtime:{time:'',staff:'',items:[]} };
  const delMap=recordItemDelMapActive();
  ['morning','lunch','dinner','bedtime'].forEach(t=>{
    const a=L.med&&L.med[t], b=R.med&&R.med[t];
    const au=_numU(a&&a._u), bu=_numU(b&&b._u);
    const delAt=medSlotDeletedAt(dk, nm, t, delMap);
    const mx=Math.max(au, bu);
    if(delAt>0 && mx<=delAt){
      out.med[t]={time:'',staff:'',items:[],_u:delAt};
    }else{
      out.med[t]= bu>au ? cloneDeep(b||{time:'',staff:'',items:[]}) : cloneDeep(a||{time:'',staff:'',items:[]});
    }
    if(!out.med[t].items) out.med[t].items=[];
  });

  const ruL=_numU((L.rec||{})._u), ruR=_numU((R.rec||{})._u);
  out.rec= ruR>ruL ? cloneDeep(R.rec||{}) : cloneDeep(L.rec||{});

  const duL=_numU(L._dayU), duR=_numU(R._dayU);
  if(duR>duL){ out.day=R.day||''; out.dayWriter=R.dayWriter||''; out._dayU=duR; }
  else { out.day=L.day||''; out.dayWriter=L.dayWriter||''; out._dayU=duL; }

  return out;
}

function mergeResidentDelMaps(x,y){
  const out={};
  const A=x&&typeof x==='object'&&!Array.isArray(x)?x:{};
  const B=y&&typeof y==='object'&&!Array.isArray(y)?y:{};
  [...new Set([...Object.keys(A),...Object.keys(B)])].forEach(k=>{
    if(!k) return;
    out[k]=Math.max(_numU(A[k]),_numU(B[k]));
  });
  return out;
}
/** 設定の文字列配列（選択肢）を和集合。先に local の順、続けて remote だけのもの。両方空なら defFallback */
function mergeSettingsStringArrayUnion(a, b, defFallback){
  const out=[];
  const seen=new Set();
  const push=(arr)=>{
    (Array.isArray(arr)?arr:[]).forEach(x=>{
      const s=String(x==null?'':x).trim();
      if(!s||seen.has(s)) return;
      seen.add(s);
      out.push(s);
    });
  };
  push(a);
  push(b);
  if(!out.length) push(defFallback);
  return out;
}
/** 尿量（㎖）など数値だけのラベルなら昇順に整列 */
function sortNumericStringLabelsIfAllNumeric(arr){
  const list=Array.isArray(arr)?arr.map(x=>String(x).trim()).filter(Boolean):[];
  if(!list.length) return list;
  const nums=list.map(s=>Number(s));
  if(!nums.every(n=>Number.isFinite(n))) return list;
  return [...list].sort((x,y)=>Number(x)-Number(y));
}
/** バイタル等の行削除墓石キー（例 v:abc123） */
function recordItemDelKey(kind, id){
  return `${kind}:${String(id||'').trim()}`;
}
/** 服薬枠削除墓石キー */
function medSlotDelKey(dk, name, timing){
  const k=normalizeDateKey(dk);
  const nm=normalizeResidentName(name);
  const t=String(timing||'').trim()||'morning';
  return `m:${k}|${nm}|${t}`;
}
function supplyDelKey(id){
  return `s:${String(id||'').trim()}`;
}
function markRecordItemDeleted(kind, id){
  const kid=String(id||'').trim();
  if(!kid) return;
  db.settings=db.settings||{};
  if(!db.settings._recordItemDel||typeof db.settings._recordItemDel!=='object'||Array.isArray(db.settings._recordItemDel))
    db.settings._recordItemDel={};
  const k=recordItemDelKey(kind, kid);
  const ts=Date.now();
  db.settings._recordItemDel[k]=Math.max(_numU(db.settings._recordItemDel[k]), ts);
  touchSetU('_recordItemDel');
}
function markMedSlotDeleted(dk, name, timing){
  db.settings=db.settings||{};
  if(!db.settings._recordItemDel||typeof db.settings._recordItemDel!=='object'||Array.isArray(db.settings._recordItemDel))
    db.settings._recordItemDel={};
  const k=medSlotDelKey(dk, name, timing);
  const ts=Date.now();
  db.settings._recordItemDel[k]=Math.max(_numU(db.settings._recordItemDel[k]), ts);
  touchSetU('_recordItemDel');
}
function markSupplyDeleted(id){
  const sid=String(id||'').trim();
  if(!sid) return;
  db.settings=db.settings||{};
  if(!db.settings._recordItemDel||typeof db.settings._recordItemDel!=='object'||Array.isArray(db.settings._recordItemDel))
    db.settings._recordItemDel={};
  const k=supplyDelKey(sid);
  const ts=Date.now();
  db.settings._recordItemDel[k]=Math.max(_numU(db.settings._recordItemDel[k]), ts);
  touchSetU('_recordItemDel');
}
function recordItemDelMapActive(){
  return _mergeItemDelActive||(typeof db!=='undefined'&&db&&db.settings&&db.settings._recordItemDel)||{};
}
function shouldDropMergedRecordItem(delKind, item, delMap){
  if(!delKind||!item) return false;
  const id=String(item.id||'').trim();
  if(!id) return false;
  const delAt=_numU((delMap||{})[recordItemDelKey(delKind, id)]);
  if(!delAt) return false;
  return _recordItemU(item)<=delAt;
}
function medSlotDeletedAt(dk, name, timing, delMap){
  return _numU((delMap||{})[medSlotDelKey(dk, name, timing)]);
}
function shouldDropMergedSupply(s, delMap){
  const id=String(s&&s.id||'').trim();
  if(!id) return false;
  const delAt=_numU((delMap||{})[supplyDelKey(id)]);
  if(!delAt) return false;
  return _numU(s._u)<=delAt;
}
function residentDelMaxTs(resDel, r){
  const del=resDel&&typeof resDel==='object'&&!Array.isArray(resDel)?resDel:{};
  const id=String(r&&r.id||'').trim();
  const nm=normalizeResidentName(r&&r.name||'');
  const cands=[];
  if(id){
    cands.push(_numU(del[id])); // 旧形式（後方互換）
    cands.push(_numU(del['id:'+id]));
  }
  if(nm) cands.push(_numU(del['name:'+nm]));
  return Math.max(0,...cands);
}
function residentDroppedByTombstone(r,resDel){
  if(!resDel) return false;
  const delAt=residentDelMaxTs(resDel,r);
  if(!delAt) return false;
  return _numU(r._u)<=delAt;
}
/**
 * 同一利用者の複数バージョン（ローカル・リモート等）を1件にまとめる。
 * - sched / care / id / 氏名などは _u が最大の行をベースにする
 * - serviceType は「いずれかのバージョンが day なら day」（同期で片方だけ古い／推定違いで day が消えるのを防ぐ）
 */
function mergeResidentGroup(versions){
  if(!versions||!versions.length) return null;
  const v0=versions.map(r=>cloneDeep(r));
  if(v0.length===1){
    const x=v0[0];
    x.serviceType=residentServiceTypeOrDefault(x);
    return x;
  }
  let best=cloneDeep(v0[0]);
  let bestU=_numU(v0[0]._u);
  for(let i=1;i<v0.length;i++){
    const u=_numU(v0[i]._u);
    if(u>bestU){ best=cloneDeep(v0[i]); bestU=u; }
  }
  let st='resident';
  v0.forEach(r=>{
    if(residentServiceTypeOrDefault(r)==='day') st='day';
  });
  best._u=Math.max(...v0.map(r=>_numU(r._u)));
  best.serviceType=st;
  return best;
}
function mergeResidentsLoc(a, b, resDel){
  resDel=resDel||{};
  const groups=new Map();
  const add=(list)=>{
    (list||[]).forEach(r=>{
      if(residentDroppedByTombstone(r,resDel)) return;
      const key=String(r.name||r.id||'');
      if(!groups.has(key)) groups.set(key,[]);
      groups.get(key).push(r);
    });
  };
  add(a);
  add(b);
  const seen=new Set();
  const out=[];
  groups.forEach(versions=>{
    const r=mergeResidentGroup(versions);
    if(!r) return;
    const nm=normalizeResidentName(r.name);
    if(!nm||seen.has(nm)) return;
    r.name=nm;
    seen.add(nm);
    out.push(r);
  });
  return out.sort(compareResidentsStable);
}

function mergeSuppliesLoc(a, b){
  const delMap=recordItemDelMapActive();
  const m=new Map();
  const addList=(list)=>{
    (list||[]).forEach(s=>{
      if(!s||!s.id) return;
      if(shouldDropMergedSupply(s, delMap)) return;
      const u=_numU(s._u);
      const old=m.get(s.id);
      if(!old||u>old.u) m.set(s.id,{x:cloneDeep(s),u});
    });
  };
  addList(a);
  addList(b);
  return [...m.values()].map(o=>o.x).sort((p,q)=>(p.date||'').localeCompare(q.date||''));
}

function mergePulledDb(local, remote){
  const mergedItemDel=mergeResidentDelMaps(
    (local.settings||{})._recordItemDel,
    (remote.settings||{})._recordItemDel
  );
  _mergeItemDelActive=mergedItemDel;
  try{
    const out={};
    const mergedResDel=mergeResidentDelMaps(
      (local.settings||{})._residentDel,
      (remote.settings||{})._residentDel
    );
    out.residents=mergeResidentsLoc(local.residents, remote.residents, mergedResDel);
    out.supplies=mergeSuppliesLoc(local.supplies, remote.supplies);
    out.settings=cloneDeep(local.settings||{});
    const ru=remote._setU||{}, lu=local._setU||{};
    out._setU={};
    [...new Set([...Object.keys(lu),...Object.keys(ru)])].forEach(k=>{
      out._setU[k]=Math.max(_numU(lu[k]),_numU(ru[k]));
    });
    Object.keys(remote.settings||{}).forEach(k=>{
      if(k==='logoB64') return;
      if(SETTINGS_MERGE_UNION_KEYS.has(k)) return;
      if(_numU(ru[k])>_numU(lu[k])) out.settings[k]=cloneDeep(remote.settings[k]);
    });
    SETTINGS_MERGE_UNION_KEYS.forEach(k=>{
      if(!Object.prototype.hasOwnProperty.call(DEFAULT_SETTINGS,k)) return;
      const def=DEFAULT_SETTINGS[k];
      if(!Array.isArray(def)) return;
      const L=(local.settings||{})[k], R=(remote.settings||{})[k];
      let merged=mergeSettingsStringArrayUnion(L,R,def);
      if(k==='exUrineMlOptions') merged=sortNumericStringLabelsIfAllNumeric(merged);
      out.settings[k]=merged;
    });
    Object.keys(DEFAULT_SETTINGS).forEach(k=>{
      if(k==='logoB64') return;
      const cur=out.settings[k], def=DEFAULT_SETTINGS[k], cloud=(remote.settings||{})[k];
      if(cur===undefined||cur===null||cur===''){
        const cloudOk=cloud!==undefined&&cloud!==null&&cloud!=='';
        out.settings[k]=cloudOk?cloneDeep(cloud):cloneDeep(def);
      } else if(Array.isArray(def)&&def.length>0&&Array.isArray(cur)&&cur.length===0){
        if(Array.isArray(cloud)&&cloud.length>0) out.settings[k]=cloneDeep(cloud);
        else if(!['staffList','supplyProducts'].includes(k)&&Array.isArray(def)&&def.length>0)
          out.settings[k]=cloneDeep(def);
      }
    });
    const lrec=normalizeRecordsMap(local.records||{});
    const rrec=normalizeRecordsMap(remote.records||{});
    const dates=new Set([...Object.keys(lrec), ...Object.keys(rrec)]);
    out.records={};
    dates.forEach(dk=>{
      out.records[dk]={};
      const names=new Set([...Object.keys((lrec||{})[dk]||{}), ...Object.keys((rrec||{})[dk]||{})]);
      names.forEach(nm=>{
        out.records[dk][nm]=mergeRecordDay(
          (lrec[dk]||{})[nm],
          (rrec[dk]||{})[nm],
          dk,nm
        );
      });
    });
    normalizeVitalTempsInRecords(out.records);
    coalesceAllRecordArrays(out.records);
    out.settings._residentDel=mergeResidentDelMaps(mergedResDel, out.settings._residentDel||{});
    out.settings._recordItemDel=mergeResidentDelMaps(mergedItemDel, out.settings._recordItemDel||{});
    const logo=(local.settings||{}).logoB64;
    if(logo) out.settings.logoB64=logo;
    return out;
  }finally{
    _mergeItemDelActive=null;
  }
}

function touchSetU(key){
  db._setU=db._setU||{};
  db._setU[key]=Date.now();
}

function gasPost(extra){
  const url=gasUrl(), tok=gasToken();
  if(!url||!tok) return Promise.reject(new Error('GAS未設定（データ管理でURL・トークンを入力）'));
  // charset 付きだと環境によっては CORS のプリフライトが発生し、GAS が OPTIONS に応答できず失敗することがある
  return fetch(url,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(Object.assign({}, extra, {token:tok}))
  }).then(r=>{
    if(!r.ok) return r.text().then(t=>{ throw new Error('HTTP '+r.status+': '+t.slice(0,120)); });
    return r.json();
  }).then(j=>{
    if(!j.ok) throw new Error(j.error||'GAS応答エラー');
    return j;
  });
}

function persistLocalQuiet(){
  window._kaigoGasSaving=true;
  try{
    localStorage.setItem(FAC.storageKey, JSON.stringify(db));
  } finally {
    window._kaigoGasSaving=false;
  }
}

function syncPullOnly(){
  if(!gasConfigured()){ setSyncStatusIfGasMissing(); return Promise.resolve(); }
  setSyncStatus('取得中...','#185FA5');
  return gasPost({action:'pull', sheetName:FAC.sheetName})
    .then(j=>{
      const raw=j.rows||[];
      if(sheetLooksLikeCorruptMarker(raw)){
        const got=sheetTopCell(raw)||'(空)';
        setSyncStatus('取得:A1不正(反映なし)','orange');
        console.warn('syncPullOnly: シートA1は「'+SYNC_MARKER+'」である必要があります。実際:', got);
        return;
      }
      const remote=sheetToDb(raw);
      db=mergePulledDb(db, remote);
      persistLocalQuiet();
      renderMain();
      const n=new Date();
      setSyncStatus(`取得 ${n.getHours()}:${pad(n.getMinutes())}`,'green');
    })
    .catch(e=>{
      console.error(e);
      setSyncStatus('取得失敗: '+(e.message||''),'orange');
    });
}

function runGasPushCycle(){
  if(!gasConfigured()){ setSyncStatusIfGasMissing(); return Promise.resolve(); }
  if(!syncDirty) return Promise.resolve();
  setSyncStatus('同期中...','#185FA5');
  return gasPost({action:'pull', sheetName:FAC.sheetName})
    .then(j=>{
      const raw=j.rows||[];
      if(sheetLooksLikeCorruptMarker(raw)){
        setSyncStatus('同期:A1不正(中断)','orange');
        return Promise.reject(Object.assign(new Error('bad_sheet_marker'),{silent:true}));
      }
      const remote=sheetToDb(raw);
      db=mergePulledDb(db, remote);
      const rows=dbToSheet(db);
      return gasPost({action:'push', sheetName:FAC.sheetName, rows});
    })
    .then(()=>{
      persistLocalQuiet();
      syncDirty=false;
      localStorage.removeItem(FAC.storageKey+'_dirty');
      renderMain();
      const n=new Date();
      setSyncStatus(`反映済 ${n.getHours()}:${pad(n.getMinutes())}`,'green');
    })
    .catch(e=>{
      if(e&&e.silent) return;
      console.error(e);
      setSyncStatus('同期失敗: '+(e.message||''),'orange');
    });
}

function diagSync(){
  if(!FAC){ alert('施設未選択'); return; }

      const nRec=Object.keys(remote.records||{}).length;

function calcMealIntakeTotalPercent(rec){
  if(!rec||!rec.meal) return null;
  const m=rec.meal||{};
  const vals=[m.bMain,m.bSide,m.main,m.side,m.dMain,m.dSide]
    .map(v=>Number(v))
    .filter(v=>Number.isFinite(v));
  if(!vals.length) return null;
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const clamped=Math.max(0,Math.min(100,avg));
  return Math.round(clamped);
}

// ========== メイン画面描画 ==========
function getLastStool(name){
  // 過去14日間を遡って最終排便を探す
  for(let d=0;d<=13;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const dayData=db.records[dk(dt)]&&db.records[dk(dt)][name];
    if(dayData&&dayData.excretion){
      const found=dayData.excretion.filter(e=>e.stool&&e.stool!=='なし');
      if(found.length){
        const e=found[found.length-1];
        const et=normalizeTimeText(e.time)||'00:00';
        return {dt:new Date(dk(dt)+'T'+et+':00').getTime(), dayStr:['日','月','火','水','木','金','土'][dt.getDay()], time:et};
      }
    }
  }
  return null;
}

/** メイン表用：その日の記録に中身があるか（空の ensureDay だけは除外） */
function recordDayHasMainListData(rec){
  if(!rec||typeof rec!=='object') return false;
  if((rec.vital||[]).length) return true;
  if((rec.excretion||[]).length) return true;
  if((rec.bath||[]).length) return true;
  if((rec.care||[]).length) return true;
  if((rec.notes||[]).some(n=>isActiveNote(n))) return true;
  if(rec.meal&&mealRowHasData(rec.meal)) return true;
  const med=rec.med||{};
  if(['morning','lunch','dinner','bedtime'].some(t=>{
    const x=med[t];
    if(!x) return false;
    if((x.items||[]).length) return true;
    return !!(String(x.time||'').trim()||String(x.staff||'').trim());
  })) return true;
  if(rec.rec&&(String(rec.rec.content||'').trim()||(rec.rec.chips||[]).length||String(rec.rec.part||'').trim()||String(rec.rec.time||'').trim()))
    return true;
  if(String(rec.day||'').trim()) return true;
  return false;
}

/**
 * 利用者を氏名順に。
 * @param dayIdx カレンダー上の日（0始まり＝1日）
 * @param opts.forMainTable true のとき、選択日が「今日」より前なら、スケジュール外・削除済みでもその日の記録があれば一覧に含める（メイン画面の履歴表示用）
 */
function residentsOnDaySorted(dayIdx, opts){
  const fromSched=(db.residents||[]).filter(r=>r.sched&&r.sched[dayIdx]===1);
  if(!opts||!opts.forMainTable){
    return fromSched.slice().sort(compareResidentsStable);
  }
  const selKey=dk();
  const todayKey=dk(new Date());
  if(selKey>=todayKey){
    return fromSched.slice().sort(compareResidentsStable);
  }
  const byName=new Map();
  fromSched.forEach(r=>{
    const nm=normalizeResidentName(r.name);
    if(nm) byName.set(nm,Object.assign({},r,{_mainGhost:false}));
  });
  const dayRec=db.records[selKey]||{};
  Object.keys(dayRec).forEach(rawName=>{
    const nm=normalizeResidentName(rawName);
    if(!nm||byName.has(nm)) return;
    const rec=dayRec[rawName];
    if(!recordDayHasMainListData(rec)) return;
    const rr=(db.residents||[]).find(x=>normalizeResidentName(x.name)===nm);
    if(rr) byName.set(nm,Object.assign({},rr,{_mainGhost:false}));
    else byName.set(nm,{id:'',name:String(rawName).trim(),care:'',sched:[],_u:0,_mainGhost:true});
  });
  return [...byName.values()].sort(compareResidentsStable);
}

function renderMain(){
  if(!FAC) return;
  renderDate();
  renderFacilityHeader();
  const day=curDate.getDate()-1;
  const todayRes=residentsOnDaySorted(day,{forMainTable:true});
  const tbody=document.getElementById('resBody');
  if(!tbody) return;
  if(todayRes.length===0){
    tbody.innerHTML=`<tr><td colspan="12" style="padding:20px;color:var(--text3);text-align:center;">本日の利用者はいません</td></tr>
    <tr class="res-add-row no-print"><td></td><td><button class="res-add-btn" onclick="openAddResOv()">＋ 利用者を追加</button></td><td colspan="10"></td></tr>`;
    return;
  }
  tbody.innerHTML=todayRes.map(r=>{
    const rec=db.records[dk()]&&db.records[dk()][r.name]||{};
    // 申送（選択日当日終了時点から72時間以内のメモ：複数日チェック／履歴と同基準）
    const refEnd=historyRefEndMs(), winMs=72*3600000;
    const _h48chk=()=>{
      for(let d=0;d<=2;d++){
        const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
        const k=dk(dt);
        const rr=db.records[k]&&db.records[k][r.name]||{};
        if((rr.notes||[]).some(n=>{
          if(!isActiveNote(n)) return false;
          const tms=recordItemTsMs(k, n);
          return tms<=refEnd&&refEnd-tms<=winMs;
        })) return true;
      }
      return false;
    };
    const h48=_h48chk();
    const nc=h48?'<span class="cell-red">●</span>':'<span class="cell-empty">—</span>';
    // バイタル（体温/血圧/脈拍/SpO2）
    const lv=(rec.vital||[]).length?(rec.vital[rec.vital.length-1]):null;
    const _t=normalizeTempValue(lv&&lv.temp);
    const tc=lv?`<span class="${parseFloat(_t)>=37.0?'cell-warn':'cell-val'}">${_t||'—'}℃</span>`:'<span class="cell-empty">—</span>';
    const bc=lv?`<span class="${parseInt(lv.sbp)>=160?'cell-warn':'cell-val'}">${lv.sbp}/${lv.dbp}</span>`:'<span class="cell-empty">—</span>';
    const pc=lv?`<span class="${parseInt(lv.pulse)>=90?'cell-warn':'cell-val'}">${lv.pulse}</span>`:'<span class="cell-empty">—</span>';
    const sc=lv?`<span class="cell-val">${lv.spo2||'—'}%</span>`:'<span class="cell-empty">—</span>';
    // 排泄
    const le=(rec.excretion||[]).length?(rec.excretion[rec.excretion.length-1]):null;
    let ec;
    if(!le){ec='<span class="cell-empty">—</span>';}
    else{
      const lines=[];
      const _leWater=le.stool&&le.stool.startsWith('水様便');
      if(le.urineMl&&le.urineMl!=='なし') lines.push(`<span style="color:#0F6E56;font-weight:600;">尿 ${le.urineMl}㎖</span>`);
      else if(le.urine&&le.urine!=='なし') lines.push(`<span style="color:#0F6E56;font-weight:600;">尿 ${le.urine}</span>`);
      if(le.pad&&le.pad!=='なし') lines.push(`パット ${le.pad}`);
      if(le.padChange) lines.push('<span style="color:var(--blue);font-weight:600;">パ交換</span>');
      if(le.rehaChange) lines.push('<span style="color:var(--blue);font-weight:600;">リハパン交換</span>');
      if(le.diaperChange) lines.push('<span style="color:var(--blue);font-weight:600;">オムツ交換</span>');
      if(le.stool&&le.stool!=='なし') lines.push(_leWater?`<span style="color:var(--red);font-weight:600;">${le.stool}</span>`:`<span style="color:#8B4513;">${le.stool}</span>`);
      if(lines.length===0) lines.push('空振り');
      ec=`<span class="cell-ex">${normalizeTimeText(le.time)}<br>${lines.join('<br>')}</span>`;
    }
    // 最終排便（デイサービス利用者は管理対象外のため常に —）
    let lsc;
    if(residentServiceTypeOrDefault(r)==='day'){
      lsc='<span class="cell-empty">—</span>';
    }else{
      const _ls=getLastStool(r.name);
      if(!_ls){lsc='<span class="cell-empty">—</span>';}
      else{
        const _ha=(Date.now()-_ls.dt)/3600000;
        if(_ha<48) lsc=`<span class="cell-val" style="font-size:14px;">${_ls.dayStr}曜 ${normalizeTimeText(_ls.time)}</span>`;
        else if(_ha<60) lsc='<span class="cell-warn">－3日</span>';
        else if(_ha<72) lsc='<span class="cell-warn">－4日</span>';
        else lsc='<span class="cell-warn">－5日</span>';
      }
    }
    // 入浴
    const bac=(rec.bath||[]).length?'<span class="cell-ok">○</span>':'<span class="cell-empty">—</span>';
    // 食事
    const mc=(rec.meal&&rec.meal.menu)?'<span class="cell-ok">○</span>':'<span class="cell-empty">—</span>';
    // レク（申し送り）
    const rc=(rec.rec&&(rec.rec.content||(rec.rec.chips&&rec.rec.chips.length)))?'<span class="cell-ok">○</span>':'<span class="cell-empty">—</span>';
    // 服薬
    const med=rec.med||{};
    const _mItems=t=>((med[t]&&med[t].items)||[]).map(s=>String(s||'').trim()).filter(Boolean);
    const _mReal=t=>_mItems(t).some(i=>i!=='服薬なし');
    const _mNone=t=>{
      const it=_mItems(t);
      return it.length>0 && it.every(i=>i==='服薬なし');
    };
    const _isToday=dk()===dk(new Date());
    const _nowH=new Date().getHours()+new Date().getMinutes()/60;
    const _mParts=[];
    [{t:'morning',th:8},{t:'lunch',th:12},{t:'dinner',th:18},{t:'bedtime',th:21}].forEach(({t,th})=>{
      if(_mReal(t)) _mParts.push('<span style="color:var(--blue);font-weight:700;">✔</span>');
      else if(_mNone(t)) _mParts.push('<span style="color:var(--text3);font-weight:700;">ー</span>');
      else if(_isToday&&_nowH>=th) _mParts.push('<span style="color:var(--orange2);font-weight:700;">？</span>');
    });
    const mdc=_mParts.length?`<span class="cell-val" style="font-size:18px;letter-spacing:1px;">${_mParts.join('')}</span>`:'<span class="cell-empty">—</span>';

    return `<tr>
      <td style="width:32px;min-width:32px;padding:4px;" onclick="openDetail('${r.name}','notes')">${nc}</td>
      <td class="name-cell">
        <div class="name-cell-inner">
          <div class="name-cell-text">
            <div class="name-txt" onclick="openSummary('${r.name}')">${r.name}</div>
            <div class="name-sub">${r.care||''}</div>
          </div>
          ${r._mainGhost?'':`<button class="res-del-btn no-print" onclick="delResidentByName('${r.name}')">×</button>`}
        </div>
      </td>
      <td class="res-div-l" onclick="openDetail('${r.name}','vital')">${tc}</td>
      <td onclick="openDetail('${r.name}','vital')">${bc}</td>
      <td onclick="openDetail('${r.name}','vital')">${pc}</td>
      <td class="res-div-r" onclick="openDetail('${r.name}','vital')">${sc}</td>
      <td onclick="openDetail('${r.name}','excretion')">${ec}</td>
      <td class="res-div-r" onclick="openDetail('${r.name}','excretion')">${lsc}</td>

// ========== 48時間履歴取得（選択日＝「当日」の終わりを基準に72時間以内） ==========
/** 日付選択で選んだ日を「当日」とみなしたときの、その日の終わり（ローカル 23:59:59.999） */
function historyRefEndMs(){
  const t=new Date(curDate);
  t.setHours(23,59,59,999);
  return t.getTime();
}
/** 記録1件の比較用タイムスタンプ（日付キー＋時刻、または ts 文字列） */
function recordItemTsMs(dkStr, item){
  if(item&&item.ts){
    const x=Date.parse(String(item.ts));
    if(!isNaN(x)) return x;
  }
  return new Date(dkStr+'T'+(item&&item.time||'00:00')+':00').getTime();
}
function get48h(name, field){
  const refEnd=historyRefEndMs(), limit=72*3600000, all=[];
  for(let d=0;d<=2;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const k=dk(dt);
    const dayData=db.records[k]&&db.records[k][name];
    if(!dayData||!dayData[field]) continue;
    dayData[field].forEach((item,i)=>{
      if(field==='notes' && !isActiveNote(item)) return;
      const ts=recordItemTsMs(k, item);
      if(ts<=refEnd&&refEnd-ts<=limit) all.push({...item,_dk:k,_i:i,_ts:ts});
    });
  }
  return all.sort((a,b)=>b._ts-a._ts);
}
function get48hMed(name){
  const refEnd=historyRefEndMs(), limit=72*3600000, all=[];
  const ORDER=['morning','lunch','dinner','bedtime'];
  for(let d=0;d<=2;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const k=dk(dt);
    const dayData=db.records[k]&&db.records[k][name];
    if(!dayData||!dayData.med) continue;
    ORDER.forEach(t=>{
      const m=dayData.med[t];
      if(!m||!m.items||!m.items.length) return;
      const ts=recordItemTsMs(k, m);
      if(ts<=refEnd&&refEnd-ts<=limit) all.push({...m,_dk:k,_timing:t,_ts:ts});
    });
  }
  return all.sort((a,b)=>b._ts-a._ts);
}
function recDayLabel(dkStr){
  const dt=new Date(dkStr+'T12:00:00');
  return `${dt.getMonth()+1}/${pad(dt.getDate())}`;
}
function dateLabelWithWeek(dkStr){
  const dt=new Date(dkStr+'T12:00:00');
  const wd=['日','月','火','水','木','金','土'][dt.getDay()];
  return `${dt.getMonth()+1}/${pad(dt.getDate())}（${wd}）`;
}
function recordEditLabelByDate(dkStr){
  return `${dateLabelWithWeek(dkStr)}の履歴編集中`;
}
function recordEditLabelByDateTime(dkStr,timeStr){
  const base=dateLabelWithWeek(dkStr);
  const t=normalizeTimeText(timeStr||'');
  return `${base}${t||'--:--'}の履歴編集中`;
}
function hmFromTs(ts){
  const n=Number(ts||0);
  if(!n) return '';
  const d=new Date(n);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ========== スタッフ選択ビルド ==========
function buildStaffOpts(cur){
  const list=(db.settings||{}).staffList||[];
  if(!list.length) return '<option value="">（未登録）</option>';
  return '<option value="">── 担当者を選択 ──</option>'+
    list.map(s=>`<option${s===cur?' selected':''}>${s}</option>`).join('');
}
function buildStaffSelect(id, cur){
  const el=document.getElementById(id);
  if(el) el.innerHTML=buildStaffOpts(cur);
}
function normalizeTimeText(v){
  const s=String(v||'').trim();
  if(!s) return '';
  const hm=s.match(/^(\d{1,2}):(\d{2})$/);
  if(hm) return `${pad(Number(hm[1]))}:${hm[2]}`;
  const t=Date.parse(s);
  if(!isNaN(t)){
    const d=new Date(t);
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  return s;
}
function normalizeTempValue(v){
  let s=String(v||'').trim()
    .replace(/[，,]/g,'.')
    .replace(/[。．]/g,'.')
    .replace(/[^\d.]/g,'');
  if(!s) return '';
  // 0.xx / 0.xxx のような誤値は温度入力の省略記法として補正
  // 例: 0.37 -> 37.0 / 0.365 -> 36.5
  if(/^0\.\d{2,4}$/.test(s)){
    const d=s.slice(2);
    if(d.length===2) s=d+'.0';
    else if(d.length===3) s=d.slice(0,2)+'.'+d.slice(2);
    else s=d.slice(0,3)+'.'+d.slice(3);
  }
  if(/^\d{3,4}$/.test(s)) s=s.slice(0,-1)+'.'+s.slice(-1);
  if(/^\.\d{3,}$/.test(s)){
    const d=s.slice(1);
    s=d.slice(0,-1)+'.'+d.slice(-1);
  }
  if(/^\.\d+$/.test(s)) s='0'+s;
  const parts=s.split('.');
  if(parts.length>2) s=parts[0]+'.'+parts.slice(1).join('');
  return s;
}
function convTemp(el){
  // 入力中の強制変換はしない（カーソル飛びや誤変換防止）
  el.value=String(el.value||'').replace(/[，,]/g,'.').replace(/[。．]/g,'.');
}

function toggleChip(el,item){
  el.classList.toggle('selected');
  const sel=[...document.querySelectorAll('#careChips .chip.selected')].map(e=>e.textContent);
  const ta=document.getElementById('caContent');
  if(ta) ta.value=sel.join('、');
}
function toggleForwardCareChip(el){
  el.classList.toggle('selected');
}
let _editCare=null;
function editCare(dkStr,idx){
  const c=getRec(curRes,dkStr).care[idx];
  document.getElementById('caTime').value=c.time||'';
  document.getElementById('caContent').value=c.content||'';
  const fw=document.getElementById('caForwardChip');
  if(fw) fw.classList.toggle('selected', !!c.forwardToNotes);
  document.querySelectorAll('#careChips .chip').forEach(el=>{
    const txt=el.textContent;
    el.classList.toggle('selected',(c.content||'').includes(txt));
  });
  _editCare={dkStr,idx};
  const modeLabel=document.getElementById('careEditModeLabel');
  if(modeLabel){
    modeLabel.style.display='block';
    modeLabel.textContent=recordEditLabelByDateTime(dkStr,c.time);
  }
  document.getElementById('careForm').scrollIntoView({behavior:'smooth'});
}
function saveCare(){
  const time=document.getElementById('caTime').value||nowTime();
  const staff='';
  const content=document.getElementById('caContent').value.trim();
  const forwardToNotes=!!document.getElementById('caForwardChip')?.classList.contains('selected');
  if(!content){ alert('内容を入力してください'); return; }
  if(_editCare){
    const r=getRec(curRes,_editCare.dkStr);
    const prev=r.care[_editCare.idx]||{};
    r.care[_editCare.idx]={...prev,time,content,staff,forwardToNotes,sheetU:Date.now()};
    if(forwardToNotes){
      const noteId=prev.forwardNoteId||genId('n');
      const notePayload={id:noteId,time,writer:staff,content,ts:new Date().toISOString(),_deleted:false,sheetU:Date.now()};
      const ni=(r.notes||[]).findIndex(n=>n&&n.id===noteId);
      if(ni>=0) r.notes[ni]={...(r.notes[ni]||{}),...notePayload};
      else{
        r.notes=r.notes||[];
        r.notes.push(notePayload);
      }
      r.care[_editCare.idx].forwardNoteId=noteId;
    }
    _editCare=null;
  }else{
    const r=getRec(curRes);
    const item={id:genId('c'),time,content,staff,forwardToNotes,sheetU:Date.now()};
    if(forwardToNotes){
      const noteId=genId('n');
      r.notes.push({id:noteId,time,writer:staff,content,ts:new Date().toISOString(),_deleted:false,sheetU:Date.now()});
      item.forwardNoteId=noteId;
    }
    r.care.push(item);
  }
  saveDB(); showSavedToast(); goBack();
}
function delCare(dkStr,idx){
  if(!confirm('削除しますか？')) return;
  const r=getRec(curRes,dkStr);
  const row=r.care&&r.care[idx];
  const id=row&&row.id;
  if(id) markRecordItemDeleted('c', id);
  r.care.splice(idx,1);
  saveDB(); refreshPanel('care');
}

function toggleMedHistMore(btn){

function escapeHtml(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}
/** テキストエリア先頭の「登録チップ行」と残りの自由記入を分離 */
function parseDayTextarea(dayText, dayItems){
  const set=new Set((dayItems||[]).map(x=>String(x)));
  const lines=String(dayText||'').split(/\r?\n/);
  const chips=[];
  let i=0;
  for(;i<lines.length;i++){
    const L=lines[i];
    if(set.has(L)){ chips.push(L); continue; }
    if(L==='' && chips.length){ i++; break; }
    break;
  }
  const free=lines.slice(i).join('\n').replace(/^\n+/,'').trim();
  return {chips,free};
}
function composeDayTextarea(sel, free){
  const f=String(free||'').trim();
  const arr=Array.isArray(sel)?sel:[];
  if(!arr.length) return f;
  const body=arr.join('\n');
  return f?(body+'\n\n'+f):body;
}

// ========== サマリー ==========
function buildResidentDailySummaryRows(name, dateKey){
  const rec=getRec(name,dateKey);
  const rows=[];
  const push=(t,cat,body,staff='')=>{
    const b=String(body||'').trim();
    if(!b) return;
    rows.push({t:normalizeTimeText(t)||'',cat,body:b,staff:staff||''});
  };

  (rec.vital||[]).forEach(v=>{
    const parts=[];
    const tv=normalizeTempValue(v.temp);
    if(tv!==''&&tv!=null) parts.push('体温:'+tv+'℃');
    if((v.sbp&&String(v.sbp).trim())||(v.dbp&&String(v.dbp).trim())) parts.push('血圧:'+(v.sbp||'')+'/'+(v.dbp||''));
    if(v.pulse&&String(v.pulse).trim()) parts.push('脈拍:'+v.pulse);
    if(v.spo2&&String(v.spo2).trim()&&v.spo2!=='—') parts.push('SpO2:'+v.spo2+'%');
    if(v.weight&&String(v.weight).trim()) parts.push('体重:'+v.weight+'kg');
    push(v.time,'バイタル',parts.join('、'),v.staff||'');
  });
  (rec.excretion||[]).forEach(e=>{
    const parts=[];
    if(e.urine&&e.urine!=='なし') parts.push('排尿:'+e.urine);
    else if(e.urine==='なし') parts.push('排尿:なし');
    if(e.pad&&e.pad!=='なし') parts.push('パット:'+e.pad);
    if(e.stool&&e.stool!=='なし') parts.push('排便:'+e.stool);
    else if(e.stool==='なし') parts.push('排便:なし');
    const flags=[];
    if(e.padChange) flags.push('パット交換');
    if(e.rehaChange) flags.push('リハパン交換');
    if(e.diaperChange) flags.push('おむつ交換');
    if(flags.length) parts.push(flags.join('・'));
    push(e.time,'排泄',parts.join('、'),e.writer||e.staff||'');
  });
  (rec.bath||[]).forEach(b=>push(b.time,'入浴',b.type||'',b.staff||''));
  (rec.care||[]).forEach(c=>push(c.time,'ケア記録',getCareContentText(c),c.staff||''));
  (rec.notes||[]).filter(n=>!n._deleted).forEach(n=>push(n.time||'','申送り',n.content||'',n.writer||''));
  if(rec.rec&&String(rec.rec.content||'').trim()){
    push(rec.rec.time||'','レク',String(rec.rec.content||'').trim(),rec.rec.staff||'');
  }
  if(String(rec.day||'').trim()){
    push('', '1日の様子', String(rec.day||'').trim(), rec.dayWriter||'');
  }
  const m=rec.meal||{};
  const hasMeal=(k)=>m[k]!=null&&String(m[k]).trim()!=='';
  if(hasMeal('bMain')||hasMeal('bSide')||hasMeal('bWater')){
    const parts=[];
    if(hasMeal('bMain')) parts.push('主食:'+m.bMain+'%');
    if(hasMeal('bSide')) parts.push('副食:'+m.bSide+'%');
    if(hasMeal('bWater')) parts.push('水分:'+m.bWater+'ml');
    push(m.bTime||'07:30','朝食',parts.join('、'),'');
  }
  if(hasMeal('main')||hasMeal('side')||hasMeal('water')||hasMeal('menu')||hasMeal('snack')){
    const parts=[];
    if(hasMeal('main')) parts.push('主食:'+m.main+'%');
    if(hasMeal('side')) parts.push('副食:'+m.side+'%');
    if(hasMeal('water')) parts.push('水分:'+m.water+'ml');
    if(hasMeal('menu')) parts.push('メニュー:'+m.menu);
    if(hasMeal('snack')) parts.push('おやつ:'+m.snack);
    push(m.time||'11:50','昼食',parts.join('、'),'');
  }
  if(hasMeal('dMain')||hasMeal('dSide')||hasMeal('dWater')){
    const parts=[];
    if(hasMeal('dMain')) parts.push('主食:'+m.dMain+'%');
    if(hasMeal('dSide')) parts.push('副食:'+m.dSide+'%');
    if(hasMeal('dWater')) parts.push('水分:'+m.dWater+'ml');
    push(m.dTime||'17:30','夕食',parts.join('、'),'');
  }
  MED_TIMINGS.forEach(t=>{
    const md=(rec.med&&rec.med[t.id])||{};
    const items=(md.items||[]).filter(Boolean);
    if(!items.length && !String(md.time||'').trim() && !String(md.staff||'').trim()) return;
    push(md.time||'', '服薬', `${t.label}：${items.join('、')||'（内容未入力）'}`, md.staff||'');
  });
  const catOrder={'バイタル':1,'排泄':2,'入浴':3,'朝食':4,'昼食':5,'夕食':6,'服薬':7,'ケア記録':8,'申送り':9,'レク':10,'1日の様子':11};
  rows.sort((a,b)=>{
    const at=a.t||'99:99', bt=b.t||'99:99';
    if(at!==bt) return at<bt?-1:1;
    return (catOrder[a.cat]||99)-(catOrder[b.cat]||99);
  });
  return rows;
}

function renderSupplySummary(){
  const ym = document.getElementById('supSumMonth').value;
  if(!ym) return;
  const [y,m] = ym.split('-');
  const label = `${parseInt(y)}年${parseInt(m)}月`;
  const items = (db.supplies||[]).filter(s=>s.date&&s.date.startsWith(ym));
  const el = document.getElementById('supSummary');
  if(!items.length){
    el.innerHTML=`<div style="color:var(--text3);font-size:14px;text-align:center;padding:20px;">${label}の記録はありません</div>`;
    return;
  }
  // 利用者別・品目別に集計
  const byRes = {}; // {resName: {product: [{date,qty}]}}
  items.forEach(s=>{
    if(!byRes[s.resName]) byRes[s.resName]={};
    if(!byRes[s.resName][s.product]) byRes[s.resName][s.product]=[];
    byRes[s.resName][s.product].push({date:s.date, qty:s.qty});
  });
  const resNames = Object.keys(byRes).sort();
  // 全品目一覧
  const allProducts = [...new Set(items.map(s=>s.product))].sort();
  const dayNames=['日','月','火','水','木','金','土'];

  let html = `<div style="font-size:14px;font-weight:600;color:var(--text2);margin-bottom:10px;">${label}の集計</div>`;
  html += `<table class="sup-sum-table"><thead><tr>
    <th style="text-align:left;padding-left:8px;">利用者</th>
    ${allProducts.map(p=>`<th>${p}</th>`).join('')}
    <th>合計</th>
  </tr></thead><tbody>`;

  let colTotals = {};
  resNames.forEach(name=>{
    const prods = byRes[name];
    let rowTotal = 0;
    const cells = allProducts.map(p=>{
      const entries = prods[p]||[];
      const total = entries.reduce((s,e)=>s+e.qty,0);
      if(!total) return `<td style="color:var(--text3);text-align:center;">—</td>`;
      colTotals[p]=(colTotals[p]||0)+total;
      rowTotal+=total;
      // 日付詳細
      const detail = entries.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
        const dt=new Date(e.date+'T00:00:00');
        return `${dt.getDate()}日×${e.qty}`;
      }).join('、');
      return `<td style="text-align:center;"><span style="font-weight:700;font-size:17px;">${total}</span><div class="sup-sum-detail">${detail}</div></td>`;
    });
    colTotals['__total']=(colTotals['__total']||0)+rowTotal;
    html+=`<tr><td><div class="sup-sum-name">${name}</div></td>${cells.join('')}<td style="text-align:center;font-weight:700;font-size:17px;color:var(--orange2);">${rowTotal}</td></tr>`;
  });
  // 合計行
  html+=`<tr style="background:#FFF3E8!important;"><td style="font-weight:700;padding-left:8px;">合計</td>
    ${allProducts.map(p=>`<td style="text-align:center;font-weight:700;">${colTotals[p]||0}</td>`).join('')}
    <td style="text-align:center;font-weight:700;color:var(--orange2);">${colTotals['__total']||0}</td>
  </tr>`;
  html+=`</tbody></table>`;
  el.innerHTML=html;
}

function openUpload(){
  document.getElementById('uploadMsg').textContent='';
  document.getElementById('xlsxFile').value='';
