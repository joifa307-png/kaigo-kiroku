<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="介護記録">
<title id="pageTitle">介護記録</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ===== CSS変数 ===== */
:root{
  --blue:#185FA5; --blue2:#E6F1FB;
  --orange:#E87722; --orange2:#C45F0A; --orange-bg:#FEF0E6;
  --green:#0F6E56; --green2:#E1F5EE; --green-bg:#E1F5EE;
  --red:#A32D2D; --red2:#FCEBEB;
  --text1:#1A1916; --text2:#5C5A54; --text3:#9E9C94;
  --border1:#DDDBD4; --border2:#C8C5BC;
  --bg:#F5F4F0; --white:#fff; --r1:7px; --r2:10px; --r3:16px;
  --shadow:0 2px 8px rgba(0,0,0,.10);
}

/* ===== リセット ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;
  background:var(--bg);color:var(--text1);font-size:30px;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:30px;}

/* ===== ヘッダー共通 ===== */
.hdr{
  background:linear-gradient(135deg,#fff 0%,#FEF6F0 100%);
  border-bottom:1px solid var(--border1);
  padding:5px 10px;display:flex;align-items:center;gap:6px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
}
.hdr-logo{height:50px;max-width:200px;object-fit:contain;}
.hdr-title{font-weight:700;font-size:16px;color:var(--orange2);}
.hdr-facility{font-size:12px;color:var(--text3);margin-left:4px;}
.hdr-btn{
  padding:7px 12px;border-radius:var(--r2);border:1px solid var(--border2);
  background:var(--white);color:var(--text2);font-size:14px;
  cursor:pointer;white-space:nowrap;user-select:none;
}
.hdr-btn:active{opacity:.7;}
.hdr-btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);}
.hdr-btn.nav{padding:6px 10px;font-size:18px;}
.hdr-center{display:flex;align-items:center;gap:4px;}
.hdr-date{
  font-size:17px;font-weight:600;padding:6px 10px;
  border-radius:var(--r2);border:1px solid var(--border2);
  background:var(--white);cursor:pointer;white-space:nowrap;
}
.sync-indicator{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);}
.sync-dot{font-size:16px;line-height:1;}

/* ===== 画面切替 ===== */
.screen{display:none;}
.screen.active{display:block;}

/* ===== メイン画面 ===== */
.main-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.res-table{width:100%;border-collapse:collapse;min-width:700px;}
.res-table th{
  background:var(--orange);color:#fff;padding:8px 6px;
  font-size:22px;white-space:nowrap;text-align:center;
}
.res-table td{
  padding:10px 6px;border-bottom:1px solid var(--border1);
  border-right:1px solid var(--border1);
  text-align:center;font-size:14px;vertical-align:middle;cursor:pointer;
}
.res-table tr:nth-child(odd) td{background:var(--white);}
.res-table tr:nth-child(even) td{background:#F7F6F2;}
.res-table tr:active td{background:var(--blue2)!important;}
.name-cell{text-align:left !important;padding-left:6px !important;padding-right:4px !important;cursor:default;}
.name-cell-inner{display:flex;align-items:center;gap:4px;}
.name-cell-text{flex:1;}
.name-txt{font-size:22px;font-weight:500;}
.name-sub{font-size:16px;color:var(--text3);}
.res-del-btn{border:none;background:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 6px;line-height:1;flex-shrink:0;}
.res-del-btn:active{color:var(--red);}
.res-add-row td{background:var(--white)!important;text-align:center;padding:6px!important;}
.res-add-btn{border:1px dashed var(--border2);background:none;color:var(--text2);font-size:16px;padding:6px 20px;border-radius:var(--r2);cursor:pointer;}
.cell-val{font-size:18px;line-height:1.4;}
.cell-empty{color:var(--text3);font-size:18px;}
.cell-ok{color:var(--green);font-size:22px;font-weight:700;}
.cell-warn{color:var(--red);font-size:18px;font-weight:700;}
.cell-red{color:var(--red);font-size:22px;font-weight:700;}
/* 排泄列専用 */
.cell-ex{font-size:18px;line-height:1.4;}
.badge-ok{color:var(--green);font-weight:700;}
.badge-ng{color:var(--orange2);font-weight:700;}

/* ===== 詳細画面 ===== */
.detail-hdr{
  background:linear-gradient(135deg,#fff 0%,#FEF6F0 100%);
  border-bottom:1px solid var(--border1);
  padding:8px 12px;display:flex;align-items:center;gap:8px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
}
.detail-name{font-size:18px;font-weight:600;color:var(--text1);}
.back-btn{
  padding:7px 14px;border-radius:var(--r2);border:1px solid #F5C49A;
  background:var(--orange-bg);color:var(--orange2);font-size:15px;font-weight:600;
  white-space:nowrap;flex-shrink:0;cursor:pointer;
}

/* ===== タブ ===== */
.tabs{
  display:flex;overflow-x:auto;background:var(--white);
  border-bottom:2px solid var(--border2);
  position:sticky;top:57px;z-index:99;
  -webkit-overflow-scrolling:touch;
}
.tab{
  padding:10px 16px;font-size:20px;font-weight:600;white-space:nowrap;
  color:var(--text3);border-bottom:3px solid transparent;
  cursor:pointer;flex-shrink:0;margin-bottom:-2px;
}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700;background:var(--orange-bg);}

/* ===== パネル ===== */
.panel{padding:12px;}
.panel-sec{
  background:var(--white);border-radius:var(--r2);padding:14px;
  margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.panel-sec h3{
  font-size:22px;color:var(--text2);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--border2);
}
.panel-sec h3 .sec-btn{float:right;}

/* ===== フォームグループ ===== */
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:20px;color:var(--text2);margin-bottom:4px;font-weight:600;}
.fg input,.fg select,.fg textarea{
  width:100%;padding:8px 10px;border:1px solid var(--border2);
  border-radius:var(--r1);background:var(--white);font-size:20px;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  outline:none;border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,119,34,.15);
}
.fg textarea{min-height:100px;resize:vertical;}
.fg-row{display:flex;gap:10px;}
.fg-row .fg{flex:1;}
.fg-hint{font-size:14px;color:var(--text3);margin-top:3px;}

/* ===== チップ ===== */
.chip{
  display:inline-block;padding:8px 18px;border-radius:20px;
  border:1px solid var(--border2);background:var(--white);
  font-size:20px;cursor:pointer;user-select:none;margin:3px;
}
.chip.on,.chip.pc-on{background:var(--orange);color:#fff;border-color:var(--orange);}
.chip.selected{background:var(--orange);color:#fff;border-color:var(--orange);}

/* ===== ボタン ===== */
.btn{
  display:inline-block;padding:10px 20px;border-radius:var(--r2);
  border:none;font-size:20px;font-weight:600;cursor:pointer;
  user-select:none;text-align:center;
}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:active{opacity:.8;}
.btn-danger{background:var(--red);color:#fff;}
.btn-gray{background:var(--border2);color:var(--text2);}
.btn-sm{padding:6px 12px;font-size:18px;}
.btn-block{display:block;width:100%;}

/* ===== 履歴リスト ===== */
.hist-list{margin-bottom:14px;}
.hist-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:10px 0;border-bottom:1px solid var(--border2);
}
.hist-item:last-child{border-bottom:none;}
.hist-time{color:var(--orange2);font-weight:700;white-space:nowrap;min-width:80px;font-size:20px;}
.hist-content{flex:1;color:var(--text1);font-size:20px;line-height:1.5;}
.hist-del{color:var(--red);font-size:18px;padding:4px 10px;border:1px solid var(--red);
  border-radius:var(--r1);background:none;cursor:pointer;white-space:nowrap;}
.hist-edit{color:var(--blue);font-size:18px;padding:4px 10px;border:1px solid var(--blue);
  border-radius:var(--r1);background:none;cursor:pointer;white-space:nowrap;margin-right:2px;}
.hist-day{font-size:14px;color:var(--orange2);font-weight:600;margin:6px 0 2px;}

/* ===== オーバーレイ ===== */
.ov-back{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
}
.ov-back.show{display:block;}
.ov{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-radius:var(--r3) var(--r3) 0 0;
  max-height:90vh;overflow-y:auto;z-index:201;padding:20px 16px;
  transform:translateY(100%);transition:transform .25s ease;
}
.ov-back.show .ov,.ov-back.show+.ov{transform:translateY(0);}
.ov.show{transform:translateY(0);}
.ov-title{
  font-size:17px;font-weight:700;margin-bottom:16px;
  padding-bottom:10px;border-bottom:1px solid var(--border2);
  display:flex;justify-content:space-between;align-items:center;
}
.ov-close{font-size:20px;color:var(--text3);border:none;background:none;cursor:pointer;padding:0 4px;}

/* ===== カレンダー ===== */
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:6px;
}
.cal-lbl{text-align:center;font-size:10px;color:var(--text3);padding:3px 0;font-weight:600;}
.cal-day{
  text-align:center;padding:5px 2px;font-size:12px;border-radius:var(--r1);
  cursor:pointer;position:relative;
}
.cal-day:active{background:var(--blue2);}
.cal-day.today{background:var(--orange2);color:#fff;font-weight:700;}
.cal-day.sel{background:var(--orange);color:#fff;font-weight:700;}
.cal-day.has::after{
  content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:var(--green);
}
.cal-day.today.has::after,.cal-day.sel.has::after{background:#fff;}
.cal-nav{display:flex;justify-content:space-between;align-items:center;}
.cal-nav-title{font-weight:700;font-size:13px;}

/* ===== 服薬チップ ===== */
.med-chip{
  display:inline-block;padding:8px 20px;border-radius:20px;
  border:1px solid var(--border2);background:var(--white);
  font-size:26px;cursor:pointer;margin:3px;user-select:none;
}
.med-chip.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.med-chip.none-on{background:var(--text3);color:#fff;border-color:var(--text3);}

/* ===== 設定画面 ===== */
.settings-tabs{
  display:flex;overflow-x:auto;background:var(--white);
  border-bottom:1px solid var(--border2);
  -webkit-overflow-scrolling:touch;
}
.settings-tab{
  padding:10px 16px;font-size:13px;white-space:nowrap;
  color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;
  flex-shrink:0;
}
.settings-tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700;}
.settings-panel{display:none;padding:14px;}
.settings-panel.active{display:block;}
.settings-list-item{
  display:flex;align-items:center;gap:8px;padding:10px;
  border:1px solid var(--border2);border-radius:var(--r1);margin-bottom:8px;
  background:var(--white);
}
.settings-list-item .item-name{flex:1;font-size:14px;}
.settings-list-item .item-del{
  color:var(--red);font-size:12px;padding:3px 8px;
  border:1px solid var(--red);border-radius:var(--r1);background:none;cursor:pointer;
}

/* ===== 印刷 ===== */
#printArea{display:none;}
@media print{
  .no-print{display:none !important;}
  .screen{display:none !important;}
  #printArea{display:block !important;}
  body{background:#fff;font-size:11px;}
  .print-title{font-size:14px;font-weight:700;margin-bottom:8px;border-bottom:2px solid #333;padding-bottom:4px;}
  .print-table{border-collapse:collapse;width:100%;margin-bottom:12px;}
  .print-table th{background:#f0f0f0;border:1px solid #555;padding:4px 6px;font-size:11px;white-space:nowrap;}
  .print-table td{border:1px solid #999;padding:3px 6px;font-size:11px;vertical-align:top;}
  .print-subtitle{font-size:12px;font-weight:600;margin:10px 0 4px;color:#333;}
}

/* ===== ユーティリティ ===== */
.text-blue{color:var(--blue);}
.text-green{color:var(--green);}
.text-orange{color:var(--orange2);}
.text-red{color:var(--red);}
.text-gray{color:var(--text3);}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.flex{display:flex;}
.flex-1{flex:1;}
.gap8{gap:8px;}
.gap6{gap:6px;}
.items-center{align-items:center;}
.justify-between{justify-content:space-between;}
.w100{width:100%;}
</style>
</head>
<body>

<!-- ========== 施設選択画面 ========== -->
<div id="selectScreen" class="screen active">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:var(--bg);">
    <div style="font-size:28px;font-weight:700;color:var(--orange2);margin-bottom:8px;">介護記録</div>
    <div style="font-size:14px;color:var(--text3);margin-bottom:40px;">ユニットを選択してください</div>
    <div style="display:flex;flex-direction:column;gap:16px;width:100%;max-width:320px;">
      <button onclick="selectFacility('nishi')" style="padding:24px;border-radius:var(--r3);border:2px solid var(--orange);background:var(--orange-bg);color:var(--orange2);font-size:22px;font-weight:700;cursor:pointer;">
        🏠 西ユニット
      </button>
      <button onclick="selectFacility('minami')" style="padding:24px;border-radius:var(--r3);border:2px solid var(--blue);background:var(--blue2);color:var(--blue);font-size:22px;font-weight:700;cursor:pointer;">
        🏠 南ユニット
      </button>
    </div>
  </div>
</div>

<!-- ========== メイン画面 ========== -->
<div id="mainScreen" class="screen">
  <div class="hdr no-print">
    <img id="mainLogo" class="hdr-logo" src="" alt="" style="display:none;">
    <div style="flex:1;"></div>
    <div class="hdr-center">
      <button class="hdr-btn nav" onclick="moveDay(-1)">◀</button>
      <div class="hdr-date" id="mainDate" onclick="openCal()"></div>
      <button class="hdr-btn nav" onclick="moveDay(1)">▶</button>
    </div>
    <div class="sync-indicator">
      <span class="sync-dot" id="syncDot">●</span>
      <span id="syncLabel">--</span>
    </div>
    <button class="hdr-btn no-print" onclick="openUpload()" style="background:#F3F0FF;color:#5B3FB5;border-color:#5B3FB5;font-weight:700;">📅予定</button>
    <button class="hdr-btn no-print" onclick="openPrint()" style="background:#E1F5EE;color:#0F6E56;border-color:#0F6E56;font-weight:700;">連絡帳</button>
    <button class="hdr-btn no-print" onclick="saveMonthlyBackup()" style="background:var(--blue2);color:var(--blue);border-color:var(--blue);font-weight:700;">月次保存</button>
    <button class="hdr-btn no-print" onclick="syncNow()">🔄</button>
    <button class="hdr-btn no-print" onclick="openSettings()">⚙️</button>
  </div>
  <div class="main-scroll">
    <table class="res-table" id="resTable">
      <thead>
        <tr>
          <th style="width:32px;min-width:32px;">申送</th>
          <th style="min-width:80px;">氏名</th>
          <th>体温</th>
          <th>血圧</th>
          <th>脈拍</th>
          <th>SpO2</th>
          <th>排泄</th>
          <th style="white-space:nowrap;">最終排便</th>
          <th>入浴</th>
          <th>食事</th>
          <th>レク</th>
          <th onclick="openBulkMed()" style="cursor:pointer;white-space:nowrap;">服薬 ▼</th>
        </tr>
      </thead>
      <tbody id="resBody"></tbody>
    </table>
  </div>
</div>

<!-- ========== 詳細画面 ========== -->
<div id="detailScreen" class="screen">
  <div class="detail-hdr no-print">
    <button class="back-btn" onclick="goBack()">◀ メイン</button>
    <div style="flex:1;">
      <div class="detail-name" id="detName"></div>
      <div class="hdr-center" style="margin-top:4px;">
        <button class="hdr-btn nav" onclick="moveDayDet(-1)">◀</button>
        <div class="hdr-date" id="detDate" onclick="openCal()"></div>
        <button class="hdr-btn nav" onclick="moveDayDet(1)">▶</button>
      </div>
    </div>
    <button class="hdr-btn no-print" onclick="openCareSummary()" style="font-size:13px;padding:6px 10px;">📋 サマリー</button>
    <button class="hdr-btn no-print" onclick="openVitalPrint()" style="font-size:13px;padding:6px 10px;">📅 期間印刷</button>
  </div>
  <div class="tabs no-print" id="detTabs"></div>
  <div id="detPanel"></div>
</div>

<!-- ========== 設定画面 ========== -->
<div id="settingsScreen" class="screen">
  <div class="hdr no-print">
    <button class="back-btn" onclick="closeSettings()">◀ 戻る</button>
    <div class="hdr-title" style="flex:1;">設定</div>
  </div>
  <div class="settings-tabs no-print" id="settingsTabs"></div>
  <div id="settingsBody"></div>
</div>

<!-- ========== カレンダーオーバーレイ ========== -->
<div class="ov-back" id="ovCal">
  <div class="ov show">
    <div class="ov-title">
      <span>日付を選ぶ</span>
      <button class="ov-close" onclick="closeOv('ovCal')">✕</button>
    </div>
    <div class="cal-nav">
      <button class="hdr-btn nav" onclick="calMove(-1)">◀</button>
      <div class="cal-nav-title" id="calTitle"></div>
      <button class="hdr-btn nav" onclick="calMove(1)">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div style="margin-top:12px;text-align:center;">
      <button class="btn btn-primary btn-sm" onclick="goToday()">今日</button>
    </div>
  </div>
</div>

<!-- ========== 汎用オーバーレイ ========== -->
<div class="ov-back" id="ovMain">
  <div class="ov show" id="ovMainBody"></div>
</div>

<!-- ========== 8日集計オーバーレイ ========== -->
<div class="ov-back" id="ovSummary" onclick="if(event.target===this)closeOv('ovSummary')">
  <div class="ov show" style="height:100vh;max-height:100vh;width:100%;border-radius:0;display:flex;flex-direction:column;padding:0;bottom:0;top:0;left:0;right:0;overflow:hidden;">
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--white);">
      <button class="back-btn" onclick="closeOv('ovSummary')">◀ メイン</button>
      <div id="sumResName" style="font-size:18px;font-weight:700;color:var(--text1);flex:1;"></div>
      <span style="font-size:12px;color:var(--text3);">8日間集計</span>
    </div>
    <div style="overflow:auto;-webkit-overflow-scrolling:touch;flex:1;background:#f5f5f5;padding:8px;">
      <table id="sumTable" style="border-collapse:collapse;min-width:600px;"></table>
    </div>
    <div style="padding:10px 16px;background:var(--white);border-top:1px solid var(--border2);flex-shrink:0;">
      <button class="btn btn-primary btn-block btn-sm" onclick="closeOv('ovSummary');openDetail(document.getElementById('sumResName').textContent,'vital')">詳細入力画面へ ▶</button>
    </div>
  </div>
</div>

<!-- ========== スケジュール編集オーバーレイ ========== -->
<div class="ov-back" id="ovSched">
  <div class="ov show" style="padding:16px;">
    <div class="ov-title" style="font-size:18px;">
      <span id="ovSchedTitle">通所スケジュール編集</span>
      <button class="ov-close" onclick="closeOv('ovSched')">✕</button>
    </div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:10px;">出席する日付をタップして選択してください</p>
    <div id="ovSchedBody"></div>
  </div>
</div>

<!-- ========== 月間予定表取込オーバーレイ ========== -->
<div class="ov-back" id="ovUpload" onclick="if(event.target===this)closeOv('ovUpload')">
  <div class="ov show" style="padding:20px;max-width:480px;width:92vw;">
    <div style="display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--border2);margin-bottom:16px;">
      <span style="font-size:20px;font-weight:700;">📅 月間予定表を読み込む</span>
      <button onclick="closeOv('ovUpload')" style="margin-left:auto;border:none;background:none;font-size:26px;cursor:pointer;color:var(--text3);">×</button>
    </div>
    <div style="border:2px dashed var(--border2);border-radius:var(--r2);padding:28px 16px;text-align:center;cursor:pointer;color:var(--text3);background:#fafafa;" onclick="document.getElementById('xlsxFile').click()">

function loadDB(){
  if(!FAC){ showScreen('selectScreen'); return; }
  try{
    const s = localStorage.getItem(FAC.storageKey);
    if(s){ db = JSON.parse(s); }
  }catch(e){ console.error('loadDB error',e); }
  // 初期値補完
  if(!db.residents||db.residents.length===0){
    db.residents = FACILITY_ID==='nishi'
      ? JSON.parse(JSON.stringify(DEFAULT_RESIDENTS_NISHI))
      : [];
  }
  if(!db.records) db.records={};
  if(!db.supplies) db.supplies=[];
  if(!db.settings) db.settings={};
  // settingsのデフォルト補完（未定義 or 空配列の場合にデフォルトを適用）
  Object.keys(DEFAULT_SETTINGS).forEach(k=>{
    const cur = db.settings[k];
    const def = DEFAULT_SETTINGS[k];
    if(cur === undefined || cur === null){
      db.settings[k] = JSON.parse(JSON.stringify(def));
    } else if(Array.isArray(def) && def.length > 0 && Array.isArray(cur) && cur.length === 0){
      // 配列項目が空の場合もデフォルトで補完（staffList・supplyProductsは除外）
      if(!['staffList','supplyProducts'].includes(k)){
        db.settings[k] = JSON.parse(JSON.stringify(def));
      }
    }
  });
  if(db.settings.facilityName) document.title = db.settings.facilityName;
  // 名前重複を排除（同期バグで汚染された既存データを修復）
  if(db.residents){
    const seen = new Set();
    db.residents = db.residents.filter(r=>{
      if(seen.has(r.name)) return false;
      seen.add(r.name); return true;
    });
  }
}

// ========== 同期 ==========
function setSyncStatus(label, color){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  if(dot) dot.style.color=color;
  if(lbl) lbl.textContent=label;

function syncTo(){
  if(!FAC||!JURL) return;
  setSyncStatus('送信中...','#185FA5');
  // 送信前にクラウドから取得→マージ→アップロード
  fetch(JURL+'/latest',{headers:{'X-Master-Key':FAC.jkey}})
    .then(r=>r.json()).then(res=>{
      let uploadDb = JSON.parse(JSON.stringify(db));
      if(res.record && res.record.data){
        try{
          const cloudDb = JSON.parse(res.record.data);
          uploadDb = mergeDb(db, cloudDb); // local=base(settings優先) + cloud → merged
        }catch(e){}
      }
      return fetch(JURL,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':FAC.jkey},
        body: JSON.stringify({data:JSON.stringify(uploadDb), timestamp:Date.now()})
      });
    })
    .then(r=>r.json()).then(res=>{
      syncTs = (res.record&&res.record.timestamp)||Date.now();
      syncDirty = false;
      const n=new Date();
      setSyncStatus(`送信済 ${n.getHours()}:${pad(n.getMinutes())}`,'green');
    })
    .catch(()=>setSyncStatus('送信失敗','orange'));
}

function syncFrom(){
  if(!FAC||!JURL) return;
  setSyncStatus('受信中...','#185FA5');
  fetch(JURL+'/latest',{headers:{'X-Master-Key':FAC.jkey}})
    .then(r=>r.json()).then(res=>{
      if(res.record && res.record.timestamp > syncTs){
        const cloudDb = JSON.parse(res.record.data);
        db = mergeDb(db, cloudDb); // local + cloud → merged
        localStorage.setItem(FAC.storageKey, JSON.stringify(db));
        syncTs = res.record.timestamp;
        syncDirty = false;
        renderMain();
        setSyncStatus('受信済','green');
      } else {
        setSyncStatus('最新です','green');
        setTimeout(()=>setSyncStatus('同期済','green'),2000);
      }
    }).catch(()=>setSyncStatus('受信失敗','orange'));
}

// 統一マージ関数（base に target をユニオンマージ）
function mergeDb(base, target){
  const result = JSON.parse(JSON.stringify(target)); // targetをベースにコピー

  // ── settings：スマートマージ ──
  // 方針：ローカル(base)優先だが、ローカルが空の項目はクラウド(target)で補完。
  // これにより「新端末やキャッシュクリア後でもJSONBinからスタッフ名等を復元できる」
  if(!result.settings) result.settings = {};
  const bs = base.settings || {};
  const cloudSt = JSON.parse(JSON.stringify(result.settings)); // クラウド設定を退避

  // まずローカル設定で上書き
  if(bs && Object.keys(bs).length){
    result.settings = JSON.parse(JSON.stringify(bs));
  }

  // 各キーをスマート補完
  Object.keys(DEFAULT_SETTINGS).forEach(k=>{
    const cur = result.settings[k];   // ローカル値
    const cloud = cloudSt[k];         // クラウド値
    const def = DEFAULT_SETTINGS[k];  // デフォルト値

    if(cur === undefined || cur === null){
      // ローカルに値なし → クラウド優先、なければデフォルト
      result.settings[k] = (cloud !== undefined && cloud !== null)
        ? JSON.parse(JSON.stringify(cloud))
        : JSON.parse(JSON.stringify(def));
    } else if(Array.isArray(cur) && cur.length === 0){
      // ローカルが空配列 → クラウドに値があれば使う（スタッフ名・消耗品を含む）
      if(Array.isArray(cloud) && cloud.length > 0){
        result.settings[k] = JSON.parse(JSON.stringify(cloud));
      } else if(Array.isArray(def) && def.length > 0 && !['staffList','supplyProducts'].includes(k)){
        // ローカルもクラウドも空でデフォルトがある → デフォルト補完（staffListは補完しない）
        result.settings[k] = JSON.parse(JSON.stringify(def));
      }
    }
    // それ以外（ローカルに値あり）: ローカルの値をそのまま使う
  });

  // ── residents：ローカル(base)を優先してユニオンマージ ──
  // IDマッチ優先、IDなしは名前でフォールバック検索
  if(!result.residents) result.residents = [];
  if(base.residents&&base.residents.length){
    base.residents.forEach(r=>{
      let idx = r.id ? result.residents.findIndex(x=>x.id===r.id) : -1;
      if(idx<0 && r.name) idx = result.residents.findIndex(x=>x.name===r.name);
      if(idx<0){
        result.residents.push(r); // クラウドにもローカルにもない → 追加
      } else if(r.id){
        result.residents[idx] = r; // IDが一致 → ローカルで上書き
      }
      // IDなしで名前一致の場合はローカル優先でそのまま
    });
  }
  // 名前重複を排除（同期バグで汚染されたデータを修復）
  {
    const seenNames = new Set();
    result.residents = result.residents.filter(r=>{
      if(seenNames.has(r.name)) return false;
      seenNames.add(r.name); return true;
    });
  }

  // ── supplies：ユニオンマージ ──
  if(!result.supplies) result.supplies = [];
  if(base.supplies&&base.supplies.length){
    const ids = new Set(result.supplies.map(s=>s.id));
    base.supplies.forEach(s=>{ if(s.id&&!ids.has(s.id)) result.supplies.push(s); });
    result.supplies.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  }

  // ── records：ユニオンマージ ──
  if(!base.records) return result;
  if(!result.records) result.records={};
  Object.entries(base.records).forEach(([dateK, dayData])=>{
    if(!result.records[dateK]){ result.records[dateK]=dayData; return; }
    Object.entries(dayData).forEach(([name, baseRec])=>{
      if(!result.records[dateK][name]){ result.records[dateK][name]=baseRec; return; }
      const tr = result.records[dateK][name];
      // 配列フィールド：IDまたは時刻をキーにユニオンマージ
      ['vital','excretion','bath','care','notes'].forEach(field=>{
        if(!baseRec[field]||!baseRec[field].length) return;
        if(!tr[field]||!tr[field].length){ tr[field]=baseRec[field]; return; }
        const targetIds = new Set(tr[field].map(e=>e.id||e.time||JSON.stringify(e)));
        baseRec[field].forEach(e=>{
          const key = e.id||e.time||JSON.stringify(e);
          if(!targetIds.has(key)) tr[field].push(e);
        });
        tr[field].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      });
      // med：タイミング別にbaseを保護
      if(baseRec.med){
        if(!tr.med) tr.med=baseRec.med;
        else ['morning','lunch','dinner','bedtime'].forEach(t=>{
          if(baseRec.med[t]&&baseRec.med[t].items&&baseRec.med[t].items.length&&
             (!tr.med[t]||!tr.med[t].items||!tr.med[t].items.length))
            tr.med[t]=baseRec.med[t];
        });
      }
    });
  });
  return result;
}

function syncNow(){
  if(syncDirty){ syncTo(); } else { syncFrom(); }
}

// 自動クラウド送信タイマー（2時間ごと）
function startAutoSync(){
  if(syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(()=>{
    if(syncDirty) syncTo();
  }, 2*60*60*1000);

function renderCal(){

  document.getElementById('calTitle').textContent=`${calY}年 ${mn[calM]}`;

    const td=new Date(calY,calM,d); td.setHours(0,0,0,0);

function getLastStool(name){
  // 過去14日間を遡って最終排便を探す
  for(let d=0;d<=13;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const dayData=db.records[dk(dt)]&&db.records[dk(dt)][name];
    if(dayData&&dayData.excretion){
      const found=dayData.excretion.filter(e=>e.stool&&e.stool!=='なし');
      if(found.length){
        const e=found[found.length-1];
        return {dt:new Date(dk(dt)+'T'+(e.time||'00:00')+':00').getTime(), dayStr:['日','月','火','水','木','金','土'][dt.getDay()], time:e.time||''};
      }
    }
  }
  return null;
}

function renderMain(){
  if(!FAC) return;
  renderDate();
  renderFacilityHeader();
  const day=curDate.getDate()-1;
  const todayRes=db.residents.filter(r=>r.sched&&r.sched[day]===1);
  const tbody=document.getElementById('resBody');
  if(!tbody) return;
  if(todayRes.length===0){
    tbody.innerHTML=`<tr><td colspan="12" style="padding:32px;color:var(--text3);text-align:center;">本日の利用者はいません</td></tr>
    <tr class="res-add-row no-print"><td></td><td><button class="res-add-btn" onclick="openAddResOv()">＋ 利用者を追加</button></td><td colspan="10"></td></tr>`;
    return;
  }
  tbody.innerHTML=todayRes.map(r=>{
    const rec=db.records[dk()]&&db.records[dk()][r.name]||{};
    // 申送（48時間以内のメモ：複数日チェック）
    const now=Date.now();
    const _h48chk=()=>{
      for(let d=0;d<=2;d++){
        const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
        const k=dk(dt);
        const rr=db.records[k]&&db.records[k][r.name]||{};
        if((rr.notes||[]).some(n=>(now-new Date(n.ts||0).getTime())<48*3600000)) return true;
      }
      return false;
    };
    const h48=_h48chk();
    const nc=h48?'<span class="cell-red">●</span>':'<span class="cell-empty">—</span>';
    // バイタル（体温/血圧/脈拍/SpO2）
    const lv=(rec.vital||[]).length?(rec.vital[rec.vital.length-1]):null;
    const tc=lv?`<span class="${parseFloat(lv.temp)>=37.0?'cell-warn':'cell-val'}">${lv.temp}℃</span>`:'<span class="cell-empty">—</span>';
    const bc=lv?`<span class="${parseInt(lv.sbp)>=160?'cell-warn':'cell-val'}">${lv.sbp}/${lv.dbp}</span>`:'<span class="cell-empty">—</span>';
    const pc=lv?`<span class="${parseInt(lv.pulse)>=90?'cell-warn':'cell-val'}">${lv.pulse}</span>`:'<span class="cell-empty">—</span>';
    const sc=lv?`<span class="cell-val">${lv.spo2||'—'}%</span>`:'<span class="cell-empty">—</span>';
    // 排泄
    const le=(rec.excretion||[]).length?(rec.excretion[rec.excretion.length-1]):null;
    let ec;
    if(!le){ec='<span class="cell-empty">—</span>';}
    else{
      const lines=[];
      const _leWater=le.stool&&le.stool.startsWith('水様便');
      if(le.urine&&le.urine!=='なし') lines.push(`<span style="color:#0F6E56;font-weight:600;">尿 ${le.urine}</span>`);
      if(le.pad&&le.pad!=='なし') lines.push(`パット ${le.pad}`);
      if(le.padChange) lines.push('<span style="color:var(--blue);font-weight:600;">パ交換</span>');
      if(le.rehaChange) lines.push('<span style="color:var(--blue);font-weight:600;">リハパン交換</span>');
      if(le.diaperChange) lines.push('<span style="color:var(--blue);font-weight:600;">オムツ交換</span>');
      if(le.stool&&le.stool!=='なし') lines.push(_leWater?`<span style="color:var(--red);font-weight:600;">${le.stool}</span>`:`<span style="color:#8B4513;">${le.stool}</span>`);
      if(lines.length===0) lines.push('空振り');
      ec=`<span class="cell-ex">${le.time}<br>${lines.join('<br>')}</span>`;
    }
    // 最終排便
    const _ls=getLastStool(r.name);
    let lsc;
    if(!_ls){lsc='<span class="cell-empty">—</span>';}
    else{
      const _ha=(Date.now()-_ls.dt)/3600000;
      if(_ha<48) lsc=`<span class="cell-val" style="font-size:14px;">${_ls.dayStr}曜 ${_ls.time}</span>`;
      else if(_ha<60) lsc='<span class="cell-warn">－2日</span>';
      else if(_ha<72) lsc='<span class="cell-warn">－3日</span>';
      else lsc='<span class="cell-warn">－4日</span>';
    }
    // 入浴
    const bac=(rec.bath||[]).length?'<span class="cell-ok">○</span>':'<span class="cell-empty">—</span>';
    // 食事
    const mc=(rec.meal&&rec.meal.menu)?'<span class="cell-ok">○</span>':'<span class="cell-empty">—</span>';
    // レク（申し送り）
    const rc=(rec.rec&&(rec.rec.content||(rec.rec.chips&&rec.rec.chips.length)))?'<span class="cell-ok">○</span>':'<span class="cell-empty">—</span>';
    // 服薬
    const med=rec.med||{};
    const _mReal=t=>med[t]&&med[t].items&&med[t].items.some(i=>i!=='服薬なし');
    const _mAny=t=>med[t]&&med[t].items&&med[t].items.length>0;
    const _isToday=dk()===dk(new Date());
    const _nowH=new Date().getHours()+new Date().getMinutes()/60;
    const _mParts=[];
    [{t:'morning',th:8.5},{t:'lunch',th:12},{t:'dinner',th:18},{t:'bedtime',th:21}].forEach(({t,th})=>{
      if(_mReal(t)) _mParts.push('<span style="color:var(--blue);font-weight:700;">✔</span>');
      else if(_mAny(t)){}
      else if(_isToday&&_nowH>=th) _mParts.push('<span style="color:var(--orange2);font-weight:700;">？</span>');
    });
    const mdc=_mParts.length?`<span class="cell-val" style="font-size:18px;letter-spacing:1px;">${_mParts.join('')}</span>`:'<span class="cell-empty">—</span>';

    return `<tr>
      <td style="width:32px;min-width:32px;padding:4px;" onclick="openDetail('${r.name}','notes')">${nc}</td>
      <td class="name-cell">
        <div class="name-cell-inner">
          <div class="name-cell-text">
            <div class="name-txt" onclick="openSummary('${r.name}')">${r.name}</div>
            <div class="name-sub">${r.care||''}</div>
          </div>
          <button class="res-del-btn no-print" onclick="delResidentByName('${r.name}')">×</button>
        </div>
      </td>
      <td onclick="openDetail('${r.name}','vital')">${tc}</td>
      <td onclick="openDetail('${r.name}','vital')">${bc}</td>
      <td onclick="openDetail('${r.name}','vital')">${pc}</td>
      <td onclick="openDetail('${r.name}','vital')">${sc}</td>
      <td onclick="openDetail('${r.name}','excretion')">${ec}</td>
      <td onclick="openDetail('${r.name}','excretion')">${lsc}</td>
      <td onclick="openDetail('${r.name}','bath')">${bac}</td>
      <td onclick="openDetail('${r.name}','meal')">${mc}</td>
      <td onclick="openDetail('${r.name}','rec')">${rc}</td>
      <td onclick="openDetail('${r.name}','med')">${mdc}</td>
    </tr>`;
  }).join('');
  // ＋ 利用者追加行（最下部）
  tbody.innerHTML += `<tr class="res-add-row no-print">
    <td colspan="12"><button class="res-add-btn" onclick="openAddResOv()">＋ 利用者を追加</button></td>
  </tr>`;
}

// ========== 48時間履歴取得 ==========
function get48h(name, field){
  const now=Date.now(), limit=72*3600000, all=[];
  for(let d=0;d<=2;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const k=dk(dt);
    const dayData=db.records[k]&&db.records[k][name];
    if(!dayData||!dayData[field]) continue;
    dayData[field].forEach((item,i)=>{
      const ts=new Date(k+'T'+(item.time||'00:00')+':00').getTime();
      if(now-ts<=limit) all.push({...item,_dk:k,_i:i,_ts:ts});
    });
  }
  return all.sort((a,b)=>b._ts-a._ts);
}
function get48hMed(name){
  const now=Date.now(),limit=72*3600000,all=[];
  const ORDER=['morning','lunch','dinner','bedtime'];
  for(let d=0;d<=2;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const k=dk(dt);
    const dayData=db.records[k]&&db.records[k][name];
    if(!dayData||!dayData.med) continue;
    ORDER.forEach(t=>{
      const m=dayData.med[t];
      if(!m||!m.items||!m.items.length) return;
      const ts=new Date(k+'T'+(m.time||'00:00')+':00').getTime();
      if(now-ts<=limit) all.push({...m,_dk:k,_timing:t,_ts:ts});
    });
  }
  return all.sort((a,b)=>b._ts-a._ts);
}
function recDayLabel(dkStr){
  const dt=new Date(dkStr+'T00:00:00');
  const today=dk(); const yesterday=dk(new Date(Date.now()-86400000));
  if(dkStr===today) return '今日';
  if(dkStr===yesterday) return '昨日';
  return `${pad(dt.getMonth()+1)}/${pad(dt.getDate())}`;
}

// ========== 服薬パネル ==========
const MED_TIMINGS=[
  {id:'morning',label:'朝食後'},
  {id:'lunch',  label:'昼食後'},
  {id:'dinner', label:'夕食後'},
  {id:'bedtime',label:'就寝前'},
];
function buildMedPanel(){
  const rec=getRec(curRes);
  const hist=get48hMed(curRes);
  const timingLabels={morning:'朝食後',lunch:'昼食後',dinner:'夕食後',bedtime:'就寝前'};
  const histHtml=hist.length?hist.map(m=>`<div class="hist-item">
    <div class="hist-time">${recDayLabel(m._dk)}<br>${timingLabels[m._timing]||m._timing}</div>
    <div class="hist-content">
      ${m.time?`${m.time}　`:''}${m.staff?`${m.staff}　`:''}
      ${m.items&&m.items.length?m.items.join('、'):''}
    </div>
    <button class="hist-del" onclick="delMed('${m._dk}','${m._timing}')">削除</button>
  </div>`).join(''):'<div class="text-gray" style="font-size:13px;padding:8px 0;">記録なし</div>';

  const defTiming='morning';
  const defM=rec.med[defTiming]||{time:'',staff:'',items:[]};
  const medChipItems=['処方薬','漢方薬','解熱鎮痛薬','点眼薬','服薬なし'];
  const medChipsHtml=medChipItems.map(item=>{
    const cls=item==='服薬なし'?(defM.items&&defM.items.includes(item)?'none-on':''):(defM.items&&defM.items.includes(item)?'on':'');
    return `<div class="med-chip${cls?' '+cls:''}" data-item="${item}" onclick="toggleMedChipForm(this,'${item}')">${item}</div>`;
  }).join('');
  const defOther=(defM.items||[]).filter(i=>!medChipItems.includes(i)).join('、');
  const timingChipsHtml=MED_TIMINGS.map(t=>{
    const tm=rec.med[t.id]||{};
    const done=tm.items&&tm.items.some(i=>i!=='服薬なし');
    const none=tm.items&&tm.items.every(i=>i==='服薬なし')&&tm.items.length>0;
    const badge=done?'✔':none?'－':'';
    return `<div class="chip med-timing-chip${t.id===defTiming?' selected':''}" data-timing="${t.id}" onclick="selectMedTimingChip('${t.id}')">${t.label}${badge?` <small>${badge}</small>`:''}</div>`;
  }).join('');

  return `<div class="panel">
    <div class="panel-sec"><h3>服薬履歴</h3><div class="hist-list">${histHtml}</div></div>
    <div class="panel-sec">
      <h3>服薬入力</h3>
      <div class="fg">
        <label>区分</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;" id="medTimingChips">${timingChipsHtml}</div>
      </div>
      <input type="hidden" id="medFormTiming" value="${defTiming}">
      <div class="fg-row">
        <div class="fg"><label>時刻</label><input type="time" id="medFormTime" value="${defM.time||''}"></div>
        <div class="fg"><label>担当者</label><select id="medFormStaff">${buildStaffOpts(defM.staff)}</select></div>
      </div>
      <div class="fg">
        <div style="display:flex;flex-wrap:wrap;gap:6px;" id="medFormChips">${medChipsHtml}</div>
      </div>
      <div class="fg"><label>その他（自由記入）</label><input type="text" id="medFormOther" placeholder="その他の薬を入力" value="${defOther}"></div>
      <button class="btn btn-primary btn-block mt8" onclick="saveMed()">記録</button>
    </div>
  </div>`;
}
function selectMedTimingChip(timing){
  document.querySelectorAll('.med-timing-chip').forEach(c=>c.classList.remove('selected'));
  document.querySelector(`.med-timing-chip[data-timing="${timing}"]`).classList.add('selected');
  document.getElementById('medFormTiming').value=timing;
  const m=getRec(curRes).med[timing]||{time:'',staff:'',items:[]};
  document.getElementById('medFormTime').value=m.time||'';
  document.getElementById('medFormStaff').value=m.staff||'';
  const medChipItems=['処方薬','漢方薬','解熱鎮痛薬','点眼薬','服薬なし'];
  document.querySelectorAll('#medFormChips .med-chip').forEach(el=>{
    const item=el.dataset.item;
    el.classList.remove('on','none-on');
    if(m.items&&m.items.includes(item)){
      el.classList.add(item==='服薬なし'?'none-on':'on');
    }
  });
  const other=(m.items||[]).filter(i=>!medChipItems.includes(i)).join('、');
  document.getElementById('medFormOther').value=other;
}
function toggleMedChipForm(el,item){
  if(item==='服薬なし'){
    document.querySelectorAll('#medFormChips .med-chip').forEach(e=>e.classList.remove('on'));
    el.classList.toggle('none-on');
  } else {
    document.querySelectorAll('#medFormChips .med-chip.none-on').forEach(e=>e.classList.remove('none-on'));
    el.classList.toggle('on');
  }
}
function saveMed(){
  const timing=document.getElementById('medFormTiming')?.value;
  if(!timing) return;
  const time=document.getElementById('medFormTime').value;
  const staff=document.getElementById('medFormStaff').value;
  const chipped=[...document.querySelectorAll('#medFormChips .med-chip.on, #medFormChips .med-chip.none-on')]
    .map(e=>e.dataset.item||e.textContent.trim());
  const other=(document.getElementById('medFormOther')?.value||'').trim();
  const items=[...chipped,...(other?other.split('、').map(s=>s.trim()).filter(Boolean):[])];
  const r=getRec(curRes);
  r.med[timing]={time,staff,items};
  saveDB(); showSavedToast(); goBack();
}
function delMed(dkStr,timing){
  if(!confirm('削除しますか？')) return;
  const r=getRec(curRes,dkStr);
  if(r.med&&r.med[timing]) r.med[timing]={time:'',staff:'',items:[]};
  saveDB(); refreshPanel('med');
}

function saveBulkMed(){
  const timings=[...document.querySelectorAll('#bulkTimings .chip.selected')].map(e=>{
    const label=e.textContent.trim();
    return MED_TIMINGS.find(t=>t.label===label)?.id;
  }).filter(Boolean);
  const staff=document.getElementById('bulkStaff').value;
  const time=document.getElementById('bulkTime').value||nowTime();
  const names=[...document.querySelectorAll('#bulkRes .chip.selected')].map(e=>e.dataset.name);
  if(!timings.length||!names.length){ alert('服薬区分と対象者を選んでください'); return; }
  names.forEach(name=>{
    timings.forEach(timing=>{
      const r=getRec(name);
      r.med[timing]={time,staff,items:['処方薬']};
    });
  });
  saveDB(); closeMainOv(); renderMain();
}

const WATER_OPTS=[30,50,80,100,150,200,250,300];
function waterSel(cur){
  return '<option value="">—</option>'+WATER_OPTS.map(v=>`<option${String(cur)===String(v)?' selected':''}>${v}</option>`).join('');
}
function pctSel(cur){
  return Array.from({length:21},(_,i)=>`<option${i*5===Number(cur)?' selected':''}>${i*5}</option>`).join('');
}
function buildMealPanel(){
  const rec=getRec(curRes);
  const m=rec.meal;
  const mealHist=[];
  for(let d=0;d<=2;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const k=dk(dt);
    const dayData=db.records[k]&&db.records[k][curRes];
    if(dayData&&dayData.meal){
      const ml=dayData.meal;
      const hasData=ml.menu||ml.bMain||ml.main||ml.dMain;
      if(hasData) mealHist.push({...ml,_dk:k});
    }
  }
  const mealHistHtml=mealHist.length?mealHist.map(ml=>`<div class="hist-item">
    <div class="hist-time">${recDayLabel(ml._dk)}</div>
    <div class="hist-content">
      朝: 主食${ml.bMain||0}% 副食${ml.bSide||0}% ${ml.bWater?`水分${ml.bWater}ml`:''}
      ${ml.menu?`<br>昼: ${ml.menu} 主食${ml.main||0}% 副食${ml.side||0}% ${ml.water?`水分${ml.water}ml`:''}${ml.snack?` おやつ:${ml.snack}`:''}`:''}
      <br>夕: 主食${ml.dMain||0}% 副食${ml.dSide||0}% ${ml.dWater?`水分${ml.dWater}ml`:''}
    </div>
  </div>`).join(''):'<div class="text-gray" style="font-size:14px;padding:8px 0;">記録なし</div>';
  const nowH=new Date().getHours();
  const defSec=nowH<10?'breakfast':nowH<14?'lunch':'dinner';
  const defData={
    breakfast:{time:m.bTime||'07:30',main:m.bMain||0,side:m.bSide||0,menu:'',water:m.bWater||'',snack:''},
    lunch:    {time:m.time||'11:50', main:m.main||0, side:m.side||0, menu:m.menu||'',water:m.water||'',snack:m.snack||''},
    dinner:   {time:m.dTime||'17:30',main:m.dMain||0,side:m.dSide||0,menu:'',water:m.dWater||'',snack:''}
  };
  const d0=defData[defSec];
  return `<div class="panel">
    <div class="panel-sec"><h3>直近の食事記録</h3><div class="hist-list">${mealHistHtml}</div></div>
    <div class="panel-sec">
      <h3>食事入力</h3>
      <div class="fg">
        <label>区分</label>
        <div style="display:flex;gap:6px;">
          <div class="chip meal-chip-btn${defSec==='breakfast'?' selected':''}" data-section="breakfast" onclick="selectMealChip('breakfast')">朝食</div>
          <div class="chip meal-chip-btn${defSec==='lunch'?' selected':''}" data-section="lunch" onclick="selectMealChip('lunch')">昼食</div>
          <div class="chip meal-chip-btn${defSec==='dinner'?' selected':''}" data-section="dinner" onclick="selectMealChip('dinner')">夕食</div>
        </div>
      </div>
      <input type="hidden" id="mealSection" value="${defSec}">
      <div class="fg-row">
        <div class="fg"><label>時刻</label><input type="time" id="mealTime" value="${d0.time}"></div>
        <div class="fg"><label>主食 %</label><select id="mealMain">${pctSel(d0.main)}</select></div>
        <div class="fg"><label>副食 %</label><select id="mealSide">${pctSel(d0.side)}</select></div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>メニュー</label><input type="text" id="mealMenu" value="${d0.menu}"></div>
        <div class="fg"><label>水分 (ml)</label><select id="mealWater">${waterSel(d0.water)}</select></div>
      </div>
      <div class="fg"><label>おやつ</label><input type="text" id="mealSnack" value="${d0.snack}"></div>
      <button class="btn btn-primary btn-block mt8" onclick="saveMealSection()">記録</button>
    </div>
  </div>`;
}
function selectMealChip(section){
  document.querySelectorAll('.meal-chip-btn').forEach(c=>c.classList.remove('selected'));
  document.querySelector(`.meal-chip-btn[data-section="${section}"]`).classList.add('selected');
  document.getElementById('mealSection').value=section;
  const m=getRec(curRes).meal||{};
  const data={
    breakfast:{time:m.bTime||'07:30',main:m.bMain||0,side:m.bSide||0,menu:'',water:m.bWater||'',snack:''},
    lunch:    {time:m.time||'11:50', main:m.main||0, side:m.side||0, menu:m.menu||'',water:m.water||'',snack:m.snack||''},
    dinner:   {time:m.dTime||'17:30',main:m.dMain||0,side:m.dSide||0,menu:'',water:m.dWater||'',snack:''}
  }[section];
  document.getElementById('mealTime').value=data.time;
  document.getElementById('mealMain').value=String(data.main);
  document.getElementById('mealSide').value=String(data.side);
  document.getElementById('mealMenu').value=data.menu;
  document.getElementById('mealWater').value=String(data.water);
  document.getElementById('mealSnack').value=data.snack;
}
function saveMealSection(){
  const section=document.getElementById('mealSection')?.value;
  if(!section){alert('区分を選んでください');return;}
  const r=getRec(curRes);
  const m=r.meal;
  const time=document.getElementById('mealTime').value;
  const main=parseInt(document.getElementById('mealMain').value)||0;
  const side=parseInt(document.getElementById('mealSide').value)||0;
  const menu=document.getElementById('mealMenu').value;
  const water=document.getElementById('mealWater').value;
  const snack=document.getElementById('mealSnack').value;
  if(section==='breakfast'){
    m.bTime=time; m.bMain=main; m.bSide=side; m.bWater=water;
  } else if(section==='lunch'){
    m.time=time; m.main=main; m.side=side; m.menu=menu; m.water=water; m.snack=snack;
  } else {
    m.dTime=time; m.dMain=main; m.dSide=side; m.dWater=water;
  }
  saveDB(); showSavedToast(); goBack();
}

function buildRecPanel(){

  // 過去3日分の記録
  const hist=[];
  for(let d=0;d<=2;d++){
    const dt=new Date(curDate); dt.setDate(dt.getDate()-d);
    const k=dk(dt);

    if(dayData&&dayData.rec&&(dayData.rec.content||dayData.rec.chips)) hist.push({...dayData.rec,_dk:k});

  const histHtml=hist.length?hist.map(r=>{

  }).join(''):'<div class="text-gray" style="font-size:14px;padding:8px 0;">記録なし</div>';

      <button class="btn btn-primary btn-block" onclick="saveRec()">記録</button>
    </div>
  </div>`;
}

}
function toggleKanken(el){ el.classList.toggle('selected'); }
function saveRec(){

}
function toggleDayChip(el,item){

    const free=ta.value.replace(/^[^。！？\n]*/, '').trim();

      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const skip=['氏名','集計項目','利用者合計','介護保険内利用者','介護保険外利用者',
                  'お泊り利用者','入浴利用者','送迎減算利用者','延長加算利用者','個別機能訓練加算利用者'];
      // 名前でグループ化（結合セル対応：直前のcurNameを引き継ぐ）
      var byName={}, cats=[], curName=null, curCare=null;
      for(var i=17;i<data.length;i++){
        var row=data[i];
        if(row[0]&&skip.indexOf(String(row[0]).trim())<0){
          curName=String(row[0]).trim();
          curCare=String(row[1]||'').trim();
        }
        if(!curName) continue;
        if(row[0]&&skip.indexOf(String(row[0]).trim())>=0){curName=null;continue;}
        var cat=String(row[2]||'').trim();
        if(!cat) continue;
        if(cats.indexOf(cat)<0) cats.push(cat);
        if(!byName[curName]) byName[curName]={care:curCare,riyou:null,otomari:null};
        if(cat==='利用') byName[curName].riyou=row;
        if(cat.indexOf('泊')>=0) byName[curName].otomari=row;
      }
      var newRes=[], dailyCount=0;
      Object.keys(byName).forEach(function(n){
        var v=byName[n], uRow=v.riyou, oRow=v.otomari;
        // D列（col 3 = 1日目）のお泊行に入力があれば常時利用者
        var d1Val=oRow?String(oRow[3]||'').trim():'';
        var isDaily=(oRow&&d1Val.length>0);
        if(!isDaily&&!uRow) return;
        var sched=[];
        for(var c=3;c<=33;c++){
          var dayIdx=c-3;
          if(isDaily){
            sched.push(1);
          } else {
            var uv=uRow[c];
            var val=(uv&&['〇','○','◯'].indexOf(String(uv).trim())>=0)?1:0;
            // 翌日ルール：前日のお泊行に入力があれば翌日も利用扱い（ショートステイ）
            if(oRow&&dayIdx>0&&String(oRow[c-1]||'').trim().length>0) val=1;
            sched.push(val);
          }
        }
        if(isDaily) dailyCount++;
        // 既存利用者のIDを引き継ぐ（同期時に重複しないよう）
        const existing=db.residents.find(r=>r.name===n);
        const id=existing?existing.id:genId('r');
        newRes.push({id,name:n,care:v.care,sched:sched});
      });
      if(newRes.length>0){
        db.residents=newRes;
        saveDB();
        const dailyMsg=dailyCount>0?'（常時利用者'+dailyCount+'名含む）':'';
        msg.innerHTML='<span style="color:var(--green);font-weight:700;">✔ '+newRes.length+'名の予定を読み込みました'+dailyMsg+'</span>'
          +'<br><span style="font-size:13px;color:#888;">区分: '+cats.join(' / ')+' | 常時: '+dailyCount+'名</span>';
        renderMain();
        setTimeout(function(){closeOv('ovUpload');},2000);
      } else {
        msg.innerHTML='<span style="color:var(--red);">利用者データが見つかりませんでした</span>'
          +'<br><span style="font-size:13px;color:#888;">検出された区分: '+cats.join(' / ')+'</span>';
      }
    }catch(err){
      msg.innerHTML='<span style="color:var(--red);">エラー: '+err.message+'</span>';
    }
  };
  reader.readAsArrayBuffer(file);
}

// ========== 旧アプリからのデータ移行 ==========
function migrateFromOldApp(){
  const oldRaw = localStorage.getItem('kaigo3');
  if(!oldRaw){
    alert('旧アプリのデータが見つかりません。\n旧アプリと同じURLで開いている場合のみ移行できます。');
    return;
  }
  if(!confirm('旧アプリ（介護記録）のデータを移行します。\n\n・利用者・記録データを追加（重複除外）\n・スタッフ名・施設名を引き継ぎ\n・現在のデータは保持されます\n\n実行しますか？')) return;

  try{
    const old = JSON.parse(oldRaw);
    let addedRes=0, addedDays=0, addedStaff=0;

    // ── 利用者をマージ ──
    if(old.residents && old.residents.length){
      const existIds = new Set(db.residents.map(r=>r.id));
      old.residents.forEach(r=>{
        if(!existIds.has(r.id)){ db.residents.push(r); addedRes++; }
        else{
          // 既存利用者のスケジュールを旧データで上書き
          const idx=db.residents.findIndex(x=>x.id===r.id);
          if(idx>=0) db.residents[idx]=Object.assign({},r,{id:r.id});
        }
      });
    }

    // ── 記録をマージ ──
    if(old.records){
      Object.entries(old.records).forEach(([dateK, dayData])=>{
        if(!db.records[dateK]){ db.records[dateK]=dayData; addedDays++; return; }
        Object.entries(dayData).forEach(([name, rec])=>{
          if(!db.records[dateK][name]){ db.records[dateK][name]=rec; return; }
          const tr=db.records[dateK][name];
          ['vital','excretion','bath','care','notes'].forEach(field=>{
            if(!rec[field]||!rec[field].length) return;
            if(!tr[field]||!tr[field].length){ tr[field]=rec[field]; return; }
            const keys=new Set(tr[field].map(e=>e.id||e.time||JSON.stringify(e)));
            rec[field].forEach(e=>{
              const k=e.id||e.time||JSON.stringify(e);
              if(!keys.has(k)) tr[field].push(e);
            });
            tr[field].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
          });
          // meal: 旧データが初期値100のままでなければ上書き
          if(rec.meal && (rec.meal.bMain!==100||rec.meal.main!==100||rec.meal.dMain!==100||rec.meal.menu)){
            if(tr.meal.bMain===100&&tr.meal.main===100&&tr.meal.dMain===100&&!tr.meal.menu){
              tr.meal=rec.meal;
            }
          }
          if(rec.day && !tr.day) tr.day=rec.day;
          if(rec.rec && rec.rec.content && !tr.rec.content) tr.rec=rec.rec;
        });
      });
    }

    // ── スタッフリストをマージ ──
    try{
      const oldStaff=JSON.parse(localStorage.getItem('staffList')||'[]');
      if(Array.isArray(oldStaff) && oldStaff.length){
        if(!db.settings.staffList) db.settings.staffList=[];
        const existing=new Set(db.settings.staffList);
        oldStaff.forEach(s=>{ if(s&&!existing.has(s)){ db.settings.staffList.push(s); addedStaff++; }});
      }
    }catch(e){}

    // ── 施設名（未設定の場合のみ）──
    try{
      const oldFac=localStorage.getItem('facilityName');
      if(oldFac && !db.settings.facilityName) db.settings.facilityName=oldFac;
    }catch(e){}

    // ── 1日の様子フレーズをdayItemsにマージ ──
    try{
      const oldDay=JSON.parse(localStorage.getItem('dayPhrases')||'[]');
      if(oldDay.length){
        const ex=new Set(db.settings.dayItems||[]);
        oldDay.forEach(p=>{ if(p&&!ex.has(p)) db.settings.dayItems.push(p); });
      }
    }catch(e){}

    // ── ケアフレーズをcareItemsにマージ ──
    try{
      const oldCare=JSON.parse(localStorage.getItem('carePhrases')||'[]');
      if(oldCare.length){
        const ex=new Set(db.settings.careItems||[]);
        oldCare.forEach(p=>{ if(p&&!ex.has(p)) db.settings.careItems.push(p); });
      }
    }catch(e){}

    saveDB();
    const msg=[
      '✅ 移行が完了しました！',
      '',
      '利用者: '+(addedRes>0?addedRes+'人を追加':'変更なし（既存データ優先）'),
      '記録日数: '+Object.keys(db.records).length+'日分',
      'スタッフ: '+(addedStaff>0?addedStaff+'名を追加':'変更なし'),
    ].join('\n');
    alert(msg);
    renderSettingsPanel('data');
    renderMain();
  }catch(err){
    console.error('Migration error:',err);
    alert('移行中にエラーが発生しました:\n'+err.message);
  }
}

function getDatesInRange(from,to){
  const dates=[]; let d=new Date(from);
  const end=new Date(to);
  while(d<=end){ dates.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return dates;
}

function printVitalRange(){
  const from=document.getElementById('printVitalFrom').value;
  const to=document.getElementById('printVitalTo').value;
  const resName=document.getElementById('printVitalRes').value;
  if(!from||!to){ alert('期間を入力してください'); return; }
  const dates=getDatesInRange(from,to);
  const targets=resName==='__all__'?db.residents:db.residents.filter(r=>r.name===resName);
  let rows='';
  targets.forEach(res=>{
    dates.forEach(dk=>{
      const rec=db.records[dk]&&db.records[dk][res.name];
      if(!rec) return;
      (rec.vital||[]).forEach(v=>{
        rows+=`<tr>
          <td>${dk}</td><td>${res.name}</td>
          <td>${v.time||''}</td><td>${v.temp||''}</td>
          <td>${v.sbp||''}/${v.dbp||''}</td><td>${v.pulse||''}</td>
          <td>${v.spo2||''}</td><td>${v.staff||''}</td>
        </tr>`;
      });
    });
  });
  const html=`
    <div class="print-title">${FAC.name} バイタル記録 ${from} ～ ${to}</div>
    <table class="print-table">
      <thead><tr><th>日付</th><th>氏名</th><th>時刻</th><th>体温(℃)</th><th>血圧</th><th>脈拍</th><th>SpO2(%)</th><th>担当</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="8" style="text-align:center;">記録なし</td></tr>'}</tbody>
    </table>`;
  document.getElementById('printArea').innerHTML=html;
  window.print();
}

function printCareRange(){
  const from=document.getElementById('printCareFrom').value;
  const to=document.getElementById('printCareTo').value;

    const rows=[];
    // バイタル
    rec.vital.forEach(v=>rows.push({t:v.time,cat:'バイタル',body:'体温：'+v.temp+'℃、血圧：'+v.sbp+'/'+v.dbp+'、脈拍：'+v.pulse+'/分'+(v.spo2&&v.spo2!=='—'?'、SpO2：'+v.spo2+'%':'')}));
    // 排泄
    rec.excretion.forEach(e=>rows.push({t:e.time,cat:'排泄',body:'排尿:'+e.urine+(e.pad&&e.pad!=='なし'?'、パット:'+e.pad:'')+'、排便:'+e.stool}));
    // 入浴
    rec.bath.forEach(b=>rows.push({t:b.time,cat:'入浴',body:b.type}));
    // 食事（常に3食表示）
    const ml=rec.meal||{};
    rows.push({t:ml.bTime||'07:30',cat:'朝食',body:'主食：'+(ml.bMain||0)+'%、副食：'+(ml.bSide||0)+'%'+(ml.bWater?'、水分：'+ml.bWater+'ml':'')});
    rows.push({t:ml.time||'11:50',cat:'昼食',body:'主食：'+(ml.main||0)+'%、副食：'+(ml.side||0)+'%'+(ml.water?'、水分：'+ml.water+'ml':'')+(ml.menu?'　メニュー：'+ml.menu:'')});
    rows.push({t:ml.dTime||'17:30',cat:'夕食',body:'主食：'+(ml.dMain||0)+'%、副食：'+(ml.dSide||0)+'%'+(ml.dWater?'、水分：'+ml.dWater+'ml':'')});
    // レク
    if(rec.rec&&rec.rec.content) rows.push({t:'',cat:'レク',body:rec.rec.content});
    rows.sort((a,b)=>a.t&&b.t?a.t.localeCompare(b.t):a.t?-1:1);
    const trs=rows.map(rr=>'<tr><td>'+rr.t+'</td><td>'+rr.cat+'</td><td>'+rr.body+'</td></tr>').join('')
      ||'<tr><td colspan="3" style="text-align:center;color:#999;">記録なし</td></tr>';
    const dayText=rec.day||'';
    let nxt='—';
    const rr=db.residents.find(x=>x.name===name);
    if(rr){const dNum=d.getDate();for(let dd=dNum;dd<(rr.sched||[]).length;dd++){if(rr.sched[dd]===1){const nd=new Date(d.getFullYear(),d.getMonth(),dd+1);nxt=(nd.getMonth()+1)+'月'+nd.getDate()+'日（'+days[nd.getDay()]+'）';break;}}}
    const isLast=pidx===sel.length-1;
    pages+='<div class="page'+(isLast?' last':'')+'">'
      +'<h1>介護記録（連絡帳）</h1>'
      +'<div class="meta"><span class="meta-name">利用者名　<strong>'+name+'</strong>　様</span><span class="meta-date">'+dateLabel+'</span></div>'
      +'<table><thead><tr><th class="col-time">時間</th><th class="col-cat">項目</th><th class="col-body">内容</th></tr></thead><tbody>'+trs+'</tbody></table>'
      +'<div class="biko"><div class="biko-label">1日の様子</div><div class="biko-body">'+dayText+'</div></div>'
      +'<div class="next">次回利用予定日　'+nxt+'</div>'
      +'</div>';
  });
  return pages;
}

    +'.meta span{white-space:nowrap;}'
    +'.meta-name strong{font-size:11pt;border-bottom:1px solid #000;padding-right:20pt;}'
    +'table{width:100%;border-collapse:collapse;table-layout:fixed;margin-bottom:6pt;}'
    +'.col-time{width:44pt;}.col-cat{width:60pt;}'
    +'th,td{padding:2pt 4pt;border:1px solid #bbb;word-break:break-all;overflow-wrap:break-word;white-space:pre-wrap;font-size:9.5pt;line-height:1.35;vertical-align:top;}'
    +'th{background:#f0f0f0;font-weight:bold;}'
    +'.biko{margin-bottom:6pt;}'
    +'.biko-label{font-weight:bold;font-size:9.5pt;margin-bottom:2pt;}'
    +'.biko-body{border:1px solid #bbb;padding:4pt;font-size:9.5pt;line-height:1.6;min-height:24pt;white-space:pre-wrap;}'
    +'.next{text-align:right;font-size:9pt;}'
    +'.noprint{padding:8px;background:#f5f5f5;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;}'
    +'@media screen{.page{width:148mm;min-height:210mm;margin:10px auto;padding:10mm;background:#fff;border:1px solid #ddd;}}'
    +'@media print{'
    +'@page{size:A5 portrait;margin:8mm;}'
    +'html,body{margin:0;padding:0;}'
    +'body{font-size:10.5pt;line-height:1.4;-webkit-print-color-adjust:exact;print-color-adjust:exact;}'
    +'.page{width:100%;margin:0;padding:0;page-break-after:always;break-after:page;}'
    +'.page.last{page-break-after:auto;break-after:auto;}'
    +'.noprint{display:none;}'
    +'}'
    +'</style>'
    +'</head><body>'
    +'<div class="noprint">'
    +'<button onclick="window.close()" style="padding:8px 16px;font-size:14px;background:#888;color:#fff;border:none;border-radius:6px;cursor:pointer;">✕ 閉じる</button>'
    +'<button id="sb" onclick="var a=this.dataset.m!==\'a4\';var ss=document.getElementsByTagName(\'style\')[0];ss.textContent=ss.textContent.replace(a?\'A5 portrait\':\'A4 portrait\',a?\'A4 portrait\':\'A5 portrait\').replace(a?\'width:148mm\':\'width:210mm\',a?\'width:210mm\':\'width:148mm\').replace(a?\'margin:8mm\':\'margin:10mm\',a?\'margin:10mm\':\'margin:8mm\');this.dataset.m=a?\'a4\':\'\';this.textContent=a?\'A5に切替\':\'A4に切替\';" style="padding:8px 16px;font-size:14px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;">A4に切替</button>'
    +'<button onclick="window.print()" style="padding:8px 18px;font-size:14px;background:#E87722;color:#fff;border:none;border-radius:6px;cursor:pointer;">🖨 印刷/PDF</button>'
    +'</div>'
    +pages
    +'</body></html>';
}

function doPrint(){
  const date=document.getElementById('pDate').value;
  const sel=[...document.querySelectorAll('#pResidents .chip.selected')].map(b=>b.textContent);
  if(!sel.length){alert('利用者を選択してください');return;}
  closeOv('ovPrint');
  const pages=buildPrintPages(sel,date);
  const html=buildPrintHtml(pages);
  const w=window.open('','_blank','width=800,height=700');
  if(!w){alert('ポップアップを許可してください');return;}
  w.document.write(html);
  w.document.close();
}

// ========== 月次バックアップ ==========
function saveMonthlyBackup(){
  const now=new Date();
  const ym=`${now.getFullYear()}${pad(now.getMonth()+1)}`;
  const fname=`kaigo_${FAC.name}_${ym}.json`;
  const json=JSON.stringify(db,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const file=new File([blob],fname,{type:'application/json'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:fname})
      .catch(e=>{if(e.name!=='AbortError')alert('保存エラー: '+e.message);});
  } else {
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=fname; a.click();
    URL.revokeObjectURL(url);
  }
}

// ========== トースト通知 ==========
function showSavedToast(){
  let t=document.getElementById('savedToast');
  if(!t){ t=document.createElement('div'); t.id='savedToast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 24px;border-radius:24px;font-size:15px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;';
    t.textContent='保存しました'; document.body.appendChild(t); }
  t.style.opacity='1';
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.style.opacity='0',1500);
}

// ========== 初期化 ==========
function init(){
  // URLパラメーター or localStorage から施設を復元
  const savedFac = new URLSearchParams(location.search).get('f')
    || localStorage.getItem('kaigo_last_facility');
  if(savedFac && initFacility(savedFac)){
    startApp();
  } else {
    showScreen('selectScreen');
  }
}

document.addEventListener('DOMContentLoaded', init);
